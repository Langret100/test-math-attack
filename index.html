    @keyframes msgpop{0%{opacity:0;transform:translate(-50%,-10px) scale(.8)}20%{opacity:1;transform:translate(-50%,0) scale(1.1)}85%{opacity:1}100%{opacity:0;transform:translate(-50%,8px) scale(.9)}}
    @keyframes warnpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
    @keyframes comboPop{0%{transform:translateX(-50%) scale(0.5);opacity:0}15%{transform:translateX(-50%) scale(1.35);opacity:1}30%{transform:translateX(-50%) scale(0.92)}45%{transform:translateX(-50%) scale(1.12)}60%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(1);opacity:1}}
    @keyframes comboShake{0%,100%{transform:translateX(-50%) rotate(-3deg)}50%{transform:translateX(-50%) rotate(3deg)}}

<body>
<div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React,{useRef,useState,useEffect,useCallback,useMemo}from'react';
import ReactDOM from'react-dom/client';
import{Canvas,useFrame}from'@react-three/fiber';
import{Grid,PerspectiveCamera,Stars,Text}from'@react-three/drei';
import*as THREE from'three';
import{HandLandmarker,FaceDetector,FilesetResolver}from'@mediapipe/tasks-vision';

// ══════════════════════════════════════
// 상수
// ══════════════════════════════════════
const GS={LOADING:'LOADING',IDLE:'IDLE',PLAYING:'PLAYING',GAME_OVER:'GAME_OVER'};
// 게임은 게임오버 때까지 무한히 계속됨 (클리어 없음)
const COL={left:'#ef4444',right:'#3b82f6',correct:'#f59e0b',heart:'#ec4899',obstacle:'#ff4400'};
const SPAWN_Z=-30,PLAYER_Z=0,MISS_Z=6,NOTE_SPEED=8;
const BPM=140,BEAT=60/BPM;
// ── 기기 티어 판별 (phone / tablet / desktop) ──
// phone:   짧은 변 < 600px  → 스마트폰
// tablet:  짧은 변 600~1024px → 태블릿 (iPad, Android 태블릿)
// desktop: 짧은 변 > 1024px → PC / 대형 태블릿
function _calcTier(){
  const sw=Math.min(window.innerWidth,window.innerHeight); // 짧은 변 기준
  if(sw<600)return'phone';
  if(sw<1024)return'tablet';
  return'desktop';
}
let _tier=_calcTier();
window.addEventListener('resize',()=>{
  _tier=_calcTier();
  _isMobileCache=_tier==='phone';
},{passive:true});
const _isPhone=()=>_tier==='phone';
const _isTablet=()=>_tier==='tablet';
const _isDesktop=()=>_tier==='desktop';
// 기존 _isMobileCache: phone 전용 (태블릿은 포함 안 함)
let _isMobileCache=_tier==='phone';
const _isMobile=()=>_isMobileCache;
// 실제 터치 입력 기기 판별 (pointer:coarse = 손가락 터치, pointer:fine = 마우스/트랙패드)
// 웨일북/크롬북은 트랙패드 → pointer:fine → false → PC처럼 최대 성능
const _hasTouchPointer=window.matchMedia('(pointer:coarse)').matches;
const _isTouchDevice=()=>_hasTouchPointer;
const LANE_X_PC=[-1.5,-0.5,0.5,1.5];
const LANE_X_MB=[-1.0,-0.34,0.34,1.0];
const LANE_X_TB=[-1.3,-0.44,0.44,1.3]; // 태블릿
const LAYER_Y_PC=[0.7,1.5,2.3];
const LAYER_Y_MB=[0.5,1.3,2.1];
const LAYER_Y_TB=[0.6,1.4,2.2]; // 태블릿
const LANE_X=LANE_X_PC;
const LAYER_Y=LAYER_Y_PC;
const MULT_OPTS=[2,3,4,5,6,7,8,9,10];
const MAX_HEARTS=3;
const PW=0.82,PH=0.82,PD=0.13; // 판 크기
const SONG_URL='https://commondatastorage.googleapis.com/codeskulptor-demos/riceracer_assets/music/race2.ogg';

// ══════════════════════════════════════
// 벽 부수기 이벤트
// ══════════════════════════════════════
const WALL_HITS_NEEDED=20;
const WALL_SPAWN_Z=-1.5; // 바로 플레이어 앞에 팝업
const WALL_TIME_LIMIT=5; // 5초 안에 못 부수면 하트 감소

// ══════════════════════════════════════
// 통합 파티클 풀 매니저
// 모바일: Spark/Particle/StarSpark/WallParticle 모두 이 단일 useFrame으로 처리
// → 히트마다 useFrame N개 추가되던 것을 useFrame 1개로 통합
// ══════════════════════════════════════
const _particlePool=[];

function _regParticle(mesh, life, updateFn){
  mesh.userData._pLife=life;
  mesh.userData._pT=-1;
  mesh.userData._pUpdate=updateFn;
  _particlePool.push(mesh);
}
function _unregParticle(mesh){
  if(!mesh)return;
  const idx=_particlePool.indexOf(mesh);
  if(idx!==-1)_particlePool.splice(idx,1);
}
function _startParticle(mesh){
  if(mesh){mesh.userData._pT=0;mesh.visible=true;}
}

// 파티클 풀 전체를 처리하는 단일 useFrame 컴포넌트
function ParticlePoolDriver(){
  useFrame((_,dt)=>{
    for(let i=0;i<_particlePool.length;i++){
      const m=_particlePool[i];
      if(!m||m.userData._pT<0)continue;
      m.userData._pT+=dt;
      const t=m.userData._pT;
      const life=m.userData._pLife;
      if(t>life){m.visible=false;m.userData._pT=-1;continue;}
      const f=t/life;
      m.userData._pUpdate(m,t,dt,f);
    }
  });
  return null;
}

// geometry 캐싱 (매 프레임 생성 방지 → 렉 제거)
const _wallBodyGeo=new THREE.BoxGeometry(5.2,3.2,0.28);
const _wallBrickGeo=new THREE.BoxGeometry(1.25,0.6,0.01);
const _wallEdgesGeo=new THREE.EdgesGeometry(_wallBodyGeo);
const _wallBrickEdges=new THREE.EdgesGeometry(_wallBrickGeo);
const _wallHPBgGeo=new THREE.PlaneGeometry(5.0,0.14);
const _debrisCubeGeo=new THREE.BoxGeometry(1,1,1); // scale로 크기 조절

// 벽 파편 파티클 (캐싱된 geometry 사용)
function WallParticle({dx,dy,color,speed,size,life}){
  const r=useRef();
  useFrame((_,dt)=>{
    if(!r.current)return;
    const t=(r.current.userData.t=(r.current.userData.t??0)+dt);
    if(t>life){r.current.visible=false;return;}
    r.current.visible=true;
    const f=t/life;
    r.current.position.set(dx*speed*t, dy*speed*t-5*t*t, (Math.random()-0.5)*0.3*t);
    r.current.scale.setScalar(Math.max(0.01,size*(1-f*f)));
    if(r.current.material)r.current.material.opacity=Math.max(0,1-f*1.5);
  });
  return(
    <mesh ref={r} geometry={_debrisCubeGeo}>
      <meshBasicMaterial color={color} toneMapped={false} transparent opacity={1}/>
    </mesh>
  );
}

function WallComp({wallRef,playStartRef,handDataRef,onWallHit,onWallBreak,onWallTimeout,wallVisible,wallBreaking}){
  const grp=useRef();
  const shakeRef=useRef(0);
  const hitCoolRef=useRef(0);
  // broken state 완전 제거 → wallBreaking prop만 사용
  const progRef=useRef(0);
  const hpRef=useRef(); // HP바 mesh ref
  const timerRef=useRef(0); // 경과 시간
  const sparks=useRef([]);
  const sparkMeshes=useRef([]);
  const SPARK_POOL=24;

  // 균열/벽돌 위치 고정 (useMemo로 한번만 계산)
  const crackSeeds=useMemo(()=>Array.from({length:14},(_,i)=>({
    x:(Math.random()-0.5)*4.2, y:(Math.random()-0.5)*2.8,
    len:0.3+Math.random()*0.9, angle:Math.random()*Math.PI,
  })),[]);
  const brickPositions=useMemo(()=>{
    const arr=[];
    const rows=5, cols=4;
    for(let row=0;row<rows;row++)for(let col=0;col<cols;col++)
      arr.push([col*1.3-1.95, row*0.64-1.28]);
    return arr;
  },[]);
  const debrisData=useMemo(()=>Array.from({length:30},(_,i)=>({
    dx:(Math.random()-0.5)*3, dy:0.5+Math.random()*2,
    speed:3+Math.random()*6, size:0.12+Math.random()*0.22,
    life:0.6+Math.random()*0.5,
    color:i%3===0?'#555':i%3===1?'#3a3a3a':'#888',
  })),[]);

  // wallVisible prop으로 리셋 감지 (broken state 없음)
  const prevWallVisible=useRef(false);
  const prevResetProg=useRef(0);

  useFrame((_,dt)=>{
    if(!grp.current||!wallRef.current)return;
    const w=wallRef.current;

    // 벽 새로 시작 시 모든 상태 리셋 (resetProg 플래그로 감지)
    const rp = w.resetProg??0;
    if(rp !== prevResetProg.current){
      prevResetProg.current=rp;
      progRef.current=0;
      shakeRef.current=0;
      hitCoolRef.current=0;
      sparks.current=[];
    }
    if(!prevWallVisible.current&&wallVisible){
      progRef.current=0;
      shakeRef.current=0;
      hitCoolRef.current=0;
      sparks.current=[];
    }
    prevWallVisible.current=wallVisible;

    if(!wallVisible)return;

    // 5초 타이머: wallRef.startTime 기준 (매 벽마다 독립적으로 리셋됨)
    if(w.state==='stopped'){
      const startT = w.startTime ?? performance.now();
      const elapsed=(performance.now()-startT)/1000;
      if(elapsed>=WALL_TIME_LIMIT){
        w.state='idle';
        onWallTimeout?.();
        return;
      }
    }

    // 흔들림
    shakeRef.current=Math.max(0,shakeRef.current-dt*5);
    const sh=shakeRef.current;
    const sx=(Math.random()-0.5)*sh*0.1;
    const sy=(Math.random()-0.5)*sh*0.1;
    grp.current.position.set(sx,1.5+sy,WALL_SPAWN_Z);
    grp.current.visible=true;

    // HP바 직접 업데이트 (state 없이 ref로)
    if(hpRef.current){
      const p=progRef.current;
      const w2=5.0*(1-p);
      hpRef.current.scale.x=Math.max(0.001,1-p);
      hpRef.current.material.color.set(p<0.4?'#ef4444':p<0.7?'#f97316':'#22c55e');
    }

    // 불꽃 파티클 업데이트 (풀 방식, 배열 재생성 없음)
    const now3=performance.now()/1000;
    const sArr=sparks.current;
    const sMeshes=sparkMeshes.current;
    let si=0;
    for(let k=0;k<sArr.length;k++){
      const s=sArr[k];
      const dt2=now3-s.t;
      if(dt2>=s.life) continue; // 만료
      const m=sMeshes[si++];
      if(!m||si>SPARK_POOL)break;
      const f=dt2/s.life;
      m.visible=true;
      m.position.set(s.x+s.dx*dt2, 1.5+s.y+s.dy*dt2-5*dt2*dt2, 0.2);
      m.scale.setScalar(Math.max(0.01,0.09*(1-f*f)));
      if(m.material)m.material.opacity=Math.max(0,1-f*1.8);
    }
    // 남은 mesh 숨기기
    for(let k=si;k<SPARK_POOL;k++){const m=sMeshes[k];if(m)m.visible=false;}
    // 만료된 파티클 제거 (가끔만)
    if(now3%0.5<dt) sparks.current=sArr.filter(s=>(now3-s.t)<s.life);

    // 히트 판정 (breaking 중엔 판정 중단)
    if(w.state==='stopped' && hitCoolRef.current<=0 && !wallBreaking){
      const hd=handDataRef.current;
      for(const hand of[hd.left,hd.right]){
        if(!hand)continue;
        const {pos,vel}=hand;
        const spd=vel?.length()??0;
        if(Math.abs(pos.x)<2.8&&pos.y>-0.2&&pos.y<3.2&&spd>1.2){
          hitCoolRef.current=0.15;
          progRef.current=Math.min(1, progRef.current+1/WALL_HITS_NEEDED);
          shakeRef.current=Math.min(3.5, shakeRef.current+1.4);
          playWallHit();
          // 불꽃 파티클 추가
          const now2=performance.now()/1000;
          for(let s=0;s<8;s++){
            const a=Math.random()*Math.PI*2;
            const spd=3+Math.random()*5;
            sparks.current.push({x:pos.x*(0.15),y:pos.y*(0.12),
              dx:Math.cos(a)*spd,dy:Math.sin(a)*spd,t:now2,life:0.22+Math.random()*0.18});
          }
          onWallHit(Math.round(progRef.current*WALL_HITS_NEEDED));
          if(progRef.current>=1){
            w.state='breaking';
            onWallBreak();
            return;
          }
          break;
        }
      }
    }
    if(hitCoolRef.current>0)hitCoolRef.current-=dt;
  });

  if(!wallVisible)return null;
  if(wallBreaking){
    return(
      <group position={[0,1.5,WALL_SPAWN_Z]}>
        {debrisData.map((d,i)=><WallParticle key={i} {...d}/>)}
      </group>
    );
  }

  return(
    <group ref={grp} position={[0,1.5,WALL_SPAWN_Z]}>
      {/* 벽 본체 */}
      <mesh geometry={_wallBodyGeo}>
        <meshStandardMaterial color='#0d0d0d' roughness={0.9} metalness={0.05}
              emissive='#1a0a0a' emissiveIntensity={0.4}/>
      </mesh>
      {/* 벽돌 패턴 (edges 캐싱) */}
      {brickPositions.map(([bx,by],i)=>(
        <lineSegments key={i} position={[bx,by,0.15]} geometry={_wallBrickEdges}>
          <lineBasicMaterial color='#2a2a2a' toneMapped={false}/>
        </lineSegments>
      ))}
      {/* 테두리 */}
      <lineSegments geometry={_wallEdgesGeo}>
        <lineBasicMaterial color='#555' toneMapped={false}/>
      </lineSegments>
      {/* 균열선 — crackOpacity는 progRef 기반으로 useFrame에서 업데이트 어려우니 useMemo로 고정 노출 */}
      {crackSeeds.map((c,i)=>(
        <mesh key={i} position={[c.x,c.y,0.16]} rotation={[0,0,c.angle]}>
          <planeGeometry args={[c.len,0.022]}/>
          <meshBasicMaterial color='#ff5500' toneMapped={false} transparent opacity={0.0}
            ref={el=>{if(el)el._crackIdx=i;}}/>
        </mesh>
      ))}
      {/* HP바 */}
      <mesh ref={hpRef} position={[0,1.9,0.16]}>
        <planeGeometry args={[5.0,0.16]}/>
        <meshBasicMaterial color='#22c55e' toneMapped={false}/>
      </mesh>
      <mesh position={[0,1.9,0.15]} geometry={_wallHPBgGeo}>
        <meshBasicMaterial color='#111' toneMapped={false} transparent opacity={0.7}/>
      </mesh>
      <pointLight color='#ff3300' intensity={5} distance={7} decay={2}/>
      {/* 불꽃 파티클 풀 */}
      {Array.from({length:SPARK_POOL},(_,i)=>(
        <mesh key={`sp${i}`} ref={el=>sparkMeshes.current[i]=el} visible={false}>
          <sphereGeometry args={[1,4,4]}/>
          <meshBasicMaterial color={i%3===0?'#ffffff':i%3===1?'#ffcc44':'#ff6600'}
            toneMapped={false} transparent opacity={1}/>
        </mesh>
      ))}
    </group>
  );
}



// ══════════════════════════════════════
// 효과음
// ══════════════════════════════════════
let _actx=null;
const actx=()=>{if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;};
const playSwing=()=>{try{const c=actx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.11);g.gain.setValueAtTime(0.13,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);o.start();o.stop(c.currentTime+0.13);}catch(e){}};
const playHit=(good)=>{try{const c=actx();const b=c.createBuffer(1,c.sampleRate*0.12,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=c.createBufferSource(),g=c.createGain();s.buffer=b;s.connect(g);g.connect(c.destination);g.gain.value=good?0.32:0.18;s.start();const o=c.createOscillator(),g2=c.createGain();o.connect(g2);g2.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(good?880:440,c.currentTime);o.frequency.exponentialRampToValueAtTime(good?1760:220,c.currentTime+0.1);g2.gain.setValueAtTime(0.18,c.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.14);o.start();o.stop(c.currentTime+0.15);}catch(e){}};
const playMiss=()=>{try{const c=actx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(70,c.currentTime+0.22);g.gain.setValueAtTime(0.28,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);o.start();o.stop(c.currentTime+0.26);}catch(e){}};
const playDamage=()=>{try{const c=actx();for(let k=0;k<3;k++){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';const t=c.currentTime+k*0.07;o.frequency.setValueAtTime(140-k*28,t);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);o.start(t);o.stop(t+0.07);}}catch(e){}};
const playHeart=()=>{try{const c=actx();[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;const t=c.currentTime+i*0.07;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.11);o.start(t);o.stop(t+0.12);});}catch(e){}};
// 광선검 베기 효과음 (슈우웅)
const playSaberSlice=()=>{try{const c=actx();const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();o.connect(f);f.connect(g);g.connect(c.destination);o.type='sawtooth';f.type='bandpass';f.frequency.setValueAtTime(1800,c.currentTime);f.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.09);f.Q.value=1.8;o.frequency.setValueAtTime(320,c.currentTime);o.frequency.exponentialRampToValueAtTime(90,c.currentTime+0.09);g.gain.setValueAtTime(0.22,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.start();o.stop(c.currentTime+0.11);}catch(e){}};
// 벽 타격음 (쿵)

// ══════════════════════════════════════
// 채보 — 무한 스트림 방식
// ══════════════════════════════════════
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const mulOf=f=>{const m=[];for(let i=f;i<=100;i+=f)m.push(i);return rnd(m);};
const nonMulOf=f=>{const m=[];for(let i=1;i<=100;i++)if(i%f!==0)m.push(i);return rnd(m);};

// 경과 시간에 따라 난이도 단계 반환 (0~4)
const getDiffLevel=(t)=>{
  if(t<20)return 0;
  if(t<50)return 1;
  if(t<90)return 2;
  if(t<140)return 3;
  return 4;
};

// 난이도별 박자 간격 (초 단위)
const DIFF_BEAT_GAP=[8*BEAT,4*BEAT,2*BEAT,BEAT,BEAT*0.5];
// 난이도별 양손 동시 확률
const DIFF_DOUBLE=[0,0.1,0.25,0.45,0.65];
// 난이도별 장애물 간격 (초)
const DIFF_OBS_GAP=[22,16,12,9,6];
// 난이도별 하트 간격 (초)
const DIFF_HEART_GAP=[28,24,20,18,16];

const aL=[0,1,2],aLn=[0,1,2,3],lLn=[0,1],rLn=[2,3];
let _noteId=0,_obsId=0;
const mkNote=(type,li,ll,t,mult)=>({
  id:`n${_noteId++}`,time:t,lineIndex:li,lineLayer:ll,type,noteType:'note',
  numVal:Math.random()<0.65?mulOf(mult):nonMulOf(mult),
  hit:false,missed:false,hitTime:undefined
});
const mkHeart=(t,existingNotes)=>{
  // 같은 시간 근처(±0.3초) 노트들이 쓴 위치 제외하고 배치
  const nearby=(existingNotes||[]).filter(n=>Math.abs(n.time-t)<0.3);
  const usedSlots=new Set(nearby.map(n=>n.lineIndex+','+n.lineLayer));
  const allSlots=[];
  for(let li=0;li<4;li++)for(let ll=0;ll<3;ll++)allSlots.push([li,ll]);
  const free=allSlots.filter(([li,ll])=>!usedSlots.has(li+','+ll));
  const slot=free.length>0?rnd(free):rnd(allSlots); // 빈 슬롯 없으면 그냥 랜덤
  return{
    id:`h${_noteId++}`,time:t,
    lineIndex:slot[0],lineLayer:slot[1],
    type:rnd(['left','right']),noteType:'heart',numVal:0,
    hit:false,missed:false,hitTime:undefined
  };
};

// ── 베기 라인 패턴 생성기 ──
// type: 'row'(가로줄), 'col'(세로줄), 'diag'(대각선)
// 같은 시간 간격으로 3~5개가 일렬로 날아와 광선검으로 쭉 베면 됨
function makeSlashLine(t, side, lineType, intraGap, mult){
  // lineType: 'row_bot','row_mid','row_top','col_L','col_R','diag_LR','diag_RL'
  let positions=[];
  if(lineType==='row_bot')      positions=[[0,0],[1,0],[2,0],[3,0]]; // 가로 하단
  else if(lineType==='row_mid') positions=[[0,1],[1,1],[2,1],[3,1]]; // 가로 중단
  else if(lineType==='row_top') positions=[[0,2],[1,2],[2,2],[3,2]]; // 가로 상단
  else if(lineType==='col_L')   positions=[[0,0],[0,1],[0,2],[1,0],[1,1]]; // 세로 왼쪽
  else if(lineType==='col_R')   positions=[[3,0],[3,1],[3,2],[2,0],[2,1]]; // 세로 오른쪽
  else if(lineType==='diag_LR') positions=[[0,0],[1,1],[2,2],[3,2]]; // 대각 좌하→우상
  else if(lineType==='diag_RL') positions=[[3,0],[2,1],[1,2],[0,2]]; // 대각 우하→좌상
  return positions.map(([li,ll],i)=>mkNote(side,li,ll,t+i*intraGap,mult));
}

// 새 노트 배치 생성 (time ~ time+window 범위)
function generateNotesInRange(fromT,toT,mult){
  const notes=[],obs=[];
  const diff=getDiffLevel(fromT);
  const beatGap=DIFF_BEAT_GAP[diff];
  const obsGap=DIFF_OBS_GAP[diff];
  const heartGap=DIFF_HEART_GAP[diff];

  // ── 장애물 먼저 생성 ──
  const ot=['top','left','right'];
  let ot_=Math.ceil(fromT/obsGap)*obsGap;
  while(ot_<toT){
    obs.push({id:`o${_obsId++}`,time:ot_,obstacleType:ot[Math.floor(ot_/obsGap)%3],hit:false});
    ot_+=obsGap;
  }
  // 장애물 시간 집합 (앞뒤 1.0초 버퍼)
  const OBS_BUF=1.0;
  const obsTimes=obs.map(o=>o.time);
  // O(1) 체크: 0.25초 단위 버킷으로 빠르게
  const obsSet=new Set(obsTimes.map(t=>Math.round(t*4)));
  const nearObs=(t)=>{
    const b=Math.round(t*4);
    for(let k=b-4;k<=b+4;k++) if(obsSet.has(k)) return true;
    return false;
  };

  // ── 일반 패턴 ──
  const NORMAL_PATTERNS=[
    [[rnd(lLn),0,'left'],[rnd(rLn),2,'right']],
    [[rnd(lLn),2,'left'],[rnd(rLn),0,'right']],
    [[rnd(lLn),1,'left'],[rnd(rLn),1,'right']],
    [[0,0,'left'],[1,1,'left'],[0,2,'left']],
    [[3,2,'right'],[2,1,'right'],[3,0,'right']],
    [[rnd(lLn),0,'left'],[rnd(rLn),2,'right'],[rnd(lLn),2,'left'],[rnd(rLn),0,'right']],
    [[2,0,'right'],[3,1,'right'],[2,2,'right']],
    [[1,2,'left'],[0,1,'left'],[1,0,'left']],
    [[rnd(lLn),0,'left'],[rnd(rLn),0,'right']],
    [[rnd(lLn),2,'left'],[rnd(rLn),2,'right']],
    [[1,2,'left'],[2,0,'right']],
    [[0,1,'left'],[3,1,'right']],
    [[rnd(lLn),rnd(aL),'left'],[rnd(rLn),rnd(aL),'right'],[rnd(lLn),rnd(aL),'left']],
    [[rnd(rLn),rnd(aL),'right'],[rnd(lLn),rnd(aL),'left'],[rnd(rLn),rnd(aL),'right']],
    [[0,0,'left'],[3,0,'right'],[0,2,'left'],[3,2,'right']],
    [[1,1,'left'],[2,1,'right']],
  ];

  // ── 슬래시 라인: 빠른 고정 간격으로 한 줄 연속 등장 ──
  // 칼로 슥 베면 다 터지도록 노트간 간격을 짧게 고정
  const SLASH_TYPES=['row_bot','row_mid','row_top','col_L','col_R','diag_LR','diag_RL'];
  const SLASH_GAP=0.14; // 노트 간격 0.14초 (빠르게 쭉 연속)
  const SLASH_INTERVAL=diff>=2?12:diff>=1?18:22; // 등장 최소 간격(초)
  const SLASH_PROB=diff>=2?0.35:diff>=1?0.28:0.22; // 등장 확률

  let t=Math.ceil(fromT/beatGap)*beatGap;
  let patIdx=Math.floor(fromT/5)%NORMAL_PATTERNS.length;
  let lastSlashT=-999;

  while(t<toT){
    if(nearObs(t)){t+=beatGap;continue;}

    const intraGap=diff>=3?beatGap*0.5:diff>=2?beatGap*0.6:beatGap*0.75;

    // 슬래시 라인 삽입 여부
    const doSlash=(t-lastSlashT)>SLASH_INTERVAL&&Math.random()<SLASH_PROB;
    if(doSlash){
      lastSlashT=t;
      const slashType=SLASH_TYPES[Math.floor(Math.random()*SLASH_TYPES.length)];
      const slashSide=Math.random()<0.5?'left':'right';
      const newNotes=makeSlashLine(t,slashSide,slashType,SLASH_GAP,mult);
      // nearObs 통과하는 것만 추가
      newNotes.forEach(n=>{if(n.time<toT&&!nearObs(n.time))notes.push(n);});
      // 슬래시 라인 끝난 뒤 beatGap*1.2 간격 두고 다음 패턴
      t+=newNotes.length*SLASH_GAP+beatGap*1.2;
      patIdx++;
      continue;
    }

    const pat=NORMAL_PATTERNS[patIdx%NORMAL_PATTERNS.length];
    pat.forEach((p,pi)=>{
      const nt=t+pi*intraGap;
      if(nt<toT&&!nearObs(nt)) notes.push(mkNote(p[2],p[0],p[1],nt,mult));
    });
    t+=Math.max(beatGap,pat.length*intraGap+beatGap*0.5);
    patIdx++;
  }

  // 하트
  let ht_=Math.ceil(fromT/heartGap)*heartGap;
  while(ht_<toT){
    if(!nearObs(ht_))notes.push(mkHeart(ht_,notes));
    ht_+=heartGap;
  }

  return{notes:notes.sort((a,b)=>a.time-b.time),obstacles:obs};
}

// reassignNums: numVal만 재배정 (배수 변경시 아직 안맞은 노트)
function reassignNums(notes,mult){
  // filter 없이 직접 순회 (배열 재생성 방지)
  for(let i=0;i<notes.length;i++){
    const n=notes[i];
    if(n.noteType==='note'&&!n.hit&&!n.missed)
      n.numVal=Math.random()<0.65?mulOf(mult):nonMulOf(mult);
  }
}

// 초기 채보 (첫 10초치 미리 생성, 4초 딜레이 후 시작)
function freshChart(mult){
  _noteId=0;_obsId=0;
  const START_DELAY=4; // 시작 4초 후부터 노트 등장
  const r=generateNotesInRange(START_DELAY,START_DELAY+10,mult);
  // 장애물도 딜레이 적용
  const obsDelayed=r.obstacles.filter(o=>o.time>=START_DELAY+3);
  return{notes:r.notes,obstacles:obsDelayed,genUntil:START_DELAY+10};
}

// ══════════════════════════════════════
// useMediaPipe
// ══════════════════════════════════════
function useMediaPipe(videoRef){
  const[ready,setReady]=useState(false);
  const[err,setErr]=useState(null);
  const handDataRef=useRef({left:null,right:null,lastTs:0});
  // grace: 손이 잠깐 안보여도 마지막 위치 유지 (프레임 카운터)
  const graceRef=useRef({left:0,right:0});
  // headRef: x,y = 얼굴 중심 정규화좌표, h = 얼굴높이/비디오높이, detected
  const headRef=useRef({x:0.5,y:0.4,h:0.3,detected:false});
  const lrRef=useRef(null);
  const hlRef=useRef(null),fdRef=useRef(null),rafRef=useRef(0);

  const toWorld=(x,y)=>{
    const xScale=_tier==='phone'?8.5:_tier==='tablet'?9.5:9.0;
    const yScale=_tier==='phone'?5.5:_tier==='tablet'?5.8:5.2;
    const yOff  =_tier==='phone'?-1.6:_tier==='tablet'?-1.7:-1.8;
    const wx=(0.5-x)*xScale;
    const wy=(1-y)*yScale+yOff;
    return new THREE.Vector3(wx,Math.max(-0.5,wy),0);
  };

  useEffect(()=>{
    let active=true,hlTs=0,fdTs=0;
    let fdTimer=null;

    async function setup(){
      try{
        const vision=await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm');
        if(!active)return;
        const hl=await HandLandmarker.createFromOptions(vision,{
          baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},
          runningMode:'VIDEO',numHands:2,
          minHandDetectionConfidence:0.7,minHandPresenceConfidence:0.5,minTrackingConfidence:0.5
        });
        if(!active){hl.close();return;}
        const fd=await FaceDetector.createFromOptions(vision,{
          baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',delegate:'GPU'},
          runningMode:'VIDEO',minDetectionConfidence:0.4
        });
        if(!active){hl.close();fd.close();return;}
        hlRef.current=hl;fdRef.current=fd;
        const isMob=_isMobileCache;
        const isTouchDev=_isTouchDevice();
        const stream=await navigator.mediaDevices.getUserMedia({video:{
          facingMode:'user',
          width:{ideal:isMob?480:isTouchDev?640:1280},
          height:{ideal:isMob?360:isTouchDev?480:720},
          frameRate:{ideal:60}
        }});
        if(videoRef.current&&active){
          videoRef.current.srcObject=stream;
          videoRef.current.onloadeddata=()=>{
            if(!active)return;
            // 워밍업: 첫 프레임으로 모델 미리 실행해서 초기 끊김 방지
            setTimeout(()=>{
              if(!active)return;
              try{
                const v2=videoRef.current;
                if(v2&&v2.videoWidth>0){
                  const ts=Math.floor(performance.now());
                  hlRef.current?.detectForVideo(v2,ts);
                }
              }catch(e){}
              setReady(true);
              fdLoop(); // 얼굴 감지 별도 루프 시작
              scheduleLoop(); // 손 감지 루프 시작
            },200);
          };
        }
      }catch(e){console.error(e);setErr(e.message);}
    }

    // 얼굴 감지: 완전 별도 타이머 (모바일 8fps=125ms, PC 10fps=100ms)
    // → 손+얼굴 동기 detectForVideo 이중 호출로 인한 프레임 스파이크 제거
    function fdLoop(){
      if(!active||!fdRef.current||!videoRef.current)return;
      const v=videoRef.current;
      if(v.videoWidth>0&&v.readyState>=2){
        try{
          const fdNow=Math.floor(performance.now());
          if(fdNow>fdTs){
            fdTs=fdNow;
            const fr=fdRef.current.detectForVideo(v,fdTs);
            if(fr.detections?.length>0){
              const bb=fr.detections[0].boundingBox;
              const W=v.videoWidth,H=v.videoHeight;
              const cx=(bb.originX+bb.width*0.5)/W;
              const cy=(bb.originY+bb.height*0.5)/H;
              const bh=bb.height/H;
              headRef.current={x:1-cx,y:cy,h:bh,detected:true};
            }else{
              headRef.current={...headRef.current,detected:false};
            }
          }
        }catch(e){}
      }
      fdTimer=setTimeout(fdLoop, 100);
    }

    // 손 감지: MessageChannel로 렌더 커밋 직후 유휴 슬롯에서 실행
    // Three.js rAF(paint) 후 → 다음 프레임 전 사이 공백에 추론 → 렌더 블로킹 없음
    const mc=new MessageChannel();
    let loopPending=false;
    function scheduleLoop(){
      if(loopPending||!active)return;
      loopPending=true;
      mc.port2.postMessage(null);
    }
    mc.port1.onmessage=()=>{
      loopPending=false;
      if(!videoRef.current||!hlRef.current||!active)return;
      const v=videoRef.current;
      if(v.videoWidth>0&&v.readyState>=2){
        hlTs=Math.max(hlTs+1,Math.floor(performance.now()));
        try{const hr=hlRef.current.detectForVideo(v,hlTs);lrRef.current=hr;processHands(hr);}
        catch(e){hlTs+=2;}
      }
      rafRef.current=requestAnimationFrame(scheduleLoop);
    };

    function processHands(hr){
      // ── MediaPipe 콜백: raw 목표값만 저장, 보간은 useFrame에서 ──
      const now=performance.now();
      const s=handDataRef.current;
      s.lastTs=now;
      const isMobile=_isMobileCache;
      const xScale=isMobile?9.0:_isTablet()?11.0:14.0;
      const yScale=isMobile?6.5:_isTablet()?7.0:8.0;
      const yOff=isMobile?-0.8:_isTablet()?-1.0:-1.4;

      let gotL=false,gotR=false;
      // 같은 side 중복 감지 시 신뢰도 높은 것만 채택 (좌우 꼬임 방지)
      const bestBySide={left:null,right:null};
      if(hr.landmarks?.length>0){
        for(let i=0;i<hr.landmarks.length;i++){
          const lm=hr.landmarks[i];
          const isRight=hr.handedness[i][0].categoryName==='Left';
          const side=isRight?'right':'left';
          const score=hr.handedness[i][0].score??0;
          // 이미 추적 중인 손이 있고 새 감지 신뢰도가 낮으면 무시 (사물 오인식 방지)
          if(s[side]&&score<0.6)continue;
          if(!bestBySide[side]||score>bestBySide[side].score)
            bestBySide[side]={lm,score};
        }
      }
      for(const side of['left','right']){
        const best=bestBySide[side];
        if(!best)continue;
        const lm=best.lm;
        const cx=(lm[0].x+lm[5].x+lm[17].x)/3;
        const cy=(lm[0].y+lm[5].y+lm[17].y)/3;
        const tx=(0.5-cx)*xScale;
        const ty=(1-cy)*yScale+yOff;

        // ── 칼날 방향: 손목(0) → 중지MCP(9) ──
        // 롱소드를 쥔 자세: 손목=칼자루끝, 손목→중지MCP = 칼이 뻗는 방향
        // 손을 세우면 중지MCP가 위 → 칼이 위, 휘두르면 그대로 추종
        // x: 미러 반전(-), y: 위가 양수(-), z: 깊이
        const sdx = -(lm[9].x - lm[0].x);
        const sdy = -(lm[9].y - lm[0].y);
        const sdz =  (lm[9].z - lm[0].z) * 2.5;
        const rawDir=new THREE.Vector3(sdx, sdy, sdz).normalize();

        if(!s[side])s[side]={pos:new THREE.Vector3(tx,ty,0),dir:rawDir.clone(),vel:new THREE.Vector3(),targetPos:new THREE.Vector3(tx,ty,0),targetDir:rawDir.clone(),graceCount:0};
        else{s[side].targetPos.set(tx,ty,0);s[side].targetDir.copy(rawDir);}
        s[side].graceCount=0;
        if(side==='right')gotR=true;else gotL=true;
      }
      // grace: 천천히 휘둘러도 끊기지 않게 (30fps 기준 ~0.5초)
      const GRACE_MAX=15;
      for(const side of['left','right']){
        if(side==='left'&&gotL)continue;
        if(side==='right'&&gotR)continue;
        if(s[side]){
          s[side].graceCount=(s[side].graceCount??0)+1;
          if(s[side].graceCount>GRACE_MAX)s[side]=null;
        }
      }
    }

    setup();
    return()=>{
      active=false;
      mc.port1.onmessage=null;
      cancelAnimationFrame(rafRef.current);clearTimeout(fdTimer);
      hlRef.current?.close();fdRef.current?.close();
      if(videoRef.current?.srcObject)videoRef.current.srcObject.getTracks().forEach(t=>t.stop());
    };
  },[videoRef]);
  return{isCameraReady:ready,handDataRef,headPositionRef:headRef,lastResultsRef:lrRef,error:err};
}

// Saber
// ══════════════════════════════════════
const _UP=new THREE.Vector3(0,1,0);

function Saber({type,handDataRef}){
  const grp=useRef(),glowRef=useRef(),coreRef=useRef();
  const col=type==='left'?COL.left:COL.right;
  const L=2.4;
  // 보간용 현재값 (useFrame에서 매 프레임 dt 기반으로 업데이트)
  const sPos=useRef(new THREE.Vector3(type==='left'?-2.0:2.0,0.8,0));
  const sQ=useRef(new THREE.Quaternion());
  const _tQ=useRef(new THREE.Quaternion()); // targetQ 재사용
  const swingAcc=useRef(0),lastSwingT=useRef(0);
  const hideTimer=useRef(1.2); // 처음부터 표시
  const idleT=useRef(0);
  const prevPos=useRef(new THREE.Vector3());

  useFrame((_,dt)=>{
    if(!grp.current)return;
    const data=type==='left'?handDataRef.current.left:handDataRef.current.right;
    if(data){
      hideTimer.current=1.2; // 손 잡히면 타이머 리셋 (빠른 스윙 대응)
      grp.current.visible=true;

      // ── 위치 보간: 지수 감쇠 (프레임레이트 독립적) ──
      // halfLife: 목표까지 절반 거리 도달 시간(초). 작을수록 빠름
      const tp=data.targetPos??data.pos;
      if(!tp)return;
      const dist=sPos.current.distanceTo(tp);
      const posHalfLife=Math.max(0.012, 0.038-dist*0.008);
      const posAlpha=1-Math.pow(0.5, dt/posHalfLife);
      sPos.current.lerp(tp, posAlpha);
      grp.current.position.copy(sPos.current);
      // 히트 판정용 pos 동기화
      data.pos.copy(sPos.current);

      // ── 방향 보간 ──
      const td=data.targetDir??data.dir;
      if(!td)return;
      // setFromUnitVectors: (0,1,0) → td 방향으로 칼 회전
      _tQ.current.setFromUnitVectors(_UP, td);
      const targetQ=_tQ.current;
      const angleDiff=sQ.current.angleTo(targetQ);
      const rotHalfLife=Math.max(0.018, 0.040-angleDiff*0.005);
      const rotAlpha=1-Math.pow(0.5, dt/rotHalfLife);
      sQ.current.slerp(targetQ, rotAlpha);
      grp.current.quaternion.copy(sQ.current);
      data.dir.set(0,1,0).applyQuaternion(sQ.current).normalize();

      // ── 스윙 속도 계산 ──
      const fvx=sPos.current.x-prevPos.current.x, fvy=sPos.current.y-prevPos.current.y, fvz=sPos.current.z-prevPos.current.z;
      const dtt=Math.max(dt,0.001);
      if(!data.vel)data.vel=new THREE.Vector3();
      data.vel.set(fvx/dtt,fvy/dtt,fvz/dtt);
      prevPos.current.copy(sPos.current);
      const spd=data.vel.length();
      swingAcc.current=THREE.MathUtils.lerp(swingAcc.current,Math.min(spd*0.07,1),0.35);
      // glowRef/coreRef: meshStandardMaterial (emissiveIntensity 있음)
      const glow=2.8+swingAcc.current*16;
      if(glowRef.current?.material?.emissiveIntensity!==undefined)glowRef.current.material.emissiveIntensity=glow;
      if(coreRef.current?.material?.emissiveIntensity!==undefined)coreRef.current.material.emissiveIntensity=glow*0.6;
      const now=performance.now();
      if(spd>2.5&&now-lastSwingT.current>110){lastSwingT.current=now;playSwing();}
      idleT.current=0;
    }else{
      // 손 없을 때: 타이머 소진 후 숨김
      hideTimer.current=Math.max(0,hideTimer.current-dt);
      if(hideTimer.current<=0)grp.current.visible=false;
      swingAcc.current*=0.85;
      idleT.current+=dt;
      const fx=Math.sin(idleT.current*1.3)*(type==='left'?-0.04:0.04);
      const fy=Math.sin(idleT.current*0.9)*0.03;
      grp.current.position.x+=fx;
      grp.current.position.y+=fy;
    }
  });

  // 손잡이 상세 구성: 하단 손잡이 + 가드 + 블레이드

  return(
    <group ref={grp}>
      {/* ── 손잡이 (하단) ── */}
      {/* 그립 본체 */}
      <mesh position={[0,-0.18,0]}>
        <cylinderGeometry args={[0.038,0.032,0.34,12]}/>
        <meshStandardMaterial color="#1a1a1a" roughness={0.4} metalness={0.95}/>
      </mesh>
      {/* 그립 링 (3개) */}
      {[-0.28,-0.18,-0.08].map((y,i)=>(
        <mesh key={i} position={[0,y,0]}>
          <torusGeometry args={[0.042,0.009,8,16]}/>
          <meshStandardMaterial color="#555" roughness={0.2} metalness={1}/>
        </mesh>
      ))}
      {/* 하단 캡 */}
      <mesh position={[0,-0.37,0]}>
        <sphereGeometry args={[0.036,8,8]}/>
        <meshStandardMaterial color="#888" roughness={0.1} metalness={1}/>
      </mesh>
      {/* ── 가드 (크로스) ── */}
      <mesh position={[0,0.02,0]} rotation={[0,0,Math.PI/2]}>
        <cylinderGeometry args={[0.018,0.018,0.52,10]}/>
        <meshStandardMaterial color="#999" roughness={0.15} metalness={1}/>
      </mesh>
      <mesh position={[0,0.02,0]}>
        <cylinderGeometry args={[0.028,0.022,0.06,10]}/>
        <meshStandardMaterial color="#ccc" roughness={0.05} metalness={1} emissive={col} emissiveIntensity={0.4}/>
      </mesh>
      {/* ── 블레이드 코어 (흰 빛줄기) ── */}
      <mesh position={[0,0.09+L/2,0]}>
        <cylinderGeometry args={[0.011,0.011,L,8]}/>
        <meshBasicMaterial color="white" toneMapped={false}/>
      </mesh>
      {/* 블레이드 글로우 외층 */}
      <mesh ref={glowRef} position={[0,0.09+L/2,0]}>
        <capsuleGeometry args={[0.044,L,8,14]}/>
        <meshStandardMaterial color={col} emissive={col} emissiveIntensity={2.8} toneMapped={false} transparent opacity={0.5}/>
      </mesh>
      {/* 블레이드 중간층 (색상 선명하게) */}
      <mesh ref={coreRef} position={[0,0.09+L/2,0]}>
        <capsuleGeometry args={[0.024,L,6,10]}/>
        <meshStandardMaterial color="white" emissive={col} emissiveIntensity={1.8} toneMapped={false} transparent opacity={0.75}/>
      </mesh>
      <pointLight color={col} intensity={6} distance={7} decay={2} position={[0,1.4,0]}/>
      <pointLight color={col} intensity={3} distance={4} decay={2} position={[0,-0.1,0]}/>
    </group>
  );
}

const GOOD_DIRS=(()=>{
  const d=[];
  for(let i=0;i<18;i++){const a=(i/18)*Math.PI*2;d.push([Math.cos(a),Math.sin(a)]);}
  return d;
})();
const BAD_DIRS=(()=>{
  const d=[];
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;d.push([Math.cos(a),Math.sin(a)]);}

})();

// 단일 파티클 (useRef 기반, re-render 없음)
function Particle({dx,dy,speed,size,color,life,gravity=true,spin=0,delay=0}){
  const r=useRef();
  useEffect(()=>{
    if(!r.current)return;
    _regParticle(r.current, life+delay, (m,t,dt,f)=>{
      const rt=t-delay; if(rt<0){m.visible=false;return;}
      const rf=rt/life;
      const grav=gravity?-6*rt*rt:0;
      m.position.set(dx*speed*rt,dy*speed*rt+grav,spin?Math.sin(rt*8+spin)*0.3:0);
      m.scale.setScalar(Math.max(0.01,(1-rf*rf)*1.2));
      if(m.material)m.material.opacity=Math.max(0,1-rf*1.4);
      m.visible=true;
    });
    _startParticle(r.current);
    return()=>_unregParticle(r.current);
  },[]);
  useFrame(()=>{});
  return(<mesh ref={r}><sphereGeometry args={[size,5,5]}/><meshBasicMaterial color={color} toneMapped={false} transparent opacity={1}/></mesh>);
}

// 별 모양 스파크 — 모바일에서 렌더 생략
function StarSpark({angle,speed,color,life,size=0.09}){
  const r=useRef();
  const ax=Math.cos(angle),ay=Math.sin(angle);
  useFrame((_,dt)=>{
    if(!r.current)return;
    const t=r.current.userData.t=(r.current.userData.t??0)+dt;
    if(t>life){r.current.visible=false;return;}
    r.current.visible=true;
    const f=t/life;
    // 초반 빠르게 → 감속
    const ease=1-f*f;
    r.current.position.set(ax*speed*ease*t*3,ay*speed*ease*t*3-2*t*t,0);
    r.current.rotation.z=t*12;
    r.current.scale.setScalar(Math.max(0.01,1-f*1.6));
    if(r.current.material)r.current.material.opacity=Math.max(0,1-f*1.8);
  });
  return(
    <mesh ref={r}>
      <octahedronGeometry args={[size,0]}/>
      <meshBasicMaterial color={color} toneMapped={false} transparent opacity={1}/>
    </mesh>
  );
}

// 팽창 링 — 모바일에서 렌더 생략
function ExpandRing({color,speed,maxR,life,axis='z'}){

const _glowRayGeo=new THREE.BoxGeometry(0.05,3.2,0.04);

// tsh를 자체 계산하는 단순 구체 메시 — 모바일 생략
function TshMesh({color,opacity0,scale0,life,hitTime,playStartRef,back=false}){
  const r=useRef();
  useFrame(()=>{
    if(!r.current)return;
    const tsh=(performance.now()-playStartRef.current)/1000-hitTime;
    const op=Math.max(0,opacity0-tsh*(opacity0/life));
    if(r.current.material)r.current.material.opacity=op;
    r.current.visible=tsh<life&&tsh>=0;
  });
  return(
    <mesh ref={r}>
      <sphereGeometry args={[scale0,8,8]}/>
      <meshBasicMaterial color={color} toneMapped={false} transparent opacity={opacity0} side={back?THREE.BackSide:THREE.FrontSide}/>
    </mesh>
  );
}
// 빛줄기 컴포넌트 — 모바일 생략
function GlowRay({rot,color,hitTime,playStartRef}){

  useFrame(()=>{
    if(!r.current)return;
    const tsh=(performance.now()-playStartRef.current)/1000-hitTime;
    const sc=Math.max(0.01,1-tsh*5.5);
    r.current.scale.set(1,sc,1);

// 불꽃 스파크 이펙트
function Spark({dx,dy,speed,color,life,delay=0}){
  const r=useRef();
  useEffect(()=>{
    if(!r.current)return;
    _regParticle(r.current, life+delay, (m,t,dt,f)=>{
      const rt=t-delay;
      if(rt<0){m.visible=false;return;}
      const rf=rt/life;
      const ease=Math.pow(Math.max(0,1-rf),0.4);
      const grav=-8*rt*rt;
      m.position.set(dx*speed*ease*rt, dy*speed*ease*rt+grav, (Math.random()-0.5)*0.05);
      m.rotation.z=Math.atan2(dy,dx)+Math.PI/2;
      const w=Math.max(0.001,0.012*(1-rf*rf));
      const h=Math.max(0.001,(0.08+0.12*ease)*(1-rf*1.2));
      m.scale.set(w,h,1);
      if(m.material)m.material.opacity=Math.max(0,1-rf*rf*1.6);
      m.visible=true;
    });
    _startParticle(r.current);
    return()=>_unregParticle(r.current);
  },[]);
  useFrame(()=>{});
  return(<mesh ref={r} geometry={_sparkGeo}><meshBasicMaterial color={color} toneMapped={false} transparent opacity={1}/></mesh>);
}

// 순간 플래시 디스크 (geometry 캐싱)
const _flashGeo=new THREE.CircleGeometry(1,12);
function FlashDisc({color,hitTime,playStartRef}){
  const r=useRef();
  useFrame(()=>{
    if(!r.current)return;
    const tsh=(performance.now()-playStartRef.current)/1000-hitTime;
    const f=tsh/0.12;
    if(tsh<0||tsh>0.12){r.current.visible=false;return;}
    r.current.visible=true;
    r.current.scale.setScalar(0.15+f*0.55);

  return(
    <mesh ref={r} geometry={_flashGeo}>
      <meshBasicMaterial color={color} toneMapped={false} transparent opacity={0.75}/>
    </mesh>
  );

function HitEffect({color,hitTime,playStartRef,isGood,isPenalty}){
  const g=useRef();
  const life=0.65;
  useFrame(()=>{
    if(!g.current)return;
    const tsh=(performance.now()-playStartRef.current)/1000-hitTime;
    g.current.visible=tsh<life&&tsh>=0;
  });
  const col=isPenalty?'#ff6600':isGood?color:'#cc8800';
  const baseCnt=isGood?26:12;
  const cnt=baseCnt;
  const sparks=useMemo(()=>Array.from({length:cnt},(_,i)=>{
    const a=(i/cnt)*Math.PI*2+(Math.random()-0.5)*0.3;
    const spd=isGood?(7+Math.random()*9):(4+Math.random()*5); // 더 빠르고 넓게
    // 색상: 흰색/노란/주황/본색 믹스
    const palette=['#ffffff','#ffe566','#ffaa22',col];
    const c=palette[i%palette.length];
    return{dx:Math.cos(a),dy:Math.sin(a),speed:spd,color:c,
      life:0.22+Math.random()*0.28, delay:i*0.005};
  }),[]);
  return(
    <group ref={g}>
      <FlashDisc color={col} hitTime={hitTime} playStartRef={playStartRef}/>
      {sparks.map((s,i)=><Spark key={i} {...s}/>)}
    </group>
  );
}

// SliceEffect - 물리 기반 두동강 이펙트
// ══════════════════════════════════════
// SliceEffect geometry 캐싱 (히트마다 생성 방지 → GPU 메모리 누수 제거)
const _sliceHalfH=PH*0.5;
const _sliceTopGeo=new THREE.BoxGeometry(PW,_sliceHalfH,PD);
const _sliceBotGeo=new THREE.BoxGeometry(PW,_sliceHalfH,PD);
const _sliceLineGeo=new THREE.PlaneGeometry(PW*1.3,0.022);
function SliceEffect({color,edgeCol,startPos,noteType,hitTime,playStartRef}){
  const topRef=useRef(),botRef=useRef(),lineRef=useRef();
  // 물리 상태: position, velocity, angularVelocity, opacity
  const phys=useRef({
    top:{vx:(noteType==='left'?-1.8:1.8)+(Math.random()-0.5)*0.8, vy:2.2+Math.random()*0.8, va:(noteType==='left'?-2.5:2.5)+Math.random()*1.0, rx:0, ry:0},
    bot:{vx:(noteType==='left'? 1.4:-1.4)+(Math.random()-0.5)*0.8, vy:-0.5-Math.random()*0.5, va:(noteType==='left'? 2.0:-2.0)+Math.random()*1.0, rx:0, ry:0},
    t:0, alive:true
  });
  const GRAVITY=-9.8;
  const LIFE=1.4; // 시야 밖 나가면 소멸

  useFrame((_,dt)=>{
    const p=phys.current;
    if(!p.alive)return;
    p.t+=dt;
    if(p.t>LIFE){p.alive=false;if(topRef.current)topRef.current.visible=false;if(botRef.current)botRef.current.visible=false;if(lineRef.current)lineRef.current.visible=false;return;}

    const fade=Math.max(0,1-p.t/LIFE);
    // 위 조각
    if(topRef.current){
      p.top.vy+=GRAVITY*dt;
      p.top.rx+=p.top.va*dt;
      p.top.ry+=(noteType==='left'?1.2:-1.2)*dt;
      const py=PH*0.27+p.top.vy*(p.t)-0.5*Math.abs(GRAVITY)*p.t*p.t*0.5;
      const px=p.top.vx*p.t;
      topRef.current.position.set(px,py,(noteType==='left'?0.1:-0.1)*p.t);
      topRef.current.rotation.set(p.top.ry*0.5,p.top.ry,p.top.rx);
      topRef.current.material.opacity=fade*0.95;
      // 시야 밖(y < -6 또는 |x| > 7)이면 바로 소멸
      if(topRef.current.position.y<-6||Math.abs(topRef.current.position.x)>7)p.alive=false;
    }
    // 아래 조각
    if(botRef.current){
      p.bot.vy+=GRAVITY*dt;
      p.bot.rx+=p.bot.va*dt;
      p.bot.ry+=(noteType==='left'?-1.0:1.0)*dt;
      const py2=-PH*0.27+p.bot.vy*(p.t)-0.5*Math.abs(GRAVITY)*p.t*p.t*0.5;
      const px2=p.bot.vx*p.t;
      botRef.current.position.set(px2,py2,(noteType==='left'?-0.1:0.1)*p.t);
      botRef.current.rotation.set(p.bot.ry*0.5,p.bot.ry,p.bot.rx);
      botRef.current.material.opacity=fade*0.95;
    }
    // 절단선 페이드
    // 절단선: 0.08초 안에 빠르게 사라짐
    if(lineRef.current)lineRef.current.material.opacity=Math.max(0,1-p.t*14);
  });

  const sliceH=PH*0.5;
  const bodyCol=noteType==='left'?'#3d0f0f':'#0d1a3d';
  return(
    <group>
      <mesh ref={topRef} position={[0,PH*0.27,0]} geometry={_sliceTopGeo}>
        <meshStandardMaterial color={bodyCol} emissive={color} emissiveIntensity={0.55} transparent opacity={0.9}/>
      </mesh>
      <mesh ref={botRef} position={[0,-PH*0.27,0]} geometry={_sliceBotGeo}>
        <meshStandardMaterial color={bodyCol} emissive={color} emissiveIntensity={0.55} transparent opacity={0.9}/>
      </mesh>
      <mesh ref={lineRef} position={[0,0,PD/2+0.012]} geometry={_sliceLineGeo}>
        <meshBasicMaterial color="white" toneMapped={false} transparent opacity={1}/>
      </mesh>
    </group>
  );
}

// NoteComp — useFrame으로 매 프레임 위치 업데이트 (끊김 제거)
// ══════════════════════════════════════
const panelGeo=new THREE.BoxGeometry(PW,PH,PD);
const edgesGeo=new THREE.EdgesGeometry(panelGeo);
const _noteFaceGeo=new THREE.PlaneGeometry(PW*0.92,PH*0.92); // 캐싱

function NoteComp({data,playStartRef,multRef}){
  const grp=useRef();
  const mult=multRef.current;
  const isHeart=data.noteType==='heart';
  const isCorrect=!isHeart&&data.numVal!==0&&data.numVal%mult===0;
  const noteColor=data.type==='left'?COL.left:COL.right;
  const edgeCol=noteColor;
  const laneX=_tier==='phone'?LANE_X_MB:_tier==='tablet'?LANE_X_TB:LANE_X_PC;
  const layerY=_tier==='phone'?LAYER_Y_MB:_tier==='tablet'?LAYER_Y_TB:LAYER_Y_PC;
  const nx=laneX[data.lineIndex], ny=layerY[data.lineLayer];
  const hitTimeRef=useRef(null);
  const visRef=useRef(true);

  useFrame(()=>{
    if(!grp.current)return;
    const time=(performance.now()-playStartRef.current)/1000;
    const cz=PLAYER_Z-(data.time-time)*NOTE_SPEED;
    // 히트된 경우: 히트 이펙트 위치 고정
    if(data.hit){
      if(hitTimeRef.current===null)hitTimeRef.current=time;
      grp.current.position.set(nx,ny,cz);
      return;
    }
    if(data.missed){grp.current.visible=false;return;}
    grp.current.visible=true;
    grp.current.position.set(nx,ny,cz);
  });

  if(data.missed)return null;

  if(data.hit&&data.hitTime!=null){
    return(
      <group ref={grp} position={[nx,ny,0]}>
        {!isHeart&&<SliceEffect color={noteColor} edgeCol={edgeCol} startPos={new THREE.Vector3(0,0,0)} noteType={data.type} hitTime={data.hitTime} playStartRef={playStartRef}/>}
        <HitEffect color={edgeCol} hitTime={data.hitTime} playStartRef={playStartRef} isGood={isCorrect||isHeart} isPenalty={data.isPenalty}/>
      </group>
    );
  }

  if(isHeart){
    return(
      <group ref={grp} position={[nx,ny,0]}>
        <mesh geometry={panelGeo}>
          <meshStandardMaterial color="#1a0010" roughness={0.2} metalness={0.6}
                emissive="#ec4899" emissiveIntensity={0.35} transparent opacity={0.45}/>
        </mesh>
        <Text position={[0,0,PD/2+0.02]} fontSize={PH*0.65} color="#ff6eb4" anchorX="center" anchorY="middle"
          outlineColor="#ec4899" outlineWidth={0.018}>♥</Text>
        <lineSegments geometry={edgesGeo}>
          <lineBasicMaterial color="#ec4899" toneMapped={false}/>
        </lineSegments>
        <pointLight color="#ec4899" intensity={1.8} distance={3} decay={2}/>
      </group>
    );
  }

  return(
    <group ref={grp} position={[nx,ny,0]}>
      <mesh geometry={panelGeo}>
        <meshStandardMaterial color={noteColor} roughness={0.05} metalness={0.15}
              emissive={noteColor} emissiveIntensity={0.22} transparent opacity={0.38}/>
      </mesh>
      <mesh position={[0,0,PD/2+0.002]} geometry={_noteFaceGeo}>
        <meshBasicMaterial color="white" transparent opacity={0.07}/>
      </mesh>
      <Text position={[0,0,PD/2+0.022]} fontSize={PH*0.52} color="#ffffff" anchorX="center" anchorY="middle"
          outlineColor={edgeCol} outlineWidth={isCorrect?0.04:0.022}>{data.numVal}</Text>
      <lineSegments geometry={edgesGeo}>
        <lineBasicMaterial color={edgeCol} toneMapped={false}/>
      </lineSegments>
      {isCorrect&&<pointLight color={COL.correct} intensity={0.9} distance={2.2} decay={2}/>}
    </group>
  );
}

// ObsComp - 반투명 장애물
// ══════════════════════════════════════
const obsGeoH=new THREE.BoxGeometry(5.4,0.65,0.45);
const obsGeoV=new THREE.BoxGeometry(0.65,4.2,0.45);
const obsConeGeo=new THREE.ConeGeometry(0.38,0.65,3);
// EdgesGeometry 캐싱 (ObsComp 렌더마다 생성 방지)
const obsEdgesH=new THREE.EdgesGeometry(obsGeoH);
const obsEdgesV=new THREE.EdgesGeometry(obsGeoV);

function ObsComp({data,playStartRef}){
  const grpRef=useRef();
  const mRef=useRef();
  const col=COL.obstacle;
  const baseX=data.obstacleType==='top'?0:data.obstacleType==='left'?-2.8:2.8;
  const baseY=data.obstacleType==='top'?3.1:1.7;
  useFrame((s)=>{
    // emissiveIntensity는 PC(meshStandardMaterial)에만 존재
    if(mRef.current)mRef.current.emissiveIntensity=0.25+Math.sin(s.clock.elapsedTime*6)*0.35;
    if(grpRef.current){
      const time=(performance.now()-playStartRef.current)/1000;
      const cz=PLAYER_Z-(data.time-time)*NOTE_SPEED;
      grpRef.current.position.set(baseX,baseY,cz);
    }
  });
  // 인라인 컴포넌트 금지 — 매 렌더마다 새 타입 생성 → R3F unmount/remount GC 스파이크
  const isTop=data.obstacleType==='top';
  const isLeft=data.obstacleType==='left';
  const geoBody=isTop?obsGeoH:obsGeoV;
  const geoEdges=isTop?obsEdgesH:obsEdgesV;
  const conePos=isTop?[0,-0.52,0.24]:isLeft?[0.55,0,0.24]:[-0.55,0,0.24];
  const coneRot=isTop?[0,0,Math.PI]:isLeft?[0,0,-Math.PI/2]:[0,0,Math.PI/2];
  return(
    <group ref={grpRef} position={[baseX,baseY,0]}>
      <mesh geometry={geoBody}>
        <meshStandardMaterial ref={mRef} color={col} emissive={col}
              emissiveIntensity={0.4} roughness={0.15} metalness={0.4} transparent opacity={0.38} depthWrite={false}/>
      </mesh>
      <lineSegments geometry={geoEdges}>
        <lineBasicMaterial color={col} toneMapped={false} transparent opacity={0.7}/>
      </lineSegments>
      <mesh position={conePos} rotation={coneRot} geometry={obsConeGeo}>
        <meshBasicMaterial color={col} toneMapped={false} transparent opacity={0.85}/>
      </mesh>
      <pointLight color={col} intensity={2.2} distance={5} decay={2}/>
    </group>
  );
}

// WebcamPreview
// ══════════════════════════════════════
const _fs=(b,mn=10,mx=999)=>({fontSize:`clamp(${mn}px,${b},${mx}px)`});
const HCONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
function WebcamPreview({videoRef,resultsRef,isCameraReady}){
  const cv=useRef();
  useEffect(()=>{
    if(!isCameraReady)return;let af;
    const TARGET_FPS=30;
    const INTERVAL=1000/TARGET_FPS;
    let lastDraw=0;
    const draw=(ts)=>{
      af=requestAnimationFrame(draw);
      if(ts-lastDraw<INTERVAL)return;
      lastDraw=ts;
      const c=cv.current,v=videoRef.current;
      if(c&&v&&v.readyState>=2&&v.videoWidth>0){
        // 프리뷰 버퍼는 320x240 고정: drawImage 비용은 대상 버퍼 크기에 비례
        // 실제 스트림이 480x360이어도 미리보기 표시 목적이므로 축소 드로우
        if(c.width!==320||c.height!==240){c.width=320;c.height=240;}
        const W=c.width,H=c.height,ctx=c.getContext('2d');
        ctx.save();ctx.scale(-1,1);ctx.translate(-W,0);ctx.drawImage(v,0,0,W,H);ctx.restore();
        const res=resultsRef.current;
        if(res?.landmarks){
          for(let i=0;i<res.landmarks.length;i++){
            const lms=res.landmarks[i];
            const isR=res.handedness[i]?.[0]?.categoryName==='Left';
            const col=isR?COL.right:COL.left;
            ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';
            ctx.beginPath();for(const[a,b]of HCONN){const p1=lms[a],p2=lms[b];ctx.moveTo((1-p1.x)*W,p1.y*H);ctx.lineTo((1-p2.x)*W,p2.y*H);}ctx.stroke();
            ctx.fillStyle=col;for(const lm of lms){ctx.beginPath();ctx.arc((1-lm.x)*W,lm.y*H,3,0,Math.PI*2);ctx.fill();}
            const t=lms[8];ctx.fillStyle='#fff';ctx.beginPath();ctx.arc((1-t.x)*W,t.y*H,5,0,Math.PI*2);ctx.fill();
          }
        }
      }
    };
    af=requestAnimationFrame(draw);return()=>cancelAnimationFrame(af);
  },[isCameraReady,videoRef,resultsRef]);
  if(!isCameraReady)return null;
  const isPhone=_isMobileCache;
  const isTab=_isTablet();
  return(
    <div style={{position:'fixed',
      bottom: isPhone?'auto':8,
      top: isPhone?8:'auto',
      right:8,
      width: isPhone?'clamp(60px,15vw,90px)':isTab?'clamp(120px,14vw,160px)':'clamp(110px,16vw,190px)',
      height: isPhone?'clamp(80px,20vw,120px)':isTab?'clamp(90px,10.5vw,120px)':'clamp(82px,12vw,142px)',
      border:'2px solid rgba(59,130,246,.45)',borderRadius:9,overflow:'hidden',
      zIndex:50,pointerEvents:'none',background:'#000',
      opacity: isPhone?0.72:1}}>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:1,background:'rgba(0,0,0,.6)',
        fontSize:8,color:'rgba(147,197,253,.8)',padding:'2px 4px',fontFamily:'monospace',letterSpacing:1}}>CAM</div>
      <canvas ref={cv} width={320} height={240}
        style={{display:'block',width:'100%',height:'100%',marginTop:12,objectFit:'cover'}}/>
    </div>
  );
}

// ── 티어별 레인/레이어 캐시 (useFrame 안에서 재계산 방지) ──
// _tier 변경은 resize 시에만 발생 → 컴포넌트 레벨이 아닌 모듈 레벨 함수로 캐싱
function _getLaneX(){return _tier==='phone'?LANE_X_MB:_tier==='tablet'?LANE_X_TB:LANE_X_PC;}
function _getLayerY(){return _tier==='phone'?LAYER_Y_MB:_tier==='tablet'?LAYER_Y_TB:LAYER_Y_PC;}
function _getThresholds(){
  return _tier==='phone'?{top:0.52,side:0.42}:_tier==='tablet'?{top:0.51,side:0.41}:{top:0.50,side:0.40};
}
const _POMMEL_OFF=-0.37, _TIP_OFF=2.49, _HIT_R=0.92;
function bladeHit(hand, nx, ny){
  if(!hand)return false;
  const {pos,dir}=hand;
  const bx0=pos.x+dir.x*_POMMEL_OFF, by0=pos.y+dir.y*_POMMEL_OFF;
  const bx1=pos.x+dir.x*_TIP_OFF,   by1=pos.y+dir.y*_TIP_OFF;
  const dxB=bx1-bx0, dyB=by1-by0;
  const lenSq=dxB*dxB+dyB*dyB;
  let t2=0;
  if(lenSq>0.0001) t2=Math.max(0,Math.min(1,((nx-bx0)*dxB+(ny-by0)*dyB)/lenSq));
  const cx2=bx0+t2*dxB, cy2=by0+t2*dyB;
  return Math.sqrt((cx2-nx)**2+(cy2-ny)**2)<_HIT_R;
}

// ══════════════════════════════════════
// GameScene
// ══════════════════════════════════════
function GameScene({gameStatus,audioRef,handDataRef,headPositionRef,
                    chartRef,multRef,playStartRef,
                    onNoteHit,onNoteMiss,onObstacleHit,onMultChange,
                    onWallStart,onWallHit,onWallBreak,onWallTimeout,wallRef,wallVisible,wallBreaking}){
  const[tick,setTick]=useState(0);
  const bump=useCallback(()=>setTick(t=>t+1),[]);
  const ctRef=useRef(0); // 실시간 게임시간 ref — state 지연 없음
  const[ctDisplay,setCtDisplay]=useState(0); // 렌더용 (낮은 빈도로 업데이트)
  const shk=useRef(0),camRef=useRef(),ambRef=useRef(),spotRef=useRef();
  const lmcRef=useRef(0),obsCool=useRef(0),ctTs=useRef(0);
  const lastWallScoreRef=useRef(0); // 마지막 벽 이벤트 점수 기준

  // 게임 리셋: PLAYING 전환 시마다 내부 상태 초기화
  useEffect(()=>{
    if(gameStatus!==GS.PLAYING)return;
    ctRef.current=0;
    lmcRef.current=0;obsCool.current=0;setCtDisplay(0);bump();
  },[gameStatus]);

  useFrame((_,dt)=>{
    if(gameStatus===GS.PLAYING){
      const pulse=Math.pow(1-((ctRef.current%BEAT)/BEAT),4);
      if(ambRef.current)ambRef.current.intensity=0.12+pulse*0.19;
      if(spotRef.current)spotRef.current.intensity=0.32+pulse*0.95;
    }
    if(shk.current>0&&camRef.current){
      const sh=shk.current;
      const cy=camPosRef.current.y, cz=camPosRef.current.z;
      camRef.current.position.set((Math.random()-.5)*sh,cy+(Math.random()-.5)*sh,cz+(Math.random()-.5)*sh);
      shk.current=THREE.MathUtils.lerp(shk.current,0,14*dt);
      if(shk.current<0.01){shk.current=0;camRef.current.position.set(0,cy,cz);}
    }
    if(gameStatus!==GS.PLAYING||!audioRef.current)return;
    const time=(performance.now()-playStartRef.current)/1000;
    ctRef.current=time; // 매 프레임 즉시 갱신
    const now=performance.now();
    if(now-ctTs.current>100){ctTs.current=now;setCtDisplay(time);} // 렌더용은 100ms마다(~10fps)

    // ── 무한 노트 스트리밍 (벽 이벤트 중엔 중단) ──
    const wallActive=wallRef?.current?.pending
      ||wallRef?.current?.state==='approaching'
      ||wallRef?.current?.state==='stopped'
      ||wallRef?.current?.state==='breaking';
    const STREAM_AHEAD=8; // 8초치만 미리 생성 (12→8: GC 스파이크 감소)
    const STREAM_CHUNK=3; // 한 번에 3초치씩만 추가 (대량 생성 방지)
    if(!wallActive && time+STREAM_AHEAD>chartRef.current.genUntil){
      const fromT=chartRef.current.genUntil;
      const toT=fromT+STREAM_CHUNK; // 3초치씩만
      const newData=generateNotesInRange(fromT,toT,multRef.current);
      for(let i=0;i<newData.notes.length;i++) chartRef.current.notes.push(newData.notes[i]);
      for(let i=0;i<newData.obstacles.length;i++) chartRef.current.obstacles.push(newData.obstacles[i]);
      chartRef.current.genUntil=toT;
    }

    // ── 배수 변경 ──
    const multInterval=time<60?20:time<120?12:5;
    if(time-lmcRef.current>multInterval){
      lmcRef.current=time;
      let newMult;
      do{newMult=MULT_OPTS[Math.floor(Math.random()*MULT_OPTS.length)];}
      while(newMult===multRef.current&&MULT_OPTS.length>1);
      multRef.current=newMult;
      const ahead=Math.abs(SPAWN_Z-PLAYER_Z)/NOTE_SPEED;
      // filter 없이 직접 reassign (ahead 이후 노트만)
      const aheadT=time+ahead*0.5;
      for(let i=0;i<chartRef.current.notes.length;i++){
        const n=chartRef.current.notes[i];
        if(n.time>aheadT&&n.noteType==='note'&&!n.hit&&!n.missed)
          n.numVal=Math.random()<0.65?mulOf(newMult):nonMulOf(newMult);
      }
      onMultChange(newMult);
      bump();
    }

    // ── 메모리 정리: 완전히 지나간(hit or missed) 오래된 노트 제거 ──
    if(Math.floor(time*0.1)!==Math.floor((time-dt)*0.1)){ // 10초마다 정리
      const cutoff=time-12;
      chartRef.current.notes=chartRef.current.notes.filter(n=>n.time>cutoff);
      chartRef.current.obstacles=chartRef.current.obstacles.filter(o=>o.time>cutoff);
    }

    const hd=handDataRef.current;
    const lHand=hd.left??null,rHand=hd.right??null;
    const head=headPositionRef.current;
    const mult=multRef.current;

    // ── 광선검 히트 판정 (함수는 모듈 레벨에 정의됨) ──
    const HIT_WIN=3.5;

    let anyChange=false;
    const notes=chartRef.current.notes;
    for(let i=0;i<notes.length;i++){
      const n=notes[i];
      if(n.hit||n.missed)continue;
      const cz=PLAYER_Z-(n.time-time)*NOTE_SPEED;
      if(cz<PLAYER_Z-7.0)continue;
      if(cz>MISS_Z){n.missed=true;onNoteMiss(n);anyChange=true;continue;}
      // 히트 판정창 안에 있을 때만 히트 체크
      if(cz>PLAYER_Z-HIT_WIN&&cz<PLAYER_Z+HIT_WIN){
        const laneX2=_getLaneX();
        const layerY2=_getLayerY();
        const nx=laneX2[n.lineIndex],ny=layerY2[n.lineLayer];
        const isCorrect=n.noteType==='heart'||(n.numVal!==0&&n.numVal%mult===0);
        let hitHand=null,hitVel=null;
        for(const[hand,side]of[[lHand,'left'],[rHand,'right']]){
          if(bladeHit(hand,nx,ny)){hitHand=side;hitVel=hand?.vel;break;}
        }
        if(hitHand!==null){
          n.hit=true;n.hitTime=time;
          const colorMatch=(hitHand===n.type);
          n.isPenalty=!isCorrect&&!colorMatch;
          shk.current=isCorrect||colorMatch?0.17:0.08;
          onNoteHit(n,isCorrect,colorMatch,(hitVel?.length()??0)>=0.5,n.isPenalty);
          anyChange=true;
        }
      }
    }
    if(anyChange)bump();

    // ── 장애물: chartRef.current.obstacles 직접 순회 ──
    if(obsCool.current>0)obsCool.current-=dt;
    const obstacles=chartRef.current.obstacles;
    for(let i=0;i<obstacles.length;i++){
      const o=obstacles[i];
      if(o.hit)continue;
      const cz=PLAYER_Z-(o.time-time)*NOTE_SPEED;
      if(cz<PLAYER_Z-2.5)continue;
      // 판정 존 지나침: 자동 통과 (피한 것으로 간주)
      if(cz>MISS_Z+1){o.hit=true;continue;}
      if(cz<=PLAYER_Z+1.5&&obsCool.current<=0){
        if(!head.detected){
          // 얼굴 미감지 → 피한 것으로 간주 (페널티 없음)
          o.hit=true; // 통과 처리
        } else {
          const thresh=_getThresholds();
          const topThresh=thresh.top;
          const sideThresh=thresh.side;
          const hit=o.obstacleType==='top'  ? head.y<topThresh
                   :o.obstacleType==='left' ? head.x<(1-sideThresh)
                   :                          head.x>(sideThresh);
          if(hit){o.hit=true;obsCool.current=2.5;shk.current=0.85;onObstacleHit();}
          // 피한 경우: hit 처리 안 함 → 장애물이 그냥 지나쳐 사라짐
        }
      }
    }
  });

  const visNotes=useMemo(()=>{
    const ct=ctRef.current;
    const wallOn=wallRef?.current?.pending||wallRef?.current?.state==='stopped'||wallRef?.current?.state==='approaching'||wallRef?.current?.state==='breaking';
    if(wallOn)return[];
    return chartRef.current.notes.filter(n=>!n.missed&&(!n.hit||(ct-(n.hitTime??0))<1.2)&&n.time-ct<5.5&&n.time-ct>-3);
  },[tick,ctDisplay]);
  const visObs=useMemo(()=>{
    const ct=ctRef.current;
    const wallOn=wallRef?.current?.pending||wallRef?.current?.state==='stopped'||wallRef?.current?.state==='approaching'||wallRef?.current?.state==='breaking';
    if(wallOn)return[];
    return chartRef.current.obstacles.filter(o=>!o.hit&&o.time-ct<5.5&&o.time-ct>-2.5);
  },[tick,ctDisplay]);

  const isPlaying=gameStatus===GS.PLAYING;
  const isActive=isPlaying||(gameStatus&&gameStatus!=='LOADING');
  const isMob=_isMobileCache;
  const camY=isMob?1.5:_isTablet()?1.6:1.8;
  const camZ=isMob?3.2:_isTablet()?3.6:4.0;
  const camFov=isMob?78:_isTablet()?70:65;
  // camY/camZ를 ref에 저장 → useFrame에서 재계산 없이 참조
  const camPosRef=useRef({y:camY,z:camZ});
  camPosRef.current.y=camY;
  camPosRef.current.z=camZ;
  return(
    <>
      <PerspectiveCamera ref={camRef} makeDefault
        position={[0, camY, camZ]}
        fov={camFov}/>
      {/* 배경/조명/별 - IDLE부터 미리 렌더해서 게임시작 깜박임 방지 */}
      {isActive&&<>
        <fog attach="fog" args={['#05050a',14,50]}/>
        <ambientLight ref={ambRef} intensity={0.12}/>
        <spotLight ref={spotRef} position={[0,8,4]} angle={0.65} penumbra={1} intensity={0.62} castShadow={false}/>
        <>
          <Grid position={[0,0,0]} args={[6,80]} cellThickness={0.07} cellColor="#14142a"
            sectionSize={4} sectionThickness={1.1} sectionColor="#18307a" fadeDistance={46} infiniteGrid/>
          <mesh rotation={[-Math.PI/2,0,0]} position={[0,-0.01,0]}>
            <planeGeometry args={[4,80]}/><meshStandardMaterial color="#07070d" roughness={1} metalness={0}/>
          </mesh>
        </>
        <Stars radius={40} depth={40} count={350} factor={3} saturation={0} fade speed={0.4}/>
      </>}
      {/* 게임 오브젝트 - PLAYING일 때만 */}
      {isPlaying&&<>
        <Saber type="left"  handDataRef={handDataRef}/>
        <Saber type="right" handDataRef={handDataRef}/>
        {visNotes.map(n=><NoteComp key={n.id} data={n} playStartRef={playStartRef} multRef={multRef}/>)}
        {visObs.map(o=><ObsComp key={o.id} data={o} playStartRef={playStartRef}/>)}
        {wallRef&&<WallComp wallRef={wallRef} playStartRef={playStartRef}
          handDataRef={handDataRef} onWallHit={onWallHit} onWallBreak={onWallBreak} onWallTimeout={onWallTimeout}
          wallVisible={wallVisible} wallBreaking={wallBreaking}/>}
      </>}
    </>
  );
}

function HeartIcon({filled}){
  const sz='clamp(24px,5vw,34px)';
  return(
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
      style={{width:sz,height:sz,display:'block',flexShrink:0,

}

// ══════════════════════════════════════
// HandButton — 손을 올려 1초 유지하면 버튼 실행
// ══════════════════════════════════════
function HandButton({label,onActivate,handDataRef,color='#2563eb',icon='▶'}){
  const btnRef=useRef();
  const circleRef=useRef();
  const timerRef=useRef(0);
  const firedRef=useRef(false);

  useEffect(()=>{
    firedRef.current=false;
    timerRef.current=0;
  },[label]);

  useEffect(()=>{
    if(!handDataRef)return;
    let raf;
    const HOLD_TIME=1.0;
    let lastT=performance.now();
    const tick=()=>{
      raf=requestAnimationFrame(tick);
      if(firedRef.current)return;
      const btn=btnRef.current;
      if(!btn)return;
      const now=performance.now();
      const dt=Math.min(0.05,(now-lastT)/1000);
      lastT=now;
      const rect=btn.getBoundingClientRect();
      const hd=handDataRef.current;
      const isMobile=_isMobileCache;
      const xScale=isMobile?13.0:_isTablet()?13.5:14.0, yScale=isMobile?8.5:_isTablet()?8.2:8.0, yOff=isMobile?-1.2:_isTablet()?-1.3:-1.4;
      const W=window.innerWidth, H=window.innerHeight;
      const PAD=44;
      let hovering=false;
      for(const side of['left','right']){
        const hand=hd[side];
        if(!hand)continue;
        const tp=hand.targetPos??hand.pos;
        if(!tp)continue;
        const sx=(0.5+tp.x/xScale)*W, sy=(1-(tp.y-yOff)/yScale)*H; // 미러 보정
        if(sx>=rect.left-PAD&&sx<=rect.right+PAD&&sy>=rect.top-PAD&&sy<=rect.bottom+PAD){hovering=true;break;}
      }
      if(hovering){
        timerRef.current=Math.min(HOLD_TIME,timerRef.current+dt);
        if(timerRef.current>=HOLD_TIME&&!firedRef.current){firedRef.current=true;onActivate();return;}
      }else{
        timerRef.current=Math.max(0,timerRef.current-dt*2);
      }
      // DOM 직접 업데이트 (setState 없음)
      const pct=timerRef.current/HOLD_TIME;
      if(circleRef.current){
        const dash=pct*289;
        circleRef.current.setAttribute('stroke-dasharray',`${dash} 289`);
        circleRef.current.parentElement.style.opacity=pct>0.02?'1':'0';
      }
      if(btn){
        const active=pct>0.02;
        btn.style.background=active?color:'rgba(255,255,255,.1)';
        btn.style.boxShadow=active?`0 0 24px ${color}`:'none';
        btn.style.transform=active?'scale(1.05)':'scale(1)';
        btn.style.border=active?'none':'1px solid rgba(255,255,255,.22)';
      }
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[handDataRef,onActivate,color]);

  return(
    <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}
      onClick={onActivate}>
      <svg style={{position:'absolute',top:-8,left:-8,right:-8,bottom:-8,
        width:'calc(100% + 16px)',height:'calc(100% + 16px)',pointerEvents:'none',opacity:0}}
        viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="5"/>
        <circle ref={circleRef} cx="50" cy="50" r="46" fill="none" stroke={color} strokeWidth="5"
          strokeLinecap="round" strokeDasharray="0 289" transform="rotate(-90 50 50)"/>
      </svg>
      <button ref={btnRef} style={{background:'rgba(255,255,255,.1)',color:'#fff',fontWeight:700,
        padding:'13px 38px',borderRadius:999,border:'1px solid rgba(255,255,255,.22)',
        cursor:'pointer',display:'flex',alignItems:'center',gap:8,
        transition:'transform 0.1s',fontSize:'clamp(14px,3.5vw,18px)'}}>
        {icon} {label}
      </button>
    </div>
  );
}

// ══════════════════════════════════════
// HandCursor — DOM 직접 조작으로 setState 없이 60fps 렌더
// ══════════════════════════════════════
function HandCursor({handDataRef}){
  const dotRefs=[useRef(),useRef()];
  const containerRef=useRef();
  useEffect(()=>{
    const isMobile=_isMobileCache;
    const xScale=isMobile?13.0:_isTablet()?13.5:14.0;
    const yScale=isMobile?8.5:_isTablet()?8.2:8.0;
    const yOff=isMobile?-1.2:_isTablet()?-1.3:-1.4;
    const sides=['left','right'];
    const colors=['rgba(239,68,68,0.85)','rgba(59,130,246,0.85)'];
    const glows=['#ef4444','#3b82f6'];
    let raf;
    const tick=()=>{
      raf=requestAnimationFrame(tick);
      const W=window.innerWidth,H=window.innerHeight;
      const hd=handDataRef.current;
      sides.forEach((side,i)=>{
        const el=dotRefs[i].current;
        if(!el)return;
        const hand=hd[side];
        if(!hand){el.style.display='none';return;}
        const tp=hand.targetPos??hand.pos;
        if(!tp){el.style.display='none';return;}
        const sx=(0.5+tp.x/xScale)*W; // 미러 카메라 보정
        const sy=(1-(tp.y-yOff)/yScale)*H;
        el.style.display='block';
        el.style.left=(sx-16)+'px';
        el.style.top=(sy-16)+'px';
      });
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[handDataRef]);
  return(
    <div ref={containerRef} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:55}}>
      {['left','right'].map((side,i)=>(
        <div key={side} ref={dotRefs[i]} style={{
          position:'absolute',display:'none',
          width:32,height:32,borderRadius:'50%',
          background:side==='left'?'rgba(239,68,68,0.85)':'rgba(59,130,246,0.85)',
          border:'2.5px solid rgba(255,255,255,0.9)',
          boxShadow:`0 0 14px ${side==='left'?'#ef4444':'#3b82f6'}`,
          pointerEvents:'none',
        }}/>
      ))}
    </div>
  );
}

// App
// ══════════════════════════════════════
function App(){
  const[gs,setGs]=useState(GS.LOADING);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[hearts,setHearts]=useState(MAX_HEARTS);
  const[mult,setMult]=useState(5);   // UI 표시용만
  const[obsW,setObsW]=useState(null);
  const[flash,setFlash]=useState(false);
  const[hitMsg,setHitMsg]=useState(null);

  const audioRef=useRef(null);
  if(audioRef.current===null){const a=new Audio(SONG_URL);a.loop=true;audioRef.current=a;}
  const videoRef=useRef(null);
  const comboRef=useRef(0);
  const multRef=useRef(5);
  const chartRef=useRef({notes:[],obstacles:[],genUntil:0});
  const playTimeRef=useRef(0);
  const playStartRef=useRef(0);
  // 벽 이벤트
  const wallRef=useRef({state:'idle',z:WALL_SPAWN_Z}); // state: idle/approaching/stopped/breaking
  const[wallUI,setWallUI]=useState(null); // null | {hits, breaking}
  const[wallWarning,setWallWarning]=useState(false);
  const[wallVisible,setWallVisible]=useState(false);
  const[wallBreaking,setWallBreaking]=useState(false);
  const wallHitCountRef=useRef(0);
  const lastWallScoreRef=useRef(0);

  const{isCameraReady,handDataRef,headPositionRef,lastResultsRef,error:camErr}=useMediaPipe(videoRef);
  useEffect(()=>{comboRef.current=combo;},[combo]);

  // 타이머 추적: 게임 종료/재시작 시 고아 타이머 전부 제거
  const _timers=useRef([]);
  const _safeTO=(fn,ms)=>{const id=setTimeout(fn,ms);_timers.current.push(id);return id;};
  const _clearTimers=()=>{_timers.current.forEach(clearTimeout);_timers.current=[];};
  useEffect(()=>()=>_clearTimers(),[]);

  const showMsg=useCallback((text,color)=>{setHitMsg({text,color});_safeTO(()=>setHitMsg(null),1050);},[]);
  const doDamage=useCallback(()=>{
    setFlash(true);_safeTO(()=>setFlash(false),320);playDamage();
    setHearts(h=>{if(h<=1){_safeTO(()=>{setGs(GS.GAME_OVER);audioRef.current?.pause();},80);return 0;}return h-1;});
  },[]);

  // onNoteHit(note, isCorrect, colorMatch, fastEnough, isPenalty)
  const onHit=useCallback((note,isCorrect,colorMatch,fast,isPenalty)=>{
    if(note.noteType==='heart'){
      playSaberSlice();playHeart();setHearts(h=>Math.min(MAX_HEARTS,h+1));showMsg('💖 +1 라이프!','#ec4899');setCombo(c=>c+1);return;
    }
    if(isCorrect&&colorMatch){
      playSaberSlice();playHit(true);setScore(s=>s+300);setCombo(c=>c+1);
      showMsg(`🎯 +300 완벽!`,'#fbbf24');
    }else if(isCorrect){
      playSaberSlice();playHit(true);setScore(s=>s+100);setCombo(c=>c+1);
      showMsg(`✓ +100 정답!`,'#f59e0b');
    }else if(colorMatch){
      playSaberSlice();playHit(false);setScore(s=>s+50);
      showMsg(`△ +50 색 일치`,(note.type==='left'?COL.left:COL.right));
    }else{
      playMiss();setScore(s=>Math.max(0,s-50));setCombo(0);
      showMsg(`❌ -50 오답!`,'#ff4444');
      doDamage();
    }
  },[showMsg,doDamage]);

  const onMiss=useCallback((note)=>{
    playMiss();setCombo(0);
    // 정답 배수 노트 또는 하트만 놓쳤을 때 하트 감소
    // 오답(색만 같은 50점짜리 등) 노트를 놓쳐도 하트 안 빠짐
    const isCorrect=note.noteType==='heart'||(note.numVal!==0&&note.numVal%multRef.current===0);
    if(isCorrect)doDamage();
  },[doDamage]);

  const onObsHit=useCallback(()=>{setCombo(0);showMsg('💥 장애물 충돌!','#ff6600');doDamage();},[doDamage,showMsg]);

  // 벽 이벤트 콜백
  const wallUIThrottle=useRef(0);
  const onWallHit=useCallback((count)=>{
    playHit(true);
    const now=performance.now();
    if(now-wallUIThrottle.current>120){
      wallUIThrottle.current=now;
      setWallUI({hits:count,breaking:false});
    }
  },[]);

  const onWallBreak=useCallback(()=>{
    showMsg('💥 벽 파괴!','#f97316');
    playWallBreak();
    wallRef.current.state='breaking'; // 즉시 히트판정/타이머 중단
    setWallUI({hits:WALL_HITS_NEEDED,breaking:true});
    setWallBreaking(true);
    _safeTO(()=>{
      const t=(performance.now()-playStartRef.current)/1000;
      const TRAVEL=Math.abs(SPAWN_Z-PLAYER_Z)/NOTE_SPEED;
      const resumeT=t+TRAVEL+0.5; // 파괴 후 TRAVEL+1.5초 뒤부터 노트 생성
      // ① genUntil 먼저 설정 (state='idle' 전에 해야 스트리밍이 즉시 재개 안 됨)
      chartRef.current.genUntil=Math.max(chartRef.current.genUntil, resumeT);
      // ② 가까운 노트/장애물 제거
      chartRef.current.notes=chartRef.current.notes.filter(n=>n.hit||n.missed||n.time>t+TRAVEL);
      chartRef.current.obstacles=chartRef.current.obstacles.filter(o=>o.hit||o.time>t+TRAVEL);
      // ③ UI 해제
      setWallUI(null);setWallWarning(false);setWallVisible(false);setWallBreaking(false);
      // ④ 마지막에 state='idle' (이 시점부터 스트리밍 재개 가능)
      wallHitCountRef.current=0;
      wallRef.current={state:'idle',pending:false};
    },1500);
  },[showMsg,chartRef,playStartRef]);

  const onWallTimeout=useCallback(()=>{
    doDamage();
    showMsg('💀 벽 파괴 실패!','#ef4444');
    const t=(performance.now()-playStartRef.current)/1000;
    const TRAVEL=Math.abs(SPAWN_Z-PLAYER_Z)/NOTE_SPEED;
    const resumeT=t+TRAVEL+0.5;
    chartRef.current.genUntil=Math.max(chartRef.current.genUntil, resumeT);
    chartRef.current.notes=chartRef.current.notes.filter(n=>n.hit||n.missed||n.time>t+TRAVEL);
    chartRef.current.obstacles=chartRef.current.obstacles.filter(o=>o.hit||o.time>t+TRAVEL);
    setWallUI(null);setWallWarning(false);setWallVisible(false);setWallBreaking(false);
    wallHitCountRef.current=0;
    wallRef.current={state:'idle',pending:false};
  },[doDamage,showMsg,playStartRef,chartRef]);

  // 점수 모니터링: 3000점마다 벽 이벤트 트리거
  useEffect(()=>{
    if(gs!==GS.PLAYING)return;
    const milestone=Math.floor(score/3000)*3000;
    if(milestone>0&&milestone>lastWallScoreRef.current
       &&wallRef.current.state==='idle'&&!wallRef.current.pending){
      lastWallScoreRef.current=milestone;
      wallRef.current.pending=true;
      const t=(performance.now()-playStartRef.current)/1000;
      const TRAVEL=Math.abs(SPAWN_Z-PLAYER_Z)/NOTE_SPEED;
      // 경고(1.9초) + 벽(5초) + 파괴후(TRAVEL+1.5초) 전체를 genUntil로 막음
      const blockUntil=t+1.9+5+TRAVEL+1.5;
      chartRef.current.genUntil=Math.max(chartRef.current.genUntil, blockUntil);
      // 이미 생성된 노트/장애물 중 아직 안 맞은 것 모두 제거
      chartRef.current.notes=chartRef.current.notes.filter(n=>n.hit||n.missed);
      chartRef.current.obstacles=chartRef.current.obstacles.filter(o=>o.hit);
      setWallWarning(true);
      playWarningSiren();
      _safeTO(()=>setWallWarning(false),1800);
      _safeTO(()=>{
        if(wallRef.current.state==='idle'){
          wallRef.current={state:'stopped',startTime:performance.now(),resetProg:Date.now()}; // 타이머+진행도 리셋
          wallHitCountRef.current=0;
          setWallUI({hits:0,breaking:false});
          setWallVisible(true);
          setWallBreaking(false);
        }
      },1900);
    }
  },[score,gs]);

  const onMultChange=useCallback(m=>{
    setMult(m);
    showMsg(`🔢 ${m}의 배수로 변경!`,'#a78bfa');
  },[showMsg]);

  const startGame=useCallback(()=>{
    if(!isCameraReady)return;
    _clearTimers();
    try{if(_actx&&_actx.state==='suspended')_actx.resume().catch(()=>{});}catch(e){}
    const m=MULT_OPTS[Math.floor(Math.random()*MULT_OPTS.length)];
    multRef.current=m;setMult(m);
    setScore(0);setCombo(0);comboRef.current=0;
    setHearts(MAX_HEARTS);setObsW(null);setHitMsg(null);
    // 채보를 chartRef에 직접 할당 (state 아님)
    chartRef.current=freshChart(m);
    playTimeRef.current=0;
    playStartRef.current=performance.now();
    wallRef.current={state:'idle'};
    wallHitCountRef.current=0;
    lastWallScoreRef.current=0;
    wallRef.current.pending=false;
    setWallUI(null);setWallWarning(false);setWallVisible(false);setWallBreaking(false);
    setGs(GS.PLAYING);
    try{audioRef.current.currentTime=0;audioRef.current.play().catch(()=>{});}catch(e){}
  },[isCameraReady]);

  useEffect(()=>{if(gs===GS.LOADING&&isCameraReady)setGs(GS.IDLE);},[isCameraReady,gs]);

  useEffect(()=>{
    if(gs!==GS.PLAYING)return;
    const iv=setInterval(()=>{
      const t=(performance.now()-playStartRef.current)/1000;
      const u=chartRef.current.obstacles.find(o=>!o.hit&&o.time-t>0&&o.time-t<2.5);
      setObsW(u?u.obstacleType:null);
    },100);
    return()=>clearInterval(iv);
  },[gs]);

  const fs=_fs;
  const panel=(ch,ex={})=>(
    <div style={{background:'rgba(4,4,10,.93)',borderRadius:18,border:'2px solid rgba(59,130,246,.2)',
      padding:'clamp(14px,3.5vw,34px) clamp(14px,4vw,36px)',textAlign:'center',
      backdropFilter:'blur(16px)',
      width: _isMobileCache?'clamp(280px,95vw,400px)':_isTablet()?'clamp(320px,72vw,520px)':'clamp(300px,90vw,460px)',
      maxHeight: _isMobileCache?'90vh':_isTablet()?'92vh':'auto',
      overflowY: (_isMobileCache||_isTablet())?'auto':'visible',
      ...ex}}>{ch}</div>
  );

  return(
    <div style={{position:'relative',width:'100%',height:'100vh',background:'#05050a',overflow:'hidden'}}>
      {/* video: width/height 고정 제거, 실제 스트림 해상도에 맡김 */}
      <video ref={videoRef} style={{position:'absolute',opacity:0,pointerEvents:'none',width:1,height:1}} playsInline muted autoPlay/>
      {flash&&<div style={{position:'absolute',inset:0,background:'rgba(220,38,38,.48)',zIndex:60,pointerEvents:'none',animation:'dmgflash .32s ease-out forwards'}}/>}

      {/* 전체화면 버튼 - 메뉴/결과 화면에서만 표시 */}
      {(gs===GS.IDLE||gs===GS.GAME_OVER)&&(
        <button onClick={()=>{
          if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}
          else{document.exitFullscreen().catch(()=>{});}
        }} style={{position:'absolute',top:14,right:14,zIndex:50,
          background:'rgba(0,0,0,.55)',border:'1px solid #374151',borderRadius:8,
          padding:'7px 9px',cursor:'pointer',color:'#9ca3af',display:'flex',alignItems:'center',
          justifyContent:'center'}}
          title="전체화면 전환">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>

        <GameScene gameStatus={gs} audioRef={audioRef}
          handDataRef={handDataRef} headPositionRef={headPositionRef}
          chartRef={chartRef} multRef={multRef}

          onNoteHit={onHit} onNoteMiss={onMiss} onObstacleHit={onObsHit}
          onMultChange={onMultChange}
          wallRef={wallRef} onWallHit={onWallHit} onWallBreak={onWallBreak} onWallTimeout={onWallTimeout}
          wallVisible={wallVisible} wallBreaking={wallBreaking}/>
      </Canvas>

      <WebcamPreview videoRef={videoRef} resultsRef={lastResultsRef} isCameraReady={isCameraReady}/>

        <HandCursor handDataRef={handDataRef}/>}
      <ObsWarn type={obsW}/>

      {gs===GS.PLAYING&&wallWarning&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,

          zIndex:45,pointerEvents:'none',textAlign:'center',
