// 상수
// ══════════════════════════════════════════════
const GS={LOADING:'LOADING',IDLE:'IDLE',PLAYING:'PLAYING',GAME_OVER:'GAME_OVER',VICTORY:'VICTORY'};
const COL={left:'#ef4444',right:'#3b82f6',correct:'#f59e0b',heart:'#ec4899',obstacle:'#ff4400'};
const SPAWN_Z=-30,PLAYER_Z=0,MISS_Z=6,NOTE_SPEED=8;
const BPM=140,BEAT=60/BPM;
const LANE_X=[-1.5,-0.5,0.5,1.5];
const LAYER_Y=[0.7,1.5,2.3];
const MULT_OPTS=[2,3,4,5,6,7,8,9,10];

// ══════════════════════════════════════════════
// 효과음 (Web Audio API - 외부 파일 불필요)
// ══════════════════════════════════════════════
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSwing(){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(600,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.12);
    gain.gain.setValueAtTime(0.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.13);
    osc.start();osc.stop(ctx.currentTime+0.14);
  }catch(e){}
}
function playHit(good){
  try{
    const ctx=getAudioCtx();
    // 퍼커션 레이어
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,2);
    const src=ctx.createBufferSource(),gain=ctx.createGain();
    src.buffer=buf;src.connect(gain);gain.connect(ctx.destination);
    gain.gain.setValueAtTime(good?0.35:0.2,ctx.currentTime);
    src.start();
    // 톤 레이어
    const osc=ctx.createOscillator(),g2=ctx.createGain();
    osc.connect(g2);g2.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(good?880:440,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(good?1760:220,ctx.currentTime+0.1);
    g2.gain.setValueAtTime(0.2,ctx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    osc.start();osc.stop(ctx.currentTime+0.16);
  }catch(e){}
}
function playMiss(){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='square';
    osc.frequency.setValueAtTime(220,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+0.25);
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.28);
    osc.start();osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}
function playDamage(){
  try{
    const ctx=getAudioCtx();
    for(let k=0;k<3;k++){
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='square';
      const t=ctx.currentTime+k*0.07;
      osc.frequency.setValueAtTime(150-k*30,t);
      gain.gain.setValueAtTime(0.25,t);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      osc.start(t);osc.stop(t+0.07);
    }
  }catch(e){}
}
function playHeartPickup(){
  try{
    const ctx=getAudioCtx();
    [523,659,784,1047].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=freq;
      const t=ctx.currentTime+i*0.07;
      gain.gain.setValueAtTime(0.2,t);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      osc.start(t);osc.stop(t+0.13);
    });
  }catch(e){}
}

// ══════════════════════════════════════════════
// 채보
// ══════════════════════════════════════════════
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const mulOf=f=>{const m=[];for(let i=f;i<=100;i+=f)m.push(i);return rnd(m);};
const nonMulOf=f=>{const m=[];for(let i=1;i<=100;i++)if(i%f!==0)m.push(i);return rnd(m);};

function generateChart(){
  const notes=[],obs=[];let id=0,oi=0;
  const aL=[0,1,2],aLn=[0,1,2,3],lLn=[0,1],rLn=[2,3];
  // type은 왼/오른손 판정용. 색(빨/파)은 type으로 결정.
  // numVal은 게임 시작 시 배정 (배수정답 65%)
  const mk=(type,li,ll,t)=>({id:`n${id++}`,time:t,lineIndex:li,lineLayer:ll,type,noteType:'note',numVal:0});

  // 구간1: 8비트 간격 단타
  for(let i=8;i<70;i+=8){const t=i*BEAT;notes.push(i%16===0?mk('left',rnd(lLn),rnd(aL),t):mk('right',rnd(rLn),rnd(aL),t));}
  // 구간2: 4비트, 가끔 더블
  for(let i=70;i<129;i+=4){const t=i*BEAT;if(i%8===0){notes.push(mk('left',rnd(lLn),rnd(aL),t));notes.push(mk('right',rnd(rLn),rnd(aL),t));}else notes.push(mk(i%8===4?'left':'right',rnd(aLn),rnd(aL),t));}
  // 구간3: 2비트, 더블
  for(let i=129;i<175;i+=2){const t=i*BEAT;if(i%8===0){notes.push(mk('left',rnd(lLn),rnd(aL),t));notes.push(mk('right',rnd(rLn),rnd(aL),t));}else notes.push(mk(i%4===0?'left':'right',rnd(aLn),rnd(aL),t));}
  // 구간4: 트리플/쿼드
  for(let i=175;i<220;i+=2){const t=i*BEAT;if(i%8===0){[0,1].forEach(li=>notes.push(mk('left',li,[0,2][li],t)));[2,3].forEach(li=>notes.push(mk('right',li,[0,2][li-2],t)));}else if(i%4===0){notes.push(mk('left',rnd(lLn),rnd(aL),t));notes.push(mk('right',rnd(rLn),rnd(aL),t));}else notes.push(mk(rnd(['left','right']),rnd(aLn),rnd(aL),t));}
  // 하트
  for(let i=80;i<220;i+=32)notes.push({id:`h${id++}`,time:i*BEAT,lineIndex:rnd([1,2]),lineLayer:1,type:rnd(['left','right']),noteType:'heart',numVal:0});
  // 장애물
  const ot=['top','left','right'];
  for(let i=80;i<220;i+=20)obs.push({id:`o${oi++}`,time:i*BEAT,obstacleType:ot[Math.floor(i/20)%3]});
  return{notes:notes.sort((a,b)=>a.time-b.time),obstacles:obs.sort((a,b)=>a.time-b.time)};
}
const BASE=generateChart();
function freshChart(mult){
  return{
    notes:BASE.notes.map(n=>{const cp={...n,hit:false,missed:false,hitTime:undefined};if(n.noteType==='note')cp.numVal=Math.random()<0.65?mulOf(mult):nonMulOf(mult);return cp;}),
    obstacles:BASE.obstacles.map(o=>({...o,hit:false}))
  };
}

// ══════════════════════════════════════════════
// useMediaPipe
// 손: 손바닥 중심 + 손목→중지 방향벡터
// 얼굴: FaceDetector bbox (코/이마 위치 추정)
// ══════════════════════════════════════════════
function useMediaPipe(videoRef){
  const[ready,setReady]=useState(false);
  const[err,setErr]=useState(null);
  // handData: {pos, dir, vel}
  const handDataRef=useRef({left:null,right:null,lastTs:0});
  // headPos: bbox 상단 중심 = 이마/정수리 위치
  const headRef=useRef({x:0.5,y:0.5,detected:false});
  const lrRef=useRef(null);
  const hlRef=useRef(null),fdRef=useRef(null),rafRef=useRef(0);

  // 정규화 → 월드 좌표
  const toWorld=(x,y)=>{
    const wx=(0.5-x)*6.0;   // 좌우 충분히 넓게
    const wy=(1-y)*4.5-2.25+1.0;
    return new THREE.Vector3(wx,Math.max(0.1,wy),0);
  };

  useEffect(()=>{
    let active=true,hlTs=0,fdTs=0,fdFrame=0;
    async function setup(){
      try{
        const vision=await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm');
        if(!active)return;
        // 순차 생성 (wasm 충돌 방지)
        const hl=await HandLandmarker.createFromOptions(vision,{
          baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},
          runningMode:'VIDEO',numHands:2,
          minHandDetectionConfidence:0.4,minHandPresenceConfidence:0.4,minTrackingConfidence:0.4
        });
        if(!active){hl.close();return;}
        const fd=await FaceDetector.createFromOptions(vision,{
          baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',delegate:'GPU'},
          runningMode:'VIDEO',minDetectionConfidence:0.4
        });
        if(!active){hl.close();fd.close();return;}
        hlRef.current=hl;fdRef.current=fd;
        const stream=await navigator.mediaDevices.getUserMedia(
          {video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
        if(videoRef.current&&active){
          videoRef.current.srcObject=stream;
          videoRef.current.onloadeddata=()=>{if(active){setReady(true);loop();}};
        }
      }catch(e){console.error(e);setErr(e.message);}
    }

    function loop(){
      if(!videoRef.current||!hlRef.current||!active)return;
      const v=videoRef.current;
      if(v.videoWidth>0&&v.readyState>=2){
        // 손 (매 프레임, 타임스탬프 단조증가 보장)
        hlTs=Math.max(hlTs+1,Math.floor(performance.now()));
        try{
          const hr=hlRef.current.detectForVideo(v,hlTs);
          lrRef.current=hr;
          processHands(hr);
        }catch(e){hlTs+=2;}

        // 얼굴 (3프레임마다)
        if(++fdFrame%3===0&&fdRef.current){
          fdTs=Math.max(fdTs+1,Math.floor(performance.now()));
          try{
            const fr=fdRef.current.detectForVideo(v,fdTs);
            if(fr.detections?.length>0){
              const bb=fr.detections[0].boundingBox;
              // bbox 상단 중심 = 이마/정수리 위치로 머리 회피 판단
              const hx=(bb.originX+bb.width/2)/v.videoWidth;
              const hy=bb.originY/v.videoHeight; // 상단 = 이마
              headRef.current={x:hx,y:hy,detected:true};
            }else headRef.current={x:0.5,y:0.5,detected:false};
          }catch(e){fdTs+=2;}
        }
      }
      rafRef.current=requestAnimationFrame(loop);
    }

    function processHands(hr){
      const now=performance.now();
      const s=handDataRef.current;
      const dt=Math.max(0.001,(now-s.lastTs)/1000);
      s.lastTs=now;
      let newL=null,newR=null;
      if(hr.landmarks?.length>0){
        for(let i=0;i<hr.landmarks.length;i++){
          const lm=hr.landmarks[i];
          // 미러 보정: 전면카메라에서 MediaPipe 'Left' = 실제 오른손
          const isRight=hr.handedness[i][0].categoryName==='Left';
          // 손바닥 중심: 손목+검지MCP+새끼MCP 평균
          const cx=(lm[0].x+lm[5].x+lm[17].x)/3;
          const cy=(lm[0].y+lm[5].y+lm[17].y)/3;
          const pos=toWorld(cx,cy);
          // 손 방향: 손목→중지끝
          const wx0=(0.5-lm[0].x)*6,wy0=(1-lm[0].y)*4.5-2.25+1;
          const wx12=(0.5-lm[12].x)*6,wy12=(1-lm[12].y)*4.5-2.25+1;
          const dir=new THREE.Vector3(wx12-wx0,wy12-wy0,-0.4).normalize();
          if(isRight)newR={pos,dir};else newL={pos,dir};
        }
      }
      const LERP=0.55;
      function smooth(prev,next){
        if(!next)return null;
        if(!prev){return{pos:next.pos.clone(),dir:next.dir.clone(),vel:new THREE.Vector3()};}
        const vel=new THREE.Vector3().subVectors(next.pos,prev.pos).divideScalar(dt);
        next.pos.lerpVectors(prev.pos,next.pos,LERP);
        next.dir.lerpVectors(prev.dir,next.dir,LERP).normalize();
        next.vel=vel;
        return next;
      }
      s.left=smooth(s.left,newL);
      s.right=smooth(s.right,newR);
    }

    setup();
    return()=>{
      active=false;cancelAnimationFrame(rafRef.current);
      hlRef.current?.close();fdRef.current?.close();
      if(videoRef.current?.srcObject)videoRef.current.srcObject.getTracks().forEach(t=>t.stop());
    };
  },[videoRef]);
  return{isCameraReady:ready,handDataRef,headPositionRef:headRef,lastResultsRef:lrRef,error:err};
}

// ══════════════════════════════════════════════
// Saber
// ══════════════════════════════════════════════
const _up=new THREE.Vector3(0,1,0);
// 마지막 위치 기록 → swing 감지
const swingLastPos={left:new THREE.Vector3(),right:new THREE.Vector3()};
const swingCallbacks={left:null,right:null};

function Saber({type,handDataRef,onSwing}){
  const grp=useRef();
  const col=type==='left'?COL.left:COL.right;
  const L=2.25;
  const smoothPos=useRef(new THREE.Vector3(type==='left'?-1.2:1.2,1.4,0));
  const smoothQ=useRef(new THREE.Quaternion());
  const glowRef=useRef();
  const swingAcc=useRef(0);
  const lastSwingPlay=useRef(0);

  useFrame((_,dt)=>{
    if(!grp.current)return;
    const data=type==='left'?handDataRef.current.left:handDataRef.current.right;
    if(data){
      grp.current.visible=true;
      smoothPos.current.lerp(data.pos,0.5);
      grp.current.position.copy(smoothPos.current);
      // dir → quaternion
      const q=new THREE.Quaternion().setFromUnitVectors(_up,data.dir);
      smoothQ.current.slerp(q,0.3);
      grp.current.quaternion.copy(smoothQ.current);
      // 휘두름 강도 → 글로우
      const speed=data.vel?.length()??0;
      swingAcc.current=THREE.MathUtils.lerp(swingAcc.current,Math.min(speed*0.08,1),0.3);
      if(glowRef.current) glowRef.current.material.emissiveIntensity=3+swingAcc.current*10;
      // 스윙 사운드 (0.15초 쿨다운)
      const now=performance.now();
      if(speed>4&&now-lastSwingPlay.current>150){
        lastSwingPlay.current=now;
        playSwing();
      }
    }else{
      grp.current.visible=false;
      swingAcc.current*=0.85;
    }
  });

  return(
    <group ref={grp}>
      <mesh position={[0,-0.11,0]}><cylinderGeometry args={[0.03,0.03,0.22,10]}/><meshStandardMaterial color="#111" roughness={0.5} metalness={0.9}/></mesh>
      <mesh position={[0,0.01,0]}><cylinderGeometry args={[0.055,0.038,0.09,10]}/><meshStandardMaterial color="#777" roughness={0.2} metalness={1}/></mesh>
      <mesh position={[0,0.09+L/2,0]}><cylinderGeometry args={[0.013,0.013,L,8]}/><meshBasicMaterial color="white" toneMapped={false}/></mesh>
      <mesh ref={glowRef} position={[0,0.09+L/2,0]}>
        <capsuleGeometry args={[0.036,L,8,12]}/>
        <meshStandardMaterial color={col} emissive={col} emissiveIntensity={3} toneMapped={false} transparent opacity={0.55}/>
      </mesh>
      <pointLight color={col} intensity={5} distance={6} decay={2} position={[0,1.2,0]}/>
    </group>
  );
}

// ══════════════════════════════════════════════
// HitEffect — 화려한 타격 이펙트
// ══════════════════════════════════════════════
function HitEffect({color,tsh,isGood}){
  const g=useRef();
  const age=tsh;
  useFrame(()=>{
    if(!g.current)return;
    const life=isGood?0.6:0.4;
    const s=Math.max(0.001,1-age/life);
    g.current.scale.setScalar(s);
    g.current.visible=age<life;
  });

  // 파티클 방향들
  const dirs=isGood
    ?[[0,1],[1,0],[-1,0],[0,-1],[0.7,0.7],[-0.7,0.7],[0.7,-0.7],[-0.7,-0.7],[0.5,0],[0,-0.5]]
    :[[0,1],[1,0],[-1,0],[0,-1],[0.7,0.7],[-0.7,0.7]];

  return(
    <group ref={g}>
      {/* 중앙 플래시 */}
      <mesh>
        <sphereGeometry args={[isGood?0.55:0.35,10,10]}/>
        <meshBasicMaterial color="white" toneMapped={false} transparent opacity={Math.max(0,1-age*8)}/>
      </mesh>
      {/* 링 */}
      {isGood&&<mesh rotation={[Math.PI/2,0,0]}>
        <torusGeometry args={[0.7+age*3,0.04,6,24]}/>
        <meshBasicMaterial color={color} toneMapped={false} transparent opacity={Math.max(0,0.8-age*4)}/>
      </mesh>}
      {/* 파티클 */}
      {dirs.map(([dx,dy],i)=>{
        const P=()=>{
          const r=useRef();
          const spd=isGood?7:4;
          useFrame(()=>{if(r.current)r.current.position.set(dx*spd*age,dy*spd*age,(i%2===0?1:-1)*age*2);});
          return<mesh ref={r}>
            <sphereGeometry args={[isGood?0.1:0.07,5,5]}/>
            <meshBasicMaterial color={i%2===0?color:'#ffffff'} toneMapped={false}/>
          </mesh>;
        };
        return<P key={i}/>;
      })}
      {/* 슬래시 라인 (good hit만) */}
      {isGood&&<mesh rotation={[0,0,Math.PI/4]}>
        <boxGeometry args={[0.06,1.8+age*2,0.04]}/>
        <meshBasicMaterial color={color} toneMapped={false} transparent opacity={Math.max(0,0.9-age*6)}/>
      </mesh>}
    </group>
  );
}

// ══════════════════════════════════════════════
// NoteComp — 판 + 숫자, 좌우색 랜덤 혼합
// ══════════════════════════════════════════════
const panelGeo=new THREE.BoxGeometry(PW,PH,PD);
const edgesGeo=new THREE.EdgesGeometry(panelGeo);

function NoteComp({data,zPos,currentTime,mult}){
  const isHeart=data.noteType==='heart';
  const noteColor=data.type==='left'?COL.left:COL.right;
  // 금테두리: 배수 정답일 때
  const isCorrect=!isHeart&&data.numVal!==0&&data.numVal%mult===0;
  const edgeCol=isCorrect?COL.correct:noteColor;
  const bodyCol=data.type==='left'?'#4a0f0f':'#0f1a4a';

  const pos=useMemo(()=>[LANE_X[data.lineIndex],LAYER_Y[data.lineLayer],zPos],[data.lineIndex,data.lineLayer,zPos]);
  if(data.missed)return null;
  if(data.hit&&data.hitTime!=null)
    return<group position={pos}><HitEffect color={edgeCol} tsh={currentTime-data.hitTime} isGood={isCorrect||isHeart}/></group>;

  return(
    <group position={pos}>
      {/* 판 본체 */}
      <mesh geometry={panelGeo}>
        <meshStandardMaterial color={bodyCol} roughness={0.3} metalness={0.5}
          emissive={noteColor} emissiveIntensity={0.25}/>
      </mesh>
      {/* 앞면 색상 레이어 */}
      <mesh position={[0,0,PD/2+0.003]}>
        <planeGeometry args={[PW*0.88,PH*0.88]}/>
        <meshBasicMaterial color={noteColor} transparent opacity={0.35}/>
      </mesh>
      {/* 숫자 / 하트 */}
      {isHeart
        ?<Text position={[0,0,PD/2+0.02]} fontSize={PH*0.58} color="#fff" anchorX="center" anchorY="middle">♥</Text>
        :<Text position={[0,0,PD/2+0.02]} fontSize={PH*0.48} color="#fff" anchorX="center" anchorY="middle"
            outlineColor={edgeCol} outlineWidth={0.025}>{data.numVal}</Text>
      }
      {/* 윤곽선 */}
      <lineSegments geometry={edgesGeo}>
        <lineBasicMaterial color={edgeCol} toneMapped={false}/>
      </lineSegments>
      {/* 정답이면 추가 글로우 링 */}
      {isCorrect&&<mesh rotation={[Math.PI/2,0,0]}>
        <torusGeometry args={[PW*0.65,0.025,6,20]}/>
        <meshBasicMaterial color={COL.correct} toneMapped={false}/>
      </mesh>}
    </group>
  );
}

const obsGeoH=new THREE.BoxGeometry(5.4,0.65,0.45);
const obsGeoV=new THREE.BoxGeometry(0.65,4.2,0.45);
const obsCone=new THREE.ConeGeometry(0.38,0.65,3);

function ObsComp({data,zPos}){
  const matRef=useRef();
  useFrame(s=>{if(matRef.current)matRef.current.emissiveIntensity=0.45+Math.sin(s.clock.elapsedTime*7)*0.55;});
  const col=COL.obstacle;
  const mat=<meshStandardMaterial ref={matRef} color={col} emissive={col} emissiveIntensity={0.7} roughness={0.25} metalness={0.55} transparent opacity={0.92}/>;
  if(data.obstacleType==='top')return(
    <group position={[0,3.1,zPos]}>
      <mesh geometry={obsGeoH}>{mat}</mesh>
      {[-2.1,-0.7,0.7,2.1].map((x,i)=><mesh key={i} position={[x,-0.22,0.24]}><planeGeometry args={[0.38,0.28]}/><meshBasicMaterial color="#ffe600" side={THREE.DoubleSide}/></mesh>)}
      <mesh position={[0,-0.52,0.24]} rotation={[0,0,Math.PI]} geometry={obsCone}><meshBasicMaterial color="#fff"/></mesh>
      <pointLight color={col} intensity={2.5} distance={5} decay={2}/>
    </group>
  );
  if(data.obstacleType==='left')return(
    <group position={[-2.8,1.7,zPos]}>
      <mesh geometry={obsGeoV}>{mat}</mesh>
      <mesh position={[0.55,0,0.24]} rotation={[0,0,-Math.PI/2]} geometry={obsCone}><meshBasicMaterial color="#fff"/></mesh>
      <pointLight color={col} intensity={2.5} distance={5} decay={2}/>
    </group>
  );
  return(
    <group position={[2.8,1.7,zPos]}>
      <mesh geometry={obsGeoV}>{mat}</mesh>
      <mesh position={[-0.55,0,0.24]} rotation={[0,0,Math.PI/2]} geometry={obsCone}><meshBasicMaterial color="#fff"/></mesh>
      <pointLight color={col} intensity={2.5} distance={5} decay={2}/>
    </group>
  );
}

// ══════════════════════════════════════════════
// WebcamPreview
// ══════════════════════════════════════════════
const HCONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
function WebcamPreview({videoRef,resultsRef,isCameraReady}){
  const cv=useRef();
  useEffect(()=>{
    if(!isCameraReady)return;
    let af;
    const draw=()=>{
      const c=cv.current,v=videoRef.current;
      if(c&&v&&v.readyState>=2){
        const W=c.width,H=c.height,ctx=c.getContext('2d');
        ctx.save();ctx.scale(-1,1);ctx.translate(-W,0);ctx.drawImage(v,0,0,W,H);ctx.restore();
        const res=resultsRef.current;
        if(res?.landmarks){
          for(let i=0;i<res.landmarks.length;i++){
            const lms=res.landmarks[i];
            const isR=res.handedness[i]?.[0]?.categoryName==='Left';// 미러보정
            const col=isR?COL.right:COL.left;
            ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';
            ctx.beginPath();
            for(const[a,b]of HCONN){const p1=lms[a],p2=lms[b];ctx.moveTo((1-p1.x)*W,p1.y*H);ctx.lineTo((1-p2.x)*W,p2.y*H);}
            ctx.stroke();
            ctx.fillStyle=col;
            for(const lm of lms){ctx.beginPath();ctx.arc((1-lm.x)*W,lm.y*H,3,0,Math.PI*2);ctx.fill();}
            const t=lms[8];ctx.fillStyle='#fff';ctx.beginPath();ctx.arc((1-t.x)*W,t.y*H,5,0,Math.PI*2);ctx.fill();
          }
        }
      }
      af=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(af);
  },[isCameraReady,videoRef,resultsRef]);
  if(!isCameraReady)return null;
  return(
    <div style={{position:'fixed',bottom:8,right:8,width:'clamp(110px,16vw,190px)',aspectRatio:'4/3',
      border:'2px solid rgba(59,130,246,.45)',borderRadius:9,overflow:'hidden',zIndex:50,pointerEvents:'none',background:'#000'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:1,background:'rgba(0,0,0,.6)',
        fontSize:9,color:'rgba(147,197,253,.8)',padding:'2px 6px',fontFamily:'monospace',letterSpacing:2}}>CAMERA</div>
      <canvas ref={cv} width={320} height={240} style={{display:'block',width:'100%',height:'100%',marginTop:14}}/>
    </div>
  );
}

// ══════════════════════════════════════════════
// GameScene
// ══════════════════════════════════════════════
function GameScene({gameStatus,audioRef,handDataRef,headPositionRef,
                    notes,obstacles,mult,onNoteHit,onNoteMiss,onObstacleHit,onSongEnd,onMultChange}){
  const notesRef=useRef(notes),obsRef=useRef(obstacles);
  const[tick,setTick]=useState(0);
  const bump=useCallback(()=>setTick(t=>t+1),[]);
  const[ct,setCt]=useState(0);
  const anRef=useRef([]),aoRef=useRef([]),niRef=useRef(0),oiRef=useRef(0);
  const shk=useRef(0),camRef=useRef(),ambRef=useRef(),spotRef=useRef();
  const lmcRef=useRef(0),obsCool=useRef(0),ctTs=useRef(0);
  const vA=useMemo(()=>new THREE.Vector3(),[]);

  useEffect(()=>{
    notesRef.current=notes;obsRef.current=obstacles;
    anRef.current=[];aoRef.current=[];niRef.current=0;oiRef.current=0;
    lmcRef.current=0;obsCool.current=0;setCt(0);bump();
  },[notes,obstacles]);

  useFrame((_,dt)=>{
    if(audioRef.current&&gameStatus===GS.PLAYING){
      const t=audioRef.current.currentTime;
      const pulse=Math.pow(1-((t%BEAT)/BEAT),4);
      if(ambRef.current)ambRef.current.intensity=0.1+pulse*0.2;
      if(spotRef.current)spotRef.current.intensity=0.35+pulse*1.0;
    }
    if(shk.current>0&&camRef.current){
      const sh=shk.current;
      camRef.current.position.set((Math.random()-.5)*sh,1.8+(Math.random()-.5)*sh,4+(Math.random()-.5)*sh);
      shk.current=THREE.MathUtils.lerp(shk.current,0,14*dt);
      if(shk.current<0.01){shk.current=0;camRef.current.position.set(0,1.8,4);}
    }
    if(gameStatus!==GS.PLAYING||!audioRef.current)return;
    const time=audioRef.current.currentTime;
    const now=performance.now();
    if(now-ctTs.current>14){ctTs.current=now;setCt(time);}
    if(audioRef.current.ended){onSongEnd();return;}
    if(time-lmcRef.current>30){lmcRef.current=time;onMultChange(MULT_OPTS[Math.floor(Math.random()*MULT_OPTS.length)]);}

    const ahead=Math.abs(SPAWN_Z-PLAYER_Z)/NOTE_SPEED;
    const ns=notesRef.current,os=obsRef.current;
    while(niRef.current<ns.length){const n=ns[niRef.current];if(n.time-ahead<=time){anRef.current.push(n);niRef.current++;}else break;}
    while(oiRef.current<os.length){const o=os[oiRef.current];if(o.time-ahead<=time){aoRef.current.push(o);oiRef.current++;}else break;}

    const hd=handDataRef.current;
    const lPos=hd.left?.pos??null,rPos=hd.right?.pos??null;
    const lVel=hd.left?.vel??null,rVel=hd.right?.vel??null;
    const head=headPositionRef.current;

    // ── 노트 충돌 ──
    // 판정: 3D 박스(LANE_XY ± 판크기*0.6) × Z구간
    // 이 방식이 가장 자연스럽고 실패가 적음
    for(let i=anRef.current.length-1;i>=0;i--){
      const n=anRef.current[i];if(n.hit||n.missed)continue;
      const cz=PLAYER_Z-(n.time-time)*NOTE_SPEED;
      if(cz>MISS_Z){
        n.missed=true;
        const isCorrect=n.noteType==='heart'||(n.numVal!==0&&n.numVal%mult===0);
        if(isCorrect)onNoteMiss(n);
        anRef.current.splice(i,1);bump();continue;
      }
      // Z 판정 구간: 플레이어 앞 2.5 ~ 뒤 1.5 (넉넉하게)
      if(cz>PLAYER_Z-2.5&&cz<PLAYER_Z+1.5){
        const hp=n.type==='left'?lPos:rPos;
        const hv=n.type==='left'?lVel:rVel;
        if(hp){
          const nx=LANE_X[n.lineIndex],ny=LAYER_Y[n.lineLayer];
          // 박스 판정: XY 각각 독립 체크 (판 크기 + 여유 0.5)
          const HIT_R=PW*0.5+0.5; // ~0.9
          if(Math.abs(hp.x-nx)<HIT_R&&Math.abs(hp.y-ny)<HIT_R){
            n.hit=true;n.hitTime=time;
            shk.current=0.18;
            onNoteHit(n,(hv?.length()??0)>=0.5);
            anRef.current.splice(i,1);bump();
          }
        }
      }
    }

    // ── 장애물 충돌 ──
    if(obsCool.current>0)obsCool.current-=dt;
    for(let i=aoRef.current.length-1;i>=0;i--){
      const o=aoRef.current[i];if(o.hit)continue;
      const cz=PLAYER_Z-(o.time-time)*NOTE_SPEED;
      if(cz>MISS_Z+3){aoRef.current.splice(i,1);continue;}
      if(cz>PLAYER_Z-2.5&&cz<PLAYER_Z+1.5&&head.detected&&obsCool.current<=0){
        // bbox 상단(이마) 기준
        // top: 이마가 높이 있으면(y 작으면) = 머리 안 숙임
        // left: 이마가 왼쪽에 있으면(x 작으면) = 오른쪽으로 안 피함
        // right: 이마가 오른쪽에 있으면(x 크면) = 왼쪽으로 안 피함
        const hit=o.obstacleType==='top'?head.y>0.25  // 이마가 아직 높은 위치 = 안 숙임
                 :o.obstacleType==='left'?head.x<0.38  // 이마가 왼편 = 오른쪽 미피
                 :head.x>0.62;                          // 이마가 오른편 = 왼쪽 미피
        if(hit){o.hit=true;obsCool.current=2.5;shk.current=0.9;onObstacleHit();aoRef.current.splice(i,1);}
      }
    }
  });

  const visNotes=useMemo(()=>notesRef.current.filter(n=>!n.missed&&(!n.hit||(ct-(n.hitTime??0))<0.55)&&n.time-ct<5.5&&n.time-ct>-2),[tick,ct]);
  const visObs=useMemo(()=>obsRef.current.filter(o=>!o.hit&&o.time-ct<5.5&&o.time-ct>-1),[tick,ct]);

  return(
    <>
      <PerspectiveCamera ref={camRef} makeDefault position={[0,1.8,4]} fov={65}/>
      <color attach="background" args={['#05050a']}/>
      <fog   attach="fog"        args={['#05050a',14,50]}/>
      <ambientLight ref={ambRef} intensity={0.12}/>
      <spotLight ref={spotRef} position={[0,8,4]} angle={0.65} penumbra={1} intensity={0.65} castShadow={false}/>
      <Grid position={[0,0,0]} args={[6,80]} cellThickness={0.07} cellColor="#15152a"
        sectionSize={4} sectionThickness={1.1} sectionColor="#1a3080" fadeDistance={46} infiniteGrid/>
      <mesh rotation={[-Math.PI/2,0,0]} position={[0,-0.01,0]}>
        <planeGeometry args={[4,80]}/><meshStandardMaterial color="#07070d" roughness={1} metalness={0}/>
      </mesh>
      <Stars radius={40} depth={40} count={600} factor={3} saturation={0} fade speed={0.4}/>
      <Saber type="left"  handDataRef={handDataRef}/>
      <Saber type="right" handDataRef={handDataRef}/>
      {visNotes.map(n=><NoteComp key={n.id} data={n} zPos={PLAYER_Z-(n.time-ct)*NOTE_SPEED} currentTime={ct} mult={mult}/>)}
      {visObs.map(o=><ObsComp key={o.id} data={o} zPos={PLAYER_Z-(o.time-ct)*NOTE_SPEED}/>)}
    </>
  );
}

function ObsWarn({type}){
  if(!type)return null;
  const M={
    top: {t:'⬇️ 머리 숙여!',  s:{top:'11%',left:'50%',transform:'translateX(-50%)'}},
    left:{t:'➡️ 오른쪽으로!', s:{top:'46%',left:'2%', transform:'translateY(-50%)'}},
    right:{t:'⬅️ 왼쪽으로!', s:{top:'46%',right:'2%',transform:'translateY(-50%)'}},
  };
  const{t,s}=M[type];
  return(
    <div style={{position:'absolute',...s,zIndex:25,pointerEvents:'none'}}>
      <div style={{background:'rgba(234,88,12,.93)',color:'#fff',fontSize:'clamp(14px,3.5vw,21px)',
        fontWeight:900,padding:'9px 18px',borderRadius:12,border:'3px solid #fed7aa',
        boxShadow:'0 0 22px rgba(255,100,0,.75)',animation:'warnpulse .42s ease-in-out infinite',whiteSpace:'nowrap'}}>
        {t}
      </div>
    </div>
  );
}

// App
// ══════════════════════════════════════════════
function App(){
  const[gs,setGs]=useState(GS.LOADING);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[hearts,setHearts]=useState(MAX_HEARTS);
  const[mult,setMult]=useState(5);
  const[obsW,setObsW]=useState(null);
  const[flash,setFlash]=useState(false);
  const[hitMsg,setHitMsg]=useState(null);
  const[gameNotes,setGameNotes]=useState([]);
  const[gameObs,setGameObs]=useState([]);

  const audioRef=useRef(new Audio(SONG_URL));
  const videoRef=useRef(null);
  const comboRef=useRef(0),multRef=useRef(5);

  const{isCameraReady,handDataRef,headPositionRef,lastResultsRef,error:camErr}=useMediaPipe(videoRef);
  useEffect(()=>{comboRef.current=combo;},[combo]);
  useEffect(()=>{multRef.current=mult;},[mult]);

  const showMsg=useCallback((text,color)=>{setHitMsg({text,color});setTimeout(()=>setHitMsg(null),1000);},[]);

  const doDamage=useCallback(()=>{
    setFlash(true);setTimeout(()=>setFlash(false),320);
    playDamage();
    setHearts(h=>{
      if(h<=1){setTimeout(()=>{setGs(GS.GAME_OVER);audioRef.current?.pause();},80);return 0;}
      return h-1;
    });
  },[]);

  const onHit=useCallback((note,good)=>{
    if(note.noteType==='heart'){
      playHeartPickup();
      setHearts(h=>Math.min(MAX_HEARTS,h+1));
      showMsg('💖 +1 라이프!','#ec4899');
      setScore(s=>s+300);setCombo(c=>c+1);return;
    }
    const m=multRef.current;
    const isCorrect=note.numVal!==0&&note.numVal%m===0;
    const correctHand=note.type; // 'left' or 'right' - 색 일치 여부는 이미 GameScene에서 타입 체크
    if(isCorrect){
      // 배수 정답: 풀점수
      playHit(true);
      const pts=300*(comboRef.current>10?2:1);
      setScore(s=>s+pts);setCombo(c=>c+1);
      showMsg(`✓ ${note.numVal} = ${m}의 배수! +${pts}`,'#f59e0b');
    }else{
      // 오답 타격: 1/4 점수 + 콤보 유지 (틀렸지만 친 건 인정)
      playHit(false);
      const pts=Math.floor(75*(comboRef.current>10?2:1));
      setScore(s=>s+pts);setCombo(c=>c+1);
      showMsg(`${note.numVal} 타격 +${pts}`,(note.type==='left'?COL.left:COL.right));
    }
  },[showMsg]);

  const onMiss=useCallback((note)=>{
    playMiss();setCombo(0);
    if(note.noteType==='heart'){doDamage();return;}
    if(note.numVal!==0&&note.numVal%multRef.current===0)doDamage();
  },[doDamage]);

  const onObsHit=useCallback(()=>{
    setCombo(0);showMsg('💥 장애물 충돌!','#ff6600');doDamage();
  },[doDamage,showMsg]);

  const onMultChange=useCallback(m=>{
    setMult(m);multRef.current=m;
    setGameNotes(prev=>prev.map(n=>(n.noteType==='note'&&!n.hit&&!n.missed)?{...n,numVal:Math.random()<0.65?mulOf(m):nonMulOf(m)}:n));
  },[]);

  const startGame=useCallback(async()=>{
    if(!isCameraReady)return;
    // AudioContext 잠금 해제
    try{if(audioCtx&&audioCtx.state==='suspended')await audioCtx.resume();}catch(e){}
    const m=MULT_OPTS[Math.floor(Math.random()*MULT_OPTS.length)];
    setMult(m);multRef.current=m;
    setScore(0);setCombo(0);comboRef.current=0;
    setHearts(MAX_HEARTS);setObsW(null);setHitMsg(null);
    const fc=freshChart(m);
    setGameNotes(fc.notes);setGameObs(fc.obstacles);
    try{audioRef.current.currentTime=0;await audioRef.current.play();setGs(GS.PLAYING);}
    catch(e){alert('오디오 재생 실패. 화면을 먼저 탭/클릭 후 다시 시도해주세요.');}
  },[isCameraReady]);

  useEffect(()=>{if(gs===GS.LOADING&&isCameraReady)setGs(GS.IDLE);},[isCameraReady,gs]);
  useEffect(()=>{
    if(gs!==GS.PLAYING)return;
    const iv=setInterval(()=>{
      const t=audioRef.current?.currentTime??0;
      const u=gameObs.find(o=>!o.hit&&o.time-t>0&&o.time-t<2.5);
      setObsW(u?u.obstacleType:null);
    },100);
    return()=>clearInterval(iv);
  },[gs,gameObs]);

  const fs=(b,mn=10,mx=999)=>({fontSize:`clamp(${mn}px,${b},${mx}px)`});
  const panel=(ch,ex={})=>(
    <div style={{background:'rgba(4,4,10,.93)',borderRadius:18,border:'2px solid rgba(59,130,246,.2)',
      padding:'clamp(18px,4vw,34px) clamp(18px,4.5vw,36px)',textAlign:'center',
      backdropFilter:'blur(16px)',width:'clamp(300px,90vw,460px)',...ex}}>{ch}</div>
  );

  return(
    <div style={{position:'relative',width:'100%',height:'100vh',background:'#000',overflow:'hidden'}}>
      <video ref={videoRef} style={{position:'absolute',opacity:0,pointerEvents:'none',width:640,height:480}} playsInline muted autoPlay/>
      {flash&&<div style={{position:'absolute',inset:0,background:'rgba(220,38,38,.48)',zIndex:60,pointerEvents:'none',animation:'dmgflash .32s ease-out forwards'}}/>}

      <Canvas frameloop="always" dpr={[1,Math.min(window.devicePixelRatio??1,1.5)]}
        gl={{antialias:true,powerPreference:'high-performance'}} shadows={false}>
        {gs===GS.PLAYING&&gameNotes.length>0&&
          <GameScene gameStatus={gs} audioRef={audioRef}
            handDataRef={handDataRef} headPositionRef={headPositionRef}
            notes={gameNotes} obstacles={gameObs} mult={mult}
            onNoteHit={onHit} onNoteMiss={onMiss} onObstacleHit={onObsHit}
            onSongEnd={()=>{setGs(GS.VICTORY);audioRef.current?.pause();}}
            onMultChange={onMultChange}/>
        }
      </Canvas>

      <WebcamPreview videoRef={videoRef} resultsRef={lastResultsRef} isCameraReady={isCameraReady}/>
      <ObsWarn type={obsW}/>

      {hitMsg&&(
        <div style={{position:'absolute',top:'29%',left:'50%',zIndex:35,pointerEvents:'none',
          fontWeight:900,letterSpacing:1,whiteSpace:'nowrap',
          color:hitMsg.color,textShadow:`0 0 16px ${hitMsg.color}`,
          animation:'msgpop 1s ease-out forwards',...fs('3.5vw',14,22)}}>
          {hitMsg.text}
        </div>
      )}

      {/* HUD */}
      {gs===GS.PLAYING&&(
        <div style={{position:'absolute',top:0,left:0,right:0,
          padding:'clamp(9px,2vw,17px) clamp(11px,2.3vw,20px)',
          display:'flex',justifyContent:'space-between',alignItems:'flex-start',
          pointerEvents:'none',zIndex:10}}>
          <div>
            <Hearts count={hearts}/>
            <div style={{color:'#9ca3af',...fs('2vw',10,12),marginTop:2}}>라이프</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontWeight:700,color:'#fff',lineHeight:1,textShadow:'0 0 10px rgba(59,130,246,.7)',...fs('5vw',20,44)}}>{score.toLocaleString()}</div>
            <div style={{fontWeight:700,marginTop:2,color:combo>10?'#60a5fa':'#d1d5db',
              animation:combo>0&&combo%10===0?'combopop .3s ease-out':undefined,
              ...fs('3vw',12,19)}}>{combo}x COMBO</div>
            <div style={{marginTop:5,background:'rgba(120,53,15,.84)',border:'2px solid #d97706',borderRadius:9,padding:'5px 11px',display:'inline-block'}}>
              <div style={{color:'#fcd34d',fontWeight:700,letterSpacing:2,marginBottom:2,...fs('1.8vw',9,11)}}>지금 때릴 숫자</div>
              <div style={{color:'#fef3c7',fontWeight:900,...fs('2.8vw',12,17)}}><span style={{color:'#fbbf24',...fs('3.8vw',17,25)}}>{mult}</span>의 배수</div>
              <div style={{color:'rgba(251,191,36,.5)',marginTop:1,...fs('1.8vw',9,11)}}>예: {mult*2}, {mult*3}, {mult*5}…</div>
            </div>
          </div>
          <div style={{color:'#9ca3af',background:'rgba(0,0,0,.52)',padding:'5px 9px',borderRadius:7,
            border:'1px solid #374151',display:'flex',alignItems:'center',gap:5,marginTop:3,...fs('1.8vw',10,12)}}>
            <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
              background:headPositionRef?.current?.detected?'#4ade80':'#f87171'}}/>
            머리 추적
          </div>
        </div>
      )}

      {/* 메뉴 */}
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
        zIndex:10,pointerEvents:gs===GS.LOADING?'none':'auto'}}>

        {gs===GS.LOADING&&(
          <div style={{background:'rgba(0,0,0,.86)',padding:'clamp(22px,5vw,36px)',borderRadius:16,
            display:'flex',flexDirection:'column',alignItems:'center',
            border:'1px solid rgba(30,58,138,.4)',gap:13,width:'clamp(270px,80vw,370px)'}}>
            <div style={{width:50,height:50,border:'4px solid transparent',borderTopColor:'#3b82f6',borderBottomColor:'#3b82f6',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
            <h2 style={{color:'#fff',fontWeight:700,...fs('4vw',16,20)}}>MathAttack 로딩 중</h2>
            <p style={{color:'#93c5fd',textAlign:'center',lineHeight:1.7,...fs('2.5vw',11,13)}}>
              {!isCameraReady?'AI 모델 + 카메라 초기화 중…\n첫 로딩은 30초~1분 소요':'에셋 로딩 중…'}
            </p>
            {camErr&&<p style={{color:'#f87171',textAlign:'center',...fs('2.2vw',10,12)}}>{camErr}</p>}
          </div>
        )}

        {gs===GS.IDLE&&panel(<>
          <div style={{fontSize:'clamp(30px,7.5vw,42px)',marginBottom:4}}>🧮</div>
          <h1 style={{color:'#fff',fontStyle:'italic',letterSpacing:-2,marginBottom:2,
            textShadow:'0 0 24px rgba(59,130,246,.6)',lineHeight:1,...fs('8.5vw',26,46)}}>
            MATH <span style={{color:'#3b82f6'}}>ATTACK</span>
          </h1>
          <p style={{color:'#fbbf24',fontWeight:700,letterSpacing:3,marginBottom:13,...fs('2.5vw',11,14)}}>메스어택 — 수학 공격</p>
          <div style={{background:'rgba(255,255,255,.04)',borderRadius:10,padding:'12px 14px',
            border:'1px solid rgba(255,255,255,.09)',textAlign:'left',marginBottom:14,
            color:'#d1d5db',lineHeight:2,...fs('2.5vw',11,13)}}>
            <div><span style={{color:'#ef4444',fontWeight:700}}>■ 빨강 판</span> = 왼손 &nbsp;|&nbsp; <span style={{color:'#3b82f6',fontWeight:700}}>■ 파랑 판</span> = 오른손</div>
            <div>🟡 <b style={{color:'#f59e0b'}}>금테 판</b> = 배수 정답 → 맞히면 풀점수!</div>
            <div style={{color:'#a3a3a3'}}>　일반 판도 치면 ¼ 점수 + 콤보 유지</div>
            <div>💖 분홍 <b style={{color:'#ec4899'}}>♥ 판</b> = 때리면 라이프 +1 회복</div>
            <div>⚠️ <b style={{color:'#f97316'}}>주황 장애물</b> = 경고 방향으로 머리 회피!</div>
            <div style={{color:'#6b7280',marginTop:3,...fs('2vw',9,11)}}>
              정답 놓침 = ❤️ -1 &nbsp;|&nbsp; 장애물 충돌 = ❤️ -1 &nbsp;|&nbsp; 하트 0 = 게임 오버
            </div>
          </div>
          {!isCameraReady
            ?<div style={{color:'#f87171',background:'rgba(127,29,29,.3)',padding:10,borderRadius:7,...fs('2.5vw',11,13)}}>📷 카메라 준비 중…</div>
            :<button onClick={startGame} style={{background:'#2563eb',color:'#fff',fontWeight:700,
              padding:'13px 38px',borderRadius:999,border:'none',cursor:'pointer',
              display:'flex',alignItems:'center',gap:8,margin:'0 auto',
              boxShadow:'0 0 20px rgba(37,99,235,.55)',...fs('3.5vw',14,18)}}>
              ▶ 게임 시작
            </button>
          }
        </>)}

        {(gs===GS.GAME_OVER||gs===GS.VICTORY)&&panel(<>
          <h2 style={{fontWeight:700,marginBottom:10,color:gs===GS.VICTORY?'#4ade80':'#f87171',...fs('7.5vw',26,44)}}>
            {gs===GS.VICTORY?'🎉 클리어!':'💀 게임 오버'}
          </h2>
          <p style={{color:'#aaa',marginBottom:3,...fs('3vw',12,16)}}>최종 점수</p>
          <p style={{fontWeight:900,color:'#60a5fa',marginBottom:22,...fs('7.5vw',28,44)}}>{score.toLocaleString()}</p>
          <button onClick={startGame} style={{background:'rgba(255,255,255,.1)',color:'#fff',
            padding:'11px 26px',borderRadius:999,border:'1px solid rgba(255,255,255,.22)',
            cursor:'pointer',display:'flex',alignItems:'center',gap:7,margin:'0 auto',...fs('3.5vw',13,17)}}>
            🔄 다시 플레이
          </button>
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
