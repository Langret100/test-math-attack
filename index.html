<script type="text/babel" data-type="module" data-presets="react">
import React,{useRef,useState,useEffect,useCallback,useMemo}from'react';
import ReactDOM from'react-dom/client';
import{Canvas,useFrame}from'@react-three/fiber';
import{Grid,PerspectiveCamera,Stars,Text}from'@react-three/drei';
import*as THREE from'three';
import{HandLandmarker,FaceDetector,FilesetResolver}from'@mediapipe/tasks-vision';

// ══════════════════════════════════════
// 상수
// ══════════════════════════════════════
const GS={LOADING:'LOADING',IDLE:'IDLE',PLAYING:'PLAYING',GAME_OVER:'GAME_OVER'};
// 게임은 게임오버 때까지 무한히 계속됨 (클리어 없음)
const COL={left:'#ef4444',right:'#3b82f6',correct:'#f59e0b',heart:'#ec4899',obstacle:'#ff4400'};
const SPAWN_Z=-30,PLAYER_Z=0,MISS_Z=6,NOTE_SPEED=8;
const BPM=140,BEAT=60/BPM;
const LANE_X=[-1.5,-0.5,0.5,1.5];
const LAYER_Y=[0.7,1.5,2.3];
const MULT_OPTS=[2,3,4,5,6,7,8,9,10];
const MAX_HEARTS=3;
const PW=0.82,PH=0.82,PD=0.13; // 판 크기
const SONG_URL='https://commondatastorage.googleapis.com/codeskulptor-demos/riceracer_assets/music/race2.ogg';

// ══════════════════════════════════════
// 효과음
// ══════════════════════════════════════
let _actx=null;
const actx=()=>{if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;};
const playSwing=()=>{try{const c=actx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.11);g.gain.setValueAtTime(0.13,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);o.start();o.stop(c.currentTime+0.13);}catch(e){}};
const playHit=(good)=>{try{const c=actx();const b=c.createBuffer(1,c.sampleRate*0.12,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=c.createBufferSource(),g=c.createGain();s.buffer=b;s.connect(g);g.connect(c.destination);g.gain.value=good?0.32:0.18;s.start();const o=c.createOscillator(),g2=c.createGain();o.connect(g2);g2.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(good?880:440,c.currentTime);o.frequency.exponentialRampToValueAtTime(good?1760:220,c.currentTime+0.1);g2.gain.setValueAtTime(0.18,c.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.14);o.start();o.stop(c.currentTime+0.15);}catch(e){}};
const playMiss=()=>{try{const c=actx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(70,c.currentTime+0.22);g.gain.setValueAtTime(0.28,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);o.start();o.stop(c.currentTime+0.26);}catch(e){}};
const playDamage=()=>{try{const c=actx();for(let k=0;k<3;k++){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';const t=c.currentTime+k*0.07;o.frequency.setValueAtTime(140-k*28,t);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);o.start(t);o.stop(t+0.07);}}catch(e){}};
const playHeart=()=>{try{const c=actx();[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;const t=c.currentTime+i*0.07;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.11);o.start(t);o.stop(t+0.12);});}catch(e){}};

// ══════════════════════════════════════
// 채보 — 무한 스트림 방식
// ══════════════════════════════════════
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const mulOf=f=>{const m=[];for(let i=f;i<=100;i+=f)m.push(i);return rnd(m);};
const nonMulOf=f=>{const m=[];for(let i=1;i<=100;i++)if(i%f!==0)m.push(i);return rnd(m);};

// 경과 시간에 따라 난이도 단계 반환 (0~4)
const getDiffLevel=(t)=>{
  if(t<20)return 0;
  if(t<50)return 1;
  if(t<90)return 2;
  if(t<140)return 3;
  return 4;
};

// 난이도별 박자 간격 (초 단위)
const DIFF_BEAT_GAP=[8*BEAT,4*BEAT,2*BEAT,BEAT,BEAT*0.5];
// 난이도별 양손 동시 확률
const DIFF_DOUBLE=[0,0.1,0.25,0.45,0.65];
// 난이도별 장애물 간격 (초)
const DIFF_OBS_GAP=[22,16,12,9,6];
// 난이도별 하트 간격 (초)
const DIFF_HEART_GAP=[28,24,20,18,16];

const aL=[0,1,2],aLn=[0,1,2,3],lLn=[0,1],rLn=[2,3];
let _noteId=0,_obsId=0;
const mkNote=(type,li,ll,t,mult)=>({
  id:`n${_noteId++}`,time:t,lineIndex:li,lineLayer:ll,type,noteType:'note',
  numVal:Math.random()<0.65?mulOf(mult):nonMulOf(mult),
  hit:false,missed:false,hitTime:undefined
});
const mkHeart=(li,ll,t)=>({
  id:`h${_noteId++}`,time:t,lineIndex:li,lineLayer:ll,
  type:rnd(['left','right']),noteType:'heart',numVal:0,
  hit:false,missed:false,hitTime:undefined
});

// 새 노트 배치 생성 (time ~ time+window 범위) — 리듬감 있는 패턴
function generateNotesInRange(fromT,toT,mult){
  const notes=[],obs=[];
  const diff=getDiffLevel(fromT);
  const beatGap=DIFF_BEAT_GAP[diff];
  const obsGap=DIFF_OBS_GAP[diff];
  const heartGap=DIFF_HEART_GAP[diff];

  // 리듬 패턴 세트 — 춤추듯 반복 가능한 시퀀스
  // 각 패턴: [lineIndex, lineLayer, type] 의 배열
  const PATTERNS=[
    // 좌우 교차 (기본 리듬)
    [[rnd(lLn),1,'left'],[rnd(rLn),1,'right']],
    // 왼→왼→오 (연타 느낌)
    [[0,0,'left'],[1,1,'left'],[rnd(rLn),1,'right']],
    // 오→오→왼
    [[3,0,'right'],[2,1,'right'],[rnd(lLn),1,'left']],
    // 아래→위 계단 (왼)
    [[rnd(lLn),0,'left'],[rnd(lLn),1,'left'],[rnd(lLn),2,'left']],
    // 아래→위 계단 (오)
    [[rnd(rLn),0,'right'],[rnd(rLn),1,'right'],[rnd(rLn),2,'right']],
    // 지그재그 (좌우 번갈아)
    [[rnd(lLn),0,'left'],[rnd(rLn),2,'right'],[rnd(lLn),2,'left'],[rnd(rLn),0,'right']],
    // 양손 동시 x2
    [[rnd(lLn),rnd(aL),'left'],[rnd(rLn),rnd(aL),'right']],
    [[rnd(lLn),rnd(aL),'left'],[rnd(rLn),rnd(aL),'right']],
    // 높은층 좌→낮은층 우
    [[rnd(lLn),2,'left'],[rnd(rLn),0,'right']],
    // 낮은층 우→높은층 좌
    [[rnd(rLn),0,'right'],[rnd(lLn),2,'left']],
  ];

  let t=Math.ceil(fromT/beatGap)*beatGap;
  let patIdx=Math.floor(fromT/5)%PATTERNS.length;

  while(t<toT){
    const pat=PATTERNS[patIdx%PATTERNS.length];
    // 난이도에 따라 패턴 내 노트 간격 조정
    const intraGap=diff>=3?beatGap*0.5:diff>=2?beatGap*0.6:beatGap*0.75;

    pat.forEach((p,pi)=>{
      const nt=t+pi*intraGap;
      if(nt<toT) notes.push(mkNote(p[2],p[0],p[1],nt,mult));
    });

    // 다음 패턴 시작 시간: 패턴 길이만큼 진행
    t+=Math.max(beatGap,pat.length*intraGap+beatGap*0.5);
    patIdx++;
  }

  // 장애물
  const ot=['top','left','right'];
  let ot_=Math.ceil(fromT/obsGap)*obsGap;
  while(ot_<toT){
    obs.push({id:`o${_obsId++}`,time:ot_,obstacleType:ot[Math.floor(ot_/obsGap)%3],hit:false});
    ot_+=obsGap;
  }

  // 하트
  let ht_=Math.ceil(fromT/heartGap)*heartGap;
  while(ht_<toT){
    notes.push(mkHeart(rnd([1,2]),1,ht_));
    ht_+=heartGap;
  }

  return{notes:notes.sort((a,b)=>a.time-b.time),obstacles:obs};
}

// reassignNums: numVal만 재배정 (배수 변경시 아직 안맞은 노트)
function reassignNums(notes,mult){
  notes.forEach(n=>{if(n.noteType==='note'&&!n.hit&&!n.missed)n.numVal=Math.random()<0.65?mulOf(mult):nonMulOf(mult);});
}

// 초기 채보 (첫 10초치 미리 생성)
function freshChart(mult){
  _noteId=0;_obsId=0;
  const r=generateNotesInRange(0,10,mult);
  return{notes:r.notes,obstacles:r.obstacles,genUntil:10};
}

// ══════════════════════════════════════
// useMediaPipe
// ══════════════════════════════════════
function useMediaPipe(videoRef){
  const[ready,setReady]=useState(false);
  const[err,setErr]=useState(null);
  const handDataRef=useRef({left:null,right:null,lastTs:0});
  // grace: 손이 잠깐 안보여도 마지막 위치 유지 (프레임 카운터)
  const graceRef=useRef({left:0,right:0});
  // headRef: x,y = 얼굴 중심 정규화좌표, h = 얼굴높이/비디오높이, detected
  const headRef=useRef({x:0.5,y:0.4,h:0.3,detected:false});
  const lrRef=useRef(null);
  const hlRef=useRef(null),fdRef=useRef(null),rafRef=useRef(0);

  const toWorld=(x,y)=>{
    // 모바일/PC 모두 손이 화면 전체를 커버하도록 넓은 범위 매핑
    const isMobile=window.innerWidth<window.innerHeight;
    const xScale=isMobile?8.5:9.0;
    const yScale=isMobile?5.5:5.2;
    const yOff =isMobile?-1.6:-1.8;
    const wx=(0.5-x)*xScale;
    const wy=(1-y)*yScale+yOff;
    return new THREE.Vector3(wx,Math.max(-0.5,wy),0);
  };

  useEffect(()=>{
    let active=true,hlTs=0,fdTs=0,fdFrame=0;

    async function setup(){
      try{
        const vision=await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm');
        if(!active)return;
        const hl=await HandLandmarker.createFromOptions(vision,{
          baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},
          runningMode:'VIDEO',numHands:2,
          minHandDetectionConfidence:0.25,minHandPresenceConfidence:0.25,minTrackingConfidence:0.25
        });
        if(!active){hl.close();return;}
        const fd=await FaceDetector.createFromOptions(vision,{
          baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',delegate:'GPU'},
          runningMode:'VIDEO',minDetectionConfidence:0.4
        });
        if(!active){hl.close();fd.close();return;}
        hlRef.current=hl;fdRef.current=fd;
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
        if(videoRef.current&&active){
          videoRef.current.srcObject=stream;
          videoRef.current.onloadeddata=()=>{if(active){setReady(true);loop();}};
        }
      }catch(e){console.error(e);setErr(e.message);}
    }

    function loop(){
      if(!videoRef.current||!hlRef.current||!active)return;
      const v=videoRef.current;
      if(v.videoWidth>0&&v.readyState>=2){
        hlTs=Math.max(hlTs+1,Math.floor(performance.now()));
        try{const hr=hlRef.current.detectForVideo(v,hlTs);lrRef.current=hr;processHands(hr);}
        catch(e){hlTs+=2;}

        // 얼굴: 3프레임마다 (타임스탬프 hlTs와 완전 분리)
        fdFrame++;
        if(fdFrame%3===0&&fdRef.current){
          fdTs+=1; // 독립 카운터 (hlTs와 무관)
          try{
            const fr=fdRef.current.detectForVideo(v,fdTs);
            if(fr.detections?.length>0){
              const bb=fr.detections[0].boundingBox;
              // MediaPipe FaceDetector bbox는 픽셀 단위
              const W=v.videoWidth,H=v.videoHeight;
              const cx=(bb.originX+bb.width*0.5)/W;
              const cy=(bb.originY+bb.height*0.5)/H;
              const bh=bb.height/H;
              // 미러보정: x 반전
              headRef.current={x:1-cx,y:cy,h:bh,detected:true};
            }else headRef.current={x:0.5,y:0.4,h:0.3,detected:false};
          }catch(e){fdTs+=1;}
        }
      }
      rafRef.current=requestAnimationFrame(loop);
    }

    function processHands(hr){
      const now=performance.now();
      const s=handDataRef.current;
      const dt=Math.max(0.001,(now-s.lastTs)/1000);
      s.lastTs=now;
      let nL=null,nR=null;
      const isMobile=window.innerWidth<window.innerHeight;
      // 인식 범위 대폭 확장: 화면 전체를 넘어서는 넓은 스윙 커버
      const xScale=isMobile?13.0:14.0;
      const yScale=isMobile?9.0:8.5;
      const yOff=isMobile?-2.2:-2.5;
      if(hr.landmarks?.length>0){
        for(let i=0;i<hr.landmarks.length;i++){
          const lm=hr.landmarks[i];
          const isRight=hr.handedness[i][0].categoryName==='Left';
          // 손 중심: 손목+검지뿌리+새끼뿌리 평균 (y 클램프 제거 — 위아래 자유롭게)
          const cx=(lm[0].x+lm[5].x+lm[17].x)/3;
          const cy=(lm[0].y+lm[5].y+lm[17].y)/3;
          const wx=(0.5-cx)*xScale;
          const wy=(1-cy)*yScale+yOff;
          const pos=new THREE.Vector3(wx,wy,0); // 클램프 제거
          // 광선검 방향: 손목→중지끝 (z깊이 강화로 비틀기 자연스럽게)
          const wx0=(0.5-lm[0].x)*xScale,wy0=(1-lm[0].y)*yScale+yOff;
          const wx12=(0.5-lm[12].x)*xScale,wy12=(1-lm[12].y)*yScale+yOff;
          const dir=new THREE.Vector3(wx12-wx0,wy12-wy0,-0.5).normalize();
          if(isRight)nR={pos,dir};else nL={pos,dir};
        }
      }
      // LERP 낮춤: 더 빠르고 즉각적인 반응 (댄스 느낌)
      const LERP=0.82;
      const GRACE_FRAMES=18;
      const grace=graceRef.current;
      const smooth=(prev,next,side)=>{
        if(!next){
          if(prev&&grace[side]<GRACE_FRAMES){grace[side]++;return prev;}
          grace[side]=0;return null;
        }
        grace[side]=0;
        if(!prev)return{pos:next.pos.clone(),dir:next.dir.clone(),vel:new THREE.Vector3()};
        const vel=new THREE.Vector3().subVectors(next.pos,prev.pos).divideScalar(dt);
        // 위치는 빠르게, 방향은 조금 부드럽게
        next.pos.lerpVectors(prev.pos,next.pos,LERP);
        next.dir.lerpVectors(prev.dir,next.dir,0.55).normalize();
        next.vel=vel;
        return next;
      };
      s.left=smooth(s.left,nL,'left');
      s.right=smooth(s.right,nR,'right');
    }

    setup();
    return()=>{
      active=false;cancelAnimationFrame(rafRef.current);
      hlRef.current?.close();fdRef.current?.close();
      if(videoRef.current?.srcObject)videoRef.current.srcObject.getTracks().forEach(t=>t.stop());
    };
  },[videoRef]);
  return{isCameraReady:ready,handDataRef,headPositionRef:headRef,lastResultsRef:lrRef,error:err};
}

// Saber
// ══════════════════════════════════════
const _UP=new THREE.Vector3(0,1,0);

function Saber({type,handDataRef}){
  const grp=useRef(),glowRef=useRef(),coreRef=useRef();
  const trailMeshes=useRef([]);
  const col=type==='left'?COL.left:COL.right;
  const L=2.4;
  const sPos=useRef(new THREE.Vector3(type==='left'?-2.0:2.0,0.8,0));
  const sQ=useRef(new THREE.Quaternion());
  const swingAcc=useRef(0),lastSwingT=useRef(0);
  const visibleFrames=useRef(0);
  const prevPositions=useRef([]);
  const idleT=useRef(0);

  useFrame((_,dt)=>{
    if(!grp.current)return;
    const data=type==='left'?handDataRef.current.left:handDataRef.current.right;
    if(data){
      visibleFrames.current=Math.min(visibleFrames.current+1,10);
      grp.current.visible=true;
      // 더 빠른 위치 추적
      sPos.current.lerp(data.pos,0.78);
      grp.current.position.copy(sPos.current);
      const targetQ=new THREE.Quaternion().setFromUnitVectors(_UP,data.dir);
      sQ.current.slerp(targetQ,0.55);
      grp.current.quaternion.copy(sQ.current);
      const spd=data.vel?.length()??0;
      swingAcc.current=THREE.MathUtils.lerp(swingAcc.current,Math.min(spd*0.08,1),0.45);
      const glow=2.8+swingAcc.current*18;
      if(glowRef.current)glowRef.current.material.emissiveIntensity=glow;
      if(coreRef.current)coreRef.current.material.emissiveIntensity=glow*0.6;
      const now=performance.now();
      if(spd>3.0&&now-lastSwingT.current>120){lastSwingT.current=now;playSwing();}
      idleT.current=0;
    }else{
      visibleFrames.current=Math.max(visibleFrames.current-1,0);
      if(visibleFrames.current===0)grp.current.visible=false;
      swingAcc.current*=0.82;
      // idle float animation
      idleT.current+=dt;

// HitEffect — 파티클 버스트 (화려하고 가벼운 버전)
// ══════════════════════════════════════
// 파티클 데이터를 컴포넌트 외부에서 한번만 계산 (재사용)
const GOOD_DIRS=(()=>{
  const d=[];
  for(let i=0;i<18;i++){const a=(i/18)*Math.PI*2;d.push([Math.cos(a),Math.sin(a)]);}
  return d;
})();
const BAD_DIRS=(()=>{
  const d=[];
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;d.push([Math.cos(a),Math.sin(a)]);}
  return d;
})();

// 단일 파티클 (useRef 기반, re-render 없음)
function Particle({dx,dy,speed,size,color,life,gravity=true,spin=0,delay=0}){
  const r=useRef();
  useFrame((_,dt)=>{
    if(!r.current)return;
    const t=r.current.userData.t=(r.current.userData.t??-delay)+dt;
    if(t<0){r.current.visible=false;return;}
    if(t>life){r.current.visible=false;return;}
    r.current.visible=true;
    const f=t/life;
    const grav=gravity?-6*t*t:0;
    r.current.position.set(dx*speed*t,dy*speed*t+grav,spin?Math.sin(t*8+spin)*0.3:0);
    r.current.scale.setScalar(Math.max(0.01,(1-f*f)*1.2));
    if(r.current.material)r.current.material.opacity=Math.max(0,1-f*1.4);
  });
  return(
    <mesh ref={r}>
      <sphereGeometry args={[size,5,5]}/>
      <meshBasicMaterial color={color} toneMapped={false} transparent opacity={1}/>
    </mesh>
  );
}

// 별 모양 스파크 (빠르게 튀어나가는 것)
function StarSpark({angle,speed,color,life,size=0.09}){
  const r=useRef();
  const ax=Math.cos(angle),ay=Math.sin(angle);
  useFrame((_,dt)=>{
    if(!r.current)return;
    const t=r.current.userData.t=(r.current.userData.t??0)+dt;
    if(t>life){r.current.visible=false;return;}
    r.current.visible=true;
    const f=t/life;
    // 초반 빠르게 → 감속
    const ease=1-f*f;
    r.current.position.set(ax*speed*ease*t*3,ay*speed*ease*t*3-2*t*t,0);
    r.current.rotation.z=t*12;
    r.current.scale.setScalar(Math.max(0.01,1-f*1.6));
    if(r.current.material)r.current.material.opacity=Math.max(0,1-f*1.8);
  });
  return(
    <mesh ref={r}>
      <octahedronGeometry args={[size,0]}/>
      <meshBasicMaterial color={color} toneMapped={false} transparent opacity={1}/>
    </mesh>
  );
}

// 팽창 링 (useFrame으로 크기 변경)
function ExpandRing({color,speed,maxR,life,axis='z'}){
  const r=useRef();
  useFrame((_,dt)=>{
    if(!r.current)return;
    const t=r.current.userData.t=(r.current.userData.t??0)+dt;
    if(t>life){r.current.visible=false;return;}
    r.current.visible=true;
    const f=t/life;
    r.current.scale.setScalar(0.1+f*speed);
    if(r.current.material)r.current.material.opacity=Math.max(0,0.9-f*1.1);
  });
  const rot=axis==='x'?[Math.PI/2,0,0]:axis==='y'?[0,Math.PI/2,0]:[0,0,0];
  return(
    <mesh ref={r} rotation={rot}>
      <torusGeometry args={[maxR,0.04,6,24]}/>
      <meshBasicMaterial color={color} toneMapped={false} transparent opacity={0.9}/>
    </mesh>
  );
}

function HitEffect({color,tsh,isGood,isPenalty}){
  const g=useRef();
  const life=isGood?0.9:0.55;
  useFrame(()=>{if(g.current)g.current.visible=tsh<life;});

  if(!isGood&&!isPenalty){
    // 오답+색일치 — 회색 미니 버스트
    return(
      <group ref={g}>
        <mesh><sphereGeometry args={[0.25,8,8]}/><meshBasicMaterial color="#666" toneMapped={false} transparent opacity={Math.max(0,0.6-tsh*6)}/></mesh>
        {BAD_DIRS.slice(0,6).map(([dx,dy],i)=>(
          <Particle key={i} dx={dx} dy={dy} speed={3.5} size={0.055} color="#999" life={0.5} gravity={false}/>
        ))}
      </group>
    );
  }

  if(isPenalty){
    // 감점 — 붉은 X 파편
    return(
      <group ref={g}>
        <mesh><sphereGeometry args={[0.3,8,8]}/><meshBasicMaterial color="#ff2222" toneMapped={false} transparent opacity={Math.max(0,0.8-tsh*7)}/></mesh>
        {BAD_DIRS.map(([dx,dy],i)=>(
          <Particle key={i} dx={dx} dy={dy} speed={5} size={0.07} color={i%2===0?'#ff4444':'#ff9999'} life={0.5}/>
        ))}
      </group>
    );
  }

  // ── 정답 타격 — 풀 버스트 ──
  return(
    <group ref={g}>
      {/* 중심 섬광 — 빠르게 팽창 후 소멸 */}
      <mesh><sphereGeometry args={[0.85,12,12]}/><meshBasicMaterial color="white" toneMapped={false} transparent opacity={Math.max(0,1-tsh*14)}/></mesh>
      <mesh><sphereGeometry args={[0.5,10,10]}/><meshBasicMaterial color={color} toneMapped={false} transparent opacity={Math.max(0,0.95-tsh*9)}/></mesh>

      {/* 팽창 링 3개 (xy,xz,yz 축 혼합) */}
      <ExpandRing color={color} speed={14} maxR={0.5} life={0.7} axis='z'/>
      <ExpandRing color="white" speed={9} maxR={0.4} life={0.55} axis='x'/>
      <ExpandRing color={color} speed={18} maxR={0.35} life={0.5} axis='y'/>

      {/* 메인 파티클 — 사방으로 빠르게 튀는 구슬 (18개) */}
      {GOOD_DIRS.map(([dx,dy],i)=>(
        <Particle key={`p${i}`}
          dx={dx} dy={dy}
          speed={8+i%4*1.5}
          size={i%3===0?0.13:0.085}
          color={i%3===0?'white':i%3===1?color:'#fffde0'}
          life={0.75}
          gravity={true}
          delay={i%4*0.01}
        />
      ))}

      {/* 별 스파크 — 가장 빠르게 튀는 빛 조각 (12개) */}
      {Array.from({length:12}).map((_,i)=>(
        <StarSpark key={`s${i}`}
          angle={(i/12)*Math.PI*2+(Math.PI/24)}
          speed={6+i%3*1.5}
          color={i%2===0?color:'#ffffff'}
          life={0.65}
          size={i%4===0?0.11:0.075}
        />
      ))}

      {/* X자 빛줄기 (4방향) — 순간 팽창 */}
      {[0,Math.PI/4,Math.PI/2,Math.PI*3/4].map((rot,i)=>{
        const R=()=>{
          const r=useRef();
          useFrame(()=>{
            if(!r.current)return;
            const sc=Math.max(0.01,1-tsh*5.5);
            r.current.scale.set(1,sc,1);
            if(r.current.material)r.current.material.opacity=Math.max(0,0.9-tsh*6);
          });
          return(
            <mesh ref={r} rotation={[0,0,rot]}>
              <boxGeometry args={[0.05,3.2,0.04]}/>
              <meshBasicMaterial color={i%2===0?color:'#ffffff'} toneMapped={false} transparent opacity={0.9}/>
            </mesh>
          );
        };
        return<R key={`r${i}`}/>;
      })}

      {/* 후광 플레어 — 가장 오래 남는 글로우 */}
      <mesh>
        <sphereGeometry args={[1.1,8,8]}/>
        <meshBasicMaterial color={color} toneMapped={false} transparent opacity={Math.max(0,0.18-tsh*1.8)} side={THREE.BackSide}/>
      </mesh>
    </group>
  );
}

// SliceEffect - 물리 기반 두동강 이펙트
// ══════════════════════════════════════
function SliceEffect({color,edgeCol,startPos,noteType}){
  const topRef=useRef(),botRef=useRef(),lineRef=useRef();
  // 물리 상태: position, velocity, angularVelocity, opacity
  const phys=useRef({
    top:{vx:(noteType==='left'?-1.8:1.8)+(Math.random()-0.5)*0.8, vy:2.2+Math.random()*0.8, va:(noteType==='left'?-2.5:2.5)+Math.random()*1.0, rx:0, ry:0},
    bot:{vx:(noteType==='left'? 1.4:-1.4)+(Math.random()-0.5)*0.8, vy:-0.5-Math.random()*0.5, va:(noteType==='left'? 2.0:-2.0)+Math.random()*1.0, rx:0, ry:0},
    t:0, alive:true
  });
  const GRAVITY=-9.8;
  const LIFE=1.4; // 시야 밖 나가면 소멸

  useFrame((_,dt)=>{
    const p=phys.current;
    if(!p.alive)return;
    p.t+=dt;
    if(p.t>LIFE){p.alive=false;if(topRef.current)topRef.current.visible=false;if(botRef.current)botRef.current.visible=false;if(lineRef.current)lineRef.current.visible=false;return;}

    const fade=Math.max(0,1-p.t/LIFE);
    // 위 조각
    if(topRef.current){
      p.top.vy+=GRAVITY*dt;
      p.top.rx+=p.top.va*dt;
      p.top.ry+=(noteType==='left'?1.2:-1.2)*dt;
      const py=PH*0.27+p.top.vy*(p.t)-0.5*Math.abs(GRAVITY)*p.t*p.t*0.5;
      const px=p.top.vx*p.t;
      topRef.current.position.set(px,py,(noteType==='left'?0.1:-0.1)*p.t);
      topRef.current.rotation.set(p.top.ry*0.5,p.top.ry,p.top.rx);
      topRef.current.material.opacity=fade*0.95;
      // 시야 밖(y < -6 또는 |x| > 7)이면 바로 소멸
      if(topRef.current.position.y<-6||Math.abs(topRef.current.position.x)>7)p.alive=false;
    }
    // 아래 조각
    if(botRef.current){
      p.bot.vy+=GRAVITY*dt;
      p.bot.rx+=p.bot.va*dt;
      p.bot.ry+=(noteType==='left'?-1.0:1.0)*dt;
      const py2=-PH*0.27+p.bot.vy*(p.t)-0.5*Math.abs(GRAVITY)*p.t*p.t*0.5;
      const px2=p.bot.vx*p.t;
      botRef.current.position.set(px2,py2,(noteType==='left'?-0.1:0.1)*p.t);
      botRef.current.rotation.set(p.bot.ry*0.5,p.bot.ry,p.bot.rx);
      botRef.current.material.opacity=fade*0.95;
    }
    // 절단선 페이드
    if(lineRef.current)lineRef.current.material.opacity=Math.max(0,fade*2.5-1.5);
  });

  const sliceH=PH*0.5;
  const bodyCol=noteType==='left'?'#3d0f0f':'#0d1a3d';
  return(
    <group>
      <mesh ref={topRef} position={[0,PH*0.27,0]}>
        <boxGeometry args={[PW,sliceH,PD]}/>
        <meshStandardMaterial color={bodyCol} emissive={color} emissiveIntensity={0.55} transparent opacity={0.9}/>
      </mesh>
      <mesh ref={botRef} position={[0,-PH*0.27,0]}>
        <boxGeometry args={[PW,sliceH,PD]}/>
        <meshStandardMaterial color={bodyCol} emissive={color} emissiveIntensity={0.55} transparent opacity={0.9}/>
      </mesh>
      {/* 절단면 빛줄기 */}
      <mesh ref={lineRef} position={[0,0,PD/2+0.012]}>
        <planeGeometry args={[PW,0.06]}/>
        <meshBasicMaterial color="white" toneMapped={false} transparent opacity={1}/>
      </mesh>
    </group>
  );
}

// NoteComp
// ══════════════════════════════════════
const panelGeo=new THREE.BoxGeometry(PW,PH,PD);
const edgesGeo=new THREE.EdgesGeometry(panelGeo);

function NoteComp({data,zPos,currentTime,multRef}){
  const mult=multRef.current;
  const isHeart=data.noteType==='heart';
  const isCorrect=!isHeart&&data.numVal!==0&&data.numVal%mult===0;
  const noteColor=data.type==='left'?COL.left:COL.right;
  const edgeCol=isCorrect?COL.correct:noteColor;

  const pos=useMemo(()=>[LANE_X[data.lineIndex],LAYER_Y[data.lineLayer],zPos],[data.lineIndex,data.lineLayer,zPos]);
  if(data.missed)return null;
  if(data.hit&&data.hitTime!=null){
    const tsh=currentTime-data.hitTime;
    const showSlice=tsh<1.1&&!isHeart;
    const showHitFx=tsh<(isCorrect||isHeart?0.85:0.52);
    return<group position={pos}>
      {showSlice&&<SliceEffect color={noteColor} edgeCol={edgeCol} startPos={new THREE.Vector3(0,0,0)} noteType={data.type}/>}
      {showHitFx&&<HitEffect color={edgeCol} tsh={tsh} isGood={isCorrect||isHeart} isPenalty={data.isPenalty}/>}
    </group>;
  }

  if(isHeart){
    // 하트: 순수 핑크 빛나는 하트만
    return(
      <group position={pos}>
        <mesh geometry={panelGeo}>
          <meshStandardMaterial color="#1a0010" roughness={0.2} metalness={0.6}
            emissive="#ec4899" emissiveIntensity={0.35} transparent opacity={0.45}/>
        </mesh>
        <Text position={[0,0,PD/2+0.02]} fontSize={PH*0.65} color="#ff6eb4" anchorX="center" anchorY="middle"
          outlineColor="#ec4899" outlineWidth={0.018}>♥</Text>
        <lineSegments geometry={edgesGeo}>
          <lineBasicMaterial color="#ec4899" toneMapped={false}/>
        </lineSegments>
        <pointLight color="#ec4899" intensity={1.8} distance={3} decay={2}/>
      </group>
    );
  }

  return(
    <group position={pos}>
      {/* 유리질 반투명 패널 */}
      <mesh geometry={panelGeo}>
        <meshStandardMaterial
          color={noteColor} roughness={0.05} metalness={0.15}
          emissive={noteColor} emissiveIntensity={0.22}
          transparent opacity={0.38}/>
      </mesh>
      {/* 앞면 광택 레이어 */}
      <mesh position={[0,0,PD/2+0.002]}>
        <planeGeometry args={[PW*0.92,PH*0.92]}/>
        <meshBasicMaterial color="white" transparent opacity={0.07}/>
      </mesh>
      {/* 숫자 */}
      <Text position={[0,0,PD/2+0.022]} fontSize={PH*0.52} color="#ffffff" anchorX="center" anchorY="middle"
          outlineColor={edgeCol} outlineWidth={isCorrect?0.04:0.022}>{data.numVal}</Text>
      {/* 테두리 엣지 */}
      <lineSegments geometry={edgesGeo}>
        <lineBasicMaterial color={edgeCol} toneMapped={false}/>
      </lineSegments>
      {isCorrect&&<pointLight color={COL.correct} intensity={0.9} distance={2.2} decay={2}/>}
    </group>
  );
}

// ══════════════════════════════════════
// WebcamPreview
// ══════════════════════════════════════
const HCONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
function WebcamPreview({videoRef,resultsRef,isCameraReady}){
  const cv=useRef();
  useEffect(()=>{
    if(!isCameraReady)return;let af;
    const draw=()=>{
      const c=cv.current,v=videoRef.current;
      if(c&&v&&v.readyState>=2){
        const W=c.width,H=c.height,ctx=c.getContext('2d');
        ctx.save();ctx.scale(-1,1);ctx.translate(-W,0);ctx.drawImage(v,0,0,W,H);ctx.restore();
        const res=resultsRef.current;
        if(res?.landmarks){
          for(let i=0;i<res.landmarks.length;i++){
            const lms=res.landmarks[i];
            const isR=res.handedness[i]?.[0]?.categoryName==='Left';
            const col=isR?COL.right:COL.left;
            ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';
            ctx.beginPath();for(const[a,b]of HCONN){const p1=lms[a],p2=lms[b];ctx.moveTo((1-p1.x)*W,p1.y*H);ctx.lineTo((1-p2.x)*W,p2.y*H);}ctx.stroke();
            ctx.fillStyle=col;for(const lm of lms){ctx.beginPath();ctx.arc((1-lm.x)*W,lm.y*H,3,0,Math.PI*2);ctx.fill();}
            const t=lms[8];ctx.fillStyle='#fff';ctx.beginPath();ctx.arc((1-t.x)*W,t.y*H,5,0,Math.PI*2);ctx.fill();
          }
        }
      }
      af=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(af);
  },[isCameraReady,videoRef,resultsRef]);
  if(!isCameraReady)return null;
  return(
    <div style={{position:'fixed',bottom:8,right:8,width:'clamp(110px,16vw,190px)',aspectRatio:'4/3',
      border:'2px solid rgba(59,130,246,.45)',borderRadius:9,overflow:'hidden',zIndex:50,pointerEvents:'none',background:'#000'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:1,background:'rgba(0,0,0,.6)',
        fontSize:9,color:'rgba(147,197,253,.8)',padding:'2px 6px',fontFamily:'monospace',letterSpacing:2}}>CAMERA</div>
      <canvas ref={cv} width={320} height={240} style={{display:'block',width:'100%',height:'100%',marginTop:14}}/>
    </div>
  );
}

// ══════════════════════════════════════
// GameScene
// ══════════════════════════════════════
function GameScene({gameStatus,audioRef,handDataRef,headPositionRef,
                    chartRef,multRef,playStartRef,
                    onNoteHit,onNoteMiss,onObstacleHit,onMultChange}){
  const[tick,setTick]=useState(0);
  const bump=useCallback(()=>setTick(t=>t+1),[]);
  const[ct,setCt]=useState(0);
  const anRef=useRef([]),aoRef=useRef([]),niRef=useRef(0),oiRef=useRef(0);
  const shk=useRef(0),camRef=useRef(),ambRef=useRef(),spotRef=useRef();
  const lmcRef=useRef(0),obsCool=useRef(0),ctTs=useRef(0);

  // 게임 리셋
  useEffect(()=>{
    anRef.current=[];aoRef.current=[];niRef.current=0;oiRef.current=0;
    lmcRef.current=0;obsCool.current=0;setCt(0);bump();
  // chartRef 자체는 바뀌지 않음, 내용물만 바뀜
  // eslint-disable-next-line
  },[]);// mount 한 번만

  useFrame((_,dt)=>{
    if(gameStatus===GS.PLAYING){
      const pulse=Math.pow(1-((ct%BEAT)/BEAT),4);
      if(ambRef.current)ambRef.current.intensity=0.1+pulse*0.19;
      if(spotRef.current)spotRef.current.intensity=0.32+pulse*0.95;
    }
    if(shk.current>0&&camRef.current){
      const sh=shk.current;
      camRef.current.position.set((Math.random()-.5)*sh,1.8+(Math.random()-.5)*sh,4+(Math.random()-.5)*sh);
      shk.current=THREE.MathUtils.lerp(shk.current,0,14*dt);
      if(shk.current<0.01){shk.current=0;camRef.current.position.set(0,1.8,4);}
    }
    if(gameStatus!==GS.PLAYING||!audioRef.current)return;
    // 실제 경과 게임시간 (오디오 루프와 무관)
    const time=(performance.now()-playStartRef.current)/1000;
    const now=performance.now();
    if(now-ctTs.current>14){ctTs.current=now;setCt(time);}

    // ── 무한 노트 스트리밍: 항상 현재+12초 앞까지 생성 ──
    const STREAM_AHEAD=12;
    if(time+STREAM_AHEAD>chartRef.current.genUntil){
      const fromT=chartRef.current.genUntil;
      const toT=fromT+STREAM_AHEAD+4;
      const newData=generateNotesInRange(fromT,toT,multRef.current);
      chartRef.current.notes.push(...newData.notes);
      chartRef.current.obstacles.push(...newData.obstacles);
      chartRef.current.genUntil=toT;
    }

    // ── 배수 변경: 시간 경과에 따라 간격이 줄어듦 ──
    // 0~60s: 20초마다 / 60~120s: 12초마다 / 120s~: 5초마다
    const multInterval=time<60?20:time<120?12:5;
    if(time-lmcRef.current>multInterval){
      lmcRef.current=time;
      let newMult;
      do{newMult=MULT_OPTS[Math.floor(Math.random()*MULT_OPTS.length)];}
      while(newMult===multRef.current&&MULT_OPTS.length>1);
      multRef.current=newMult;
      // 아직 화면에 없는(앞으로 나올) 노트만 재배정
      const ahead=Math.abs(SPAWN_Z-PLAYER_Z)/NOTE_SPEED;
      reassignNums(chartRef.current.notes.filter(n=>n.time>time+ahead*0.5),newMult);
      onMultChange(newMult);
      bump();
    }

    // ── 메모리 정리: 오래된 노트/장애물 제거 (time-5초 이전) ──
    if(Math.floor(time)%10===0&&Math.floor(time)!==Math.floor(time-dt)){
      const cutoff=time-5;
      chartRef.current.notes=chartRef.current.notes.filter(n=>n.time>cutoff||(!n.hit&&!n.missed));
      chartRef.current.obstacles=chartRef.current.obstacles.filter(o=>o.time>cutoff);
    }

    const ahead=Math.abs(SPAWN_Z-PLAYER_Z)/NOTE_SPEED;
    const ns=chartRef.current.notes,os=chartRef.current.obstacles;
    while(niRef.current<ns.length){const n=ns[niRef.current];if(n.time-ahead<=time){anRef.current.push(n);niRef.current++;}else break;}
    while(oiRef.current<os.length){const o=os[oiRef.current];if(o.time-ahead<=time){aoRef.current.push(o);oiRef.current++;}else break;}

    const hd=handDataRef.current;
    const lPos=hd.left?.pos??null,rPos=hd.right?.pos??null;
    const lVel=hd.left?.vel??null,rVel=hd.right?.vel??null;
    const head=headPositionRef.current;
    const mult=multRef.current;

    // ── 노트 충돌 ──
    // 판정 규칙:
    // 1. 숫자 정답(배수 O) → 양손 모두 타격 가능
    // 2. 숫자 오답(배수 X) → 어떤 손으로도 칠 수 있지만 감점(isPenalty)
    // 3. 장애물은 손으로 절대 타격 불가 (머리만)
    const HIT_R=PW*0.5+0.52; // ~0.93
    for(let i=anRef.current.length-1;i>=0;i--){
      const n=anRef.current[i];if(n.hit||n.missed)continue;
      const cz=PLAYER_Z-(n.time-time)*NOTE_SPEED;
      if(cz>MISS_Z){
        n.missed=true;
        const isCorrect=n.noteType==='heart'||(n.numVal!==0&&n.numVal%mult===0);
        if(isCorrect)onNoteMiss(n);
        anRef.current.splice(i,1);bump();continue;
      }
      if(cz>PLAYER_Z-2.8&&cz<PLAYER_Z+1.6){
        const nx=LANE_X[n.lineIndex],ny=LAYER_Y[n.lineLayer];
        const isCorrect=n.noteType==='heart'||(n.numVal!==0&&n.numVal%mult===0);
        let hitHand=null,hitVel=null;
        for(const[hp,hv,side]of[[lPos,lVel,'left'],[rPos,rVel,'right']]){
          if(!hp)continue;
          if(Math.abs(hp.x-nx)<HIT_R&&Math.abs(hp.y-ny)<HIT_R){
            hitHand=side;hitVel=hv;break;
          }
        }
        if(hitHand!==null){
          n.hit=true;n.hitTime=time;
          const colorMatch=(hitHand===n.type);
          // 오답이고 색도 불일치면 isPenalty
          const isPenalty=!isCorrect&&!colorMatch;
          n.isPenalty=isPenalty;
          if(isCorrect||colorMatch)shk.current=0.17;
          else shk.current=0.08;
          onNoteHit(n,isCorrect,colorMatch,(hitVel?.length()??0)>=0.5,isPenalty);
          anRef.current.splice(i,1);bump();
        }
      }
    }

    // ── 장애물: 머리만 (손 충돌 없음) ──
    if(obsCool.current>0)obsCool.current-=dt;
    for(let i=aoRef.current.length-1;i>=0;i--){
      const o=aoRef.current[i];if(o.hit)continue;
      const cz=PLAYER_Z-(o.time-time)*NOTE_SPEED;
      if(cz>MISS_Z+3){aoRef.current.splice(i,1);continue;}
      if(cz>PLAYER_Z-2.5&&cz<PLAYER_Z+1.5&&head.detected&&obsCool.current<=0){
        // top: 고개를 숙여야 → y > 0.48이면 숙인 것 (범위 완화)
        // left: 오른쪽으로 피해야 → x > 0.52이면 피한 것
        // right: 왼쪽으로 피해야 → x < 0.48이면 피한 것
        const isMob=window.innerWidth<window.innerHeight;
        const topThresh=isMob?0.50:0.48;
        const sideThresh=isMob?0.45:0.44;
        const hit=o.obstacleType==='top'  ? head.y<=topThresh
                 :o.obstacleType==='left' ? head.x<=sideThresh
                 :                          head.x>=(1-sideThresh);
        if(hit){o.hit=true;obsCool.current=2.5;shk.current=0.85;onObstacleHit();aoRef.current.splice(i,1);}
      }
    }
  });

  const visNotes=useMemo(()=>
    chartRef.current.notes.filter(n=>!n.missed&&(!n.hit||(ct-(n.hitTime??0))<1.2)&&n.time-ct<5.5&&n.time-ct>-2)
  ,[tick,ct]);
  const visObs=useMemo(()=>
    chartRef.current.obstacles.filter(o=>!o.hit&&o.time-ct<5.5&&o.time-ct>-1)
  ,[tick,ct]);

  return(
    <>
      <PerspectiveCamera ref={camRef} makeDefault position={[0,1.8,4]} fov={65}/>
      <color attach="background" args={['#05050a']}/>
      <fog   attach="fog"        args={['#05050a',14,50]}/>
      <ambientLight ref={ambRef} intensity={0.12}/>
      <spotLight ref={spotRef} position={[0,8,4]} angle={0.65} penumbra={1} intensity={0.62} castShadow={false}/>
      <Grid position={[0,0,0]} args={[6,80]} cellThickness={0.07} cellColor="#14142a"
        sectionSize={4} sectionThickness={1.1} sectionColor="#18307a" fadeDistance={46} infiniteGrid/>
      <mesh rotation={[-Math.PI/2,0,0]} position={[0,-0.01,0]}>
        <planeGeometry args={[4,80]}/><meshStandardMaterial color="#07070d" roughness={1} metalness={0}/>
      </mesh>
      <Stars radius={40} depth={40} count={600} factor={3} saturation={0} fade speed={0.4}/>
      <Saber type="left"  handDataRef={handDataRef}/>
      <Saber type="right" handDataRef={handDataRef}/>
      {visNotes.map(n=><NoteComp key={n.id} data={n} zPos={PLAYER_Z-(n.time-ct)*NOTE_SPEED} currentTime={ct} multRef={multRef}/>)}
      {visObs.map(o=><ObsComp key={o.id} data={o} zPos={PLAYER_Z-(o.time-ct)*NOTE_SPEED}/>)}
    </>
  );
}

// UI
// ══════════════════════════════════════
function Hearts({count}){return(<div style={{display:'flex',gap:4}}>{Array.from({length:MAX_HEARTS}).map((_,i)=>(<svg key={i} viewBox="0 0 24 24" fill={i<count?'#ec4899':'#4b5563'} style={{width:'clamp(24px,5vw,34px)',height:'clamp(24px,5vw,34px)',transition:'all .2s',opacity:i<count?1:.2,transform:i<count?'scale(1.1)':'scale(0.9)',filter:i<count?'drop-shadow(0 0 6px #ec4899)':'none'}}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>))}</div>);}

function ObsWarn({type}){
  if(!type)return null;
  const M={top:{t:'⬇️ 머리 숙여!',s:{top:'11%',left:'50%',transform:'translateX(-50%)'}},left:{t:'➡️ 오른쪽으로!',s:{top:'46%',left:'2%',transform:'translateY(-50%)'}},right:{t:'⬅️ 왼쪽으로!',s:{top:'46%',right:'2%',transform:'translateY(-50%)'}}};
  const{t,s}=M[type];
  return(<div style={{position:'absolute',...s,zIndex:25,pointerEvents:'none'}}><div style={{background:'rgba(234,88,12,.93)',color:'#fff',fontSize:'clamp(14px,3.5vw,21px)',fontWeight:900,padding:'9px 18px',borderRadius:12,border:'3px solid #fed7aa',boxShadow:'0 0 22px rgba(255,100,0,.75)',animation:'warnpulse .42s ease-in-out infinite',whiteSpace:'nowrap'}}>{t}</div></div>);
}

// ══════════════════════════════════════
// App
// ══════════════════════════════════════
function App(){
  const[gs,setGs]=useState(GS.LOADING);
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[hearts,setHearts]=useState(MAX_HEARTS);
  const[mult,setMult]=useState(5);   // UI 표시용만
  const[obsW,setObsW]=useState(null);
  const[flash,setFlash]=useState(false);
  const[hitMsg,setHitMsg]=useState(null);
  const[playing,setPlaying]=useState(false); // GameScene mount 여부

  const audioRef=useRef(null);
  if(audioRef.current===null){const a=new Audio(SONG_URL);a.loop=true;audioRef.current=a;}
  const videoRef=useRef(null);
  const comboRef=useRef(0);
  // multRef: GameScene에서 직접 읽는 ref (state 변경 없이 배수 변경)
  const multRef=useRef(5);
  // chartRef: GameScene에서 직접 뮤테이션하는 채보
  const chartRef=useRef({notes:[],obstacles:[],genUntil:0});
  // playTimeRef: 루프되는 오디오와 무관하게 실제 경과 게임시간 추적
  const playTimeRef=useRef(0);
  const playStartRef=useRef(0);

  const{isCameraReady,handDataRef,headPositionRef,lastResultsRef,error:camErr}=useMediaPipe(videoRef);
  useEffect(()=>{comboRef.current=combo;},[combo]);

  const showMsg=useCallback((text,color)=>{setHitMsg({text,color});setTimeout(()=>setHitMsg(null),1050);},[]);
  const doDamage=useCallback(()=>{
    setFlash(true);setTimeout(()=>setFlash(false),320);playDamage();
    setHearts(h=>{if(h<=1){setTimeout(()=>{setGs(GS.GAME_OVER);audioRef.current?.pause();},80);return 0;}return h-1;});
  },[]);

  // onNoteHit(note, isCorrect, colorMatch, fastEnough, isPenalty)
  const onHit=useCallback((note,isCorrect,colorMatch,fast,isPenalty)=>{
    if(note.noteType==='heart'){
      playHeart();setHearts(h=>Math.min(MAX_HEARTS,h+1));showMsg('💖 +1 라이프!','#ec4899');setScore(s=>s+300);setCombo(c=>c+1);return;
    }
    const cb=comboRef.current;
    const comboMult=cb>20?3:cb>10?2:1;
    if(isPenalty){
      // 오답+색불일치 = 감점 + 콤보 리셋
      playMiss();
      const penalty=150;
      setScore(s=>Math.max(0,s-penalty));
      setCombo(0);
      showMsg(`❌ 오답! -${penalty}`,'#ff4444');
      return;
    }
    if(isCorrect&&colorMatch){
      // 정답 + 색 일치 = 2배
      playHit(true);const pts=600*comboMult;setScore(s=>s+pts);setCombo(c=>c+1);
      showMsg(`🎯 ${note.numVal}=${multRef.current}의배수! +${pts}`,'#fbbf24');
    }else if(isCorrect){
      // 정답 (색 불일치)
      playHit(true);const pts=300*comboMult;setScore(s=>s+pts);setCombo(c=>c+1);
      showMsg(`✓ ${note.numVal} = ${multRef.current}의 배수! +${pts}`,'#f59e0b');
    }else{
      // 오답+색일치 = ¼ 점수 (색은 맞지만 숫자 오답)
      playHit(false);const pts=Math.floor(75*comboMult);setScore(s=>s+pts);setCombo(c=>c+1);
      showMsg(`△ ${note.numVal} 타격 +${pts}`,(note.type==='left'?COL.left:COL.right));
    }
  },[showMsg]);

  const onMiss=useCallback((note)=>{
    playMiss();setCombo(0);
    if(note.noteType==='heart'){doDamage();return;}
    if(note.numVal!==0&&note.numVal%multRef.current===0)doDamage();
  },[doDamage]);

  const onObsHit=useCallback(()=>{setCombo(0);showMsg('💥 장애물 충돌!','#ff6600');doDamage();},[doDamage,showMsg]);

  const onMultChange=useCallback(m=>{
    setMult(m);
    showMsg(`🔢 ${m}의 배수로 변경!`,'#a78bfa');
  },[showMsg]);

  const startGame=useCallback(async()=>{
    if(!isCameraReady)return;
    try{if(_actx&&_actx.state==='suspended')await _actx.resume();}catch(e){}
    const m=MULT_OPTS[Math.floor(Math.random()*MULT_OPTS.length)];
    multRef.current=m;setMult(m);
    setScore(0);setCombo(0);comboRef.current=0;
    setHearts(MAX_HEARTS);setObsW(null);setHitMsg(null);
    // 채보를 chartRef에 직접 할당 (state 아님)
    chartRef.current=freshChart(m);
    playTimeRef.current=0;
    playStartRef.current=performance.now();
    setPlaying(false); // 잠깐 unmount
    await new Promise(r=>setTimeout(r,30));
    setPlaying(true);  // 새 chartRef로 remount
    try{audioRef.current.currentTime=0;await audioRef.current.play();setGs(GS.PLAYING);}
    catch(e){alert('오디오 재생 실패. 화면을 먼저 탭/클릭 후 다시 시도해주세요.');}
  },[isCameraReady]);

  useEffect(()=>{if(gs===GS.LOADING&&isCameraReady)setGs(GS.IDLE);},[isCameraReady,gs]);

  useEffect(()=>{
    if(gs!==GS.PLAYING)return;
    const iv=setInterval(()=>{
      const t=(performance.now()-playStartRef.current)/1000;
      const u=chartRef.current.obstacles.find(o=>!o.hit&&o.time-t>0&&o.time-t<2.5);
      setObsW(u?u.obstacleType:null);
    },100);
    return()=>clearInterval(iv);
  },[gs]);

  const fs=(b,mn=10,mx=999)=>({fontSize:`clamp(${mn}px,${b},${mx}px)`});
  const panel=(ch,ex={})=>(
    <div style={{background:'rgba(4,4,10,.93)',borderRadius:18,border:'2px solid rgba(59,130,246,.2)',
      padding:'clamp(18px,4vw,34px) clamp(18px,4.5vw,36px)',textAlign:'center',
      backdropFilter:'blur(16px)',width:'clamp(300px,90vw,460px)',...ex}}>{ch}</div>
  );

  return(
    <div style={{position:'relative',width:'100%',height:'100vh',background:'#000',overflow:'hidden'}}>
      <video ref={videoRef} style={{position:'absolute',opacity:0,pointerEvents:'none',width:640,height:480}} playsInline muted autoPlay/>
      {flash&&<div style={{position:'absolute',inset:0,background:'rgba(220,38,38,.48)',zIndex:60,pointerEvents:'none',animation:'dmgflash .32s ease-out forwards'}}/>}

      <Canvas frameloop="always" dpr={[1,Math.min(window.devicePixelRatio??1,1.3)]}
        gl={{antialias:false,powerPreference:'high-performance'}} shadows={false}>
        {gs===GS.PLAYING&&playing&&
          <GameScene gameStatus={gs} audioRef={audioRef}
            handDataRef={handDataRef} headPositionRef={headPositionRef}
            chartRef={chartRef} multRef={multRef}
            playStartRef={playStartRef}
            onNoteHit={onHit} onNoteMiss={onMiss} onObstacleHit={onObsHit}
            onMultChange={onMultChange}/>
        }
      </Canvas>

      <WebcamPreview videoRef={videoRef} resultsRef={lastResultsRef} isCameraReady={isCameraReady}/>
      <ObsWarn type={obsW}/>

      {hitMsg&&(
        <div style={{position:'absolute',top:'29%',left:'50%',zIndex:35,pointerEvents:'none',
          fontWeight:900,letterSpacing:1,whiteSpace:'nowrap',
          color:hitMsg.color,textShadow:`0 0 16px ${hitMsg.color}`,
          animation:'msgpop 1.05s ease-out forwards',...fs('3.2vw',13,21)}}>
          {hitMsg.text}
        </div>
      )}

      {gs===GS.PLAYING&&(
        <div style={{position:'absolute',top:0,left:0,right:0,padding:'clamp(9px,2vw,16px) clamp(11px,2.3vw,20px)',
          display:'flex',justifyContent:'space-between',alignItems:'flex-start',pointerEvents:'none',zIndex:10}}>
          <div>
            <Hearts count={hearts}/>
            <div style={{color:'#9ca3af',...fs('2vw',10,12),marginTop:2}}>라이프</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontWeight:700,color:'#fff',lineHeight:1,textShadow:'0 0 10px rgba(59,130,246,.7)',...fs('5vw',20,44)}}>{score.toLocaleString()}</div>
            {combo>0&&(()=>{
              const tier=combo>=50?4:combo>=25?3:combo>=10?2:combo>=5?1:0;
              const colors=['#d1d5db','#60a5fa','#fbbf24','#f97316','#a855f7'];
              const labels=['','🔥','⚡','💥','🌟'];
              const sizes=['3vw','3.2vw','3.6vw','4vw','4.5vw'];
              const minSizes=[12,13,14,16,18];
              const animations=[
                'none',
                'comboPop 0.4s ease-out',
                'comboPulse 0.8s ease-in-out infinite',
                'comboPulse 0.5s ease-in-out infinite, comboShake 0.15s ease-in-out infinite',
                'comboPulse 0.3s ease-in-out infinite, comboShake 0.1s ease-in-out infinite'
              ];
              return(
                <div style={{fontWeight:900,marginTop:4,color:colors[tier],
                  ...fs(sizes[tier],minSizes[tier],tier>=2?32:22),
                  animation:animations[tier],
                  position:'relative',left:'50%',transform:'translateX(-50%)',
                  textShadow:tier>=2?`0 0 20px ${colors[tier]},0 0 40px ${colors[tier]}`:'none',
                  whiteSpace:'nowrap',display:'inline-block'}}>
                  {labels[tier]}{combo}x COMBO{labels[tier]}
                </div>
              );
            })()}
            {combo===0&&<div style={{fontWeight:700,marginTop:4,color:'#4b5563',...fs('3vw',12,19)}}>— COMBO —</div>}
            <div style={{marginTop:5,background:'rgba(120,53,15,.84)',border:'2px solid #d97706',borderRadius:9,padding:'5px 11px',display:'inline-block'}}>
              <div style={{color:'#fcd34d',fontWeight:700,letterSpacing:2,marginBottom:2,...fs('1.8vw',9,11)}}>지금 때릴 숫자</div>
              <div style={{color:'#fef3c7',fontWeight:900,...fs('2.8vw',12,17)}}><span style={{color:'#fbbf24',...fs('3.8vw',17,25)}}>{mult}</span>의 배수</div>
              <div style={{color:'rgba(251,191,36,.5)',marginTop:1,...fs('1.8vw',9,11)}}>예: {mult*2}, {mult*3}, {mult*5}…</div>
            </div>
          </div>
          <div style={{color:'#9ca3af',background:'rgba(0,0,0,.52)',padding:'5px 9px',borderRadius:7,
            border:'1px solid #374151',display:'flex',alignItems:'center',gap:5,marginTop:3,...fs('1.8vw',10,12)}}>
            <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
              background:headPositionRef?.current?.detected?'#4ade80':'#f87171'}}/>
            머리 추적
          </div>
        </div>
      )}

      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
        zIndex:10,pointerEvents:gs===GS.LOADING?'none':'auto'}}>

        {gs===GS.LOADING&&(
          <div style={{background:'rgba(0,0,0,.86)',padding:'clamp(22px,5vw,36px)',borderRadius:16,
            display:'flex',flexDirection:'column',alignItems:'center',
            border:'1px solid rgba(30,58,138,.4)',gap:13,width:'clamp(270px,80vw,370px)'}}>
            <div style={{width:50,height:50,border:'4px solid transparent',borderTopColor:'#3b82f6',borderBottomColor:'#3b82f6',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
            <h2 style={{color:'#fff',fontWeight:700,...fs('4vw',16,20)}}>MathAttack 로딩 중</h2>
            <p style={{color:'#93c5fd',textAlign:'center',lineHeight:1.7,...fs('2.5vw',11,13)}}>
              {!isCameraReady?'AI 모델 + 카메라 초기화 중…\n첫 로딩은 30초~1분 소요':'에셋 로딩 중…'}
            </p>
            {camErr&&<p style={{color:'#f87171',textAlign:'center',...fs('2.2vw',10,12)}}>{camErr}</p>}
          </div>
        )}

        {gs===GS.IDLE&&panel(<>
          <div style={{fontSize:'clamp(30px,7.5vw,42px)',marginBottom:4}}>🧮</div>
          <h1 style={{color:'#fff',fontStyle:'italic',letterSpacing:-2,marginBottom:2,
            textShadow:'0 0 24px rgba(59,130,246,.6)',lineHeight:1,...fs('8.5vw',26,46)}}>
            MATH <span style={{color:'#3b82f6'}}>ATTACK</span>
          </h1>
          <p style={{color:'#fbbf24',fontWeight:700,letterSpacing:3,marginBottom:13,...fs('2.5vw',11,14)}}>메스어택 — 수학 공격</p>
          <div style={{background:'rgba(255,255,255,.04)',borderRadius:10,padding:'12px 14px',
            border:'1px solid rgba(255,255,255,.09)',textAlign:'left',marginBottom:14,
            color:'#d1d5db',lineHeight:2,...fs('2.5vw',11,13)}}>
            <div><span style={{color:'#ef4444',fontWeight:700}}>■ 빨강 판</span> = 왼손만 &nbsp;|&nbsp; <span style={{color:'#3b82f6',fontWeight:700}}>■ 파랑 판</span> = 오른손만</div>
            <div>🟡 <b style={{color:'#f59e0b'}}>금테 판</b> = 배수 정답 → <b>양손 모두</b> 타격 가능!</div>
            <div style={{color:'#a3a3a3',paddingLeft:12}}>
              └ 정답+색일치 = <b style={{color:'#fbbf24'}}>3배 점수(콤보시)</b> &nbsp;|&nbsp; 정답만 = 기본 점수
            </div>
            <div style={{color:'#a3a3a3',paddingLeft:12}}>└ 오답+색일치 = ¼ 점수 &nbsp;|&nbsp; <b style={{color:'#ff4444'}}>오답+색불일치 = -150점 ❌</b></div>
            <div>💖 <b style={{color:'#ec4899'}}>분홍 ♥</b> = 때리면 라이프 +1</div>
            <div>⚠️ <b style={{color:'#f97316'}}>주황 장애물</b> = <b>머리로만</b> 회피! (손 무관)</div>
            <div style={{color:'#6b7280',marginTop:3,...fs('2vw',9,11)}}>
              정답 놓침 / 장애물 충돌 = ❤️ -1 &nbsp;|&nbsp; 하트 0 = 게임 오버
            </div>
          </div>
          {!isCameraReady
            ?<div style={{color:'#f87171',background:'rgba(127,29,29,.3)',padding:10,borderRadius:7,...fs('2.5vw',11,13)}}>📷 카메라 준비 중…</div>
            :<button onClick={startGame} style={{background:'#2563eb',color:'#fff',fontWeight:700,
              padding:'13px 38px',borderRadius:999,border:'none',cursor:'pointer',
              display:'flex',alignItems:'center',gap:8,margin:'0 auto',
              boxShadow:'0 0 20px rgba(37,99,235,.55)',...fs('3.5vw',14,18)}}>
              ▶ 게임 시작
            </button>
          }
        </>)}

        {gs===GS.GAME_OVER&&panel(<>
          <h2 style={{fontWeight:700,marginBottom:10,color:'#f87171',...fs('7.5vw',26,44)}}>
            💀 게임 오버
          </h2>
          <p style={{color:'#aaa',marginBottom:3,...fs('3vw',12,16)}}>최종 점수</p>
          <p style={{fontWeight:900,color:'#60a5fa',marginBottom:8,...fs('7.5vw',28,44)}}>{score.toLocaleString()}</p>
          <p style={{color:'#6b7280',marginBottom:20,...fs('2.5vw',11,14)}}>
            ⏱ 생존 시간: {Math.floor((performance.now()-playStartRef.current)/1000)}초
          </p>
          <button onClick={startGame} style={{background:'rgba(255,255,255,.1)',color:'#fff',
            padding:'11px 26px',borderRadius:999,border:'1px solid rgba(255,255,255,.22)',
            cursor:'pointer',display:'flex',alignItems:'center',gap:7,margin:'0 auto',...fs('3.5vw',13,17)}}>
            🔄 다시 플레이
          </button>
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
