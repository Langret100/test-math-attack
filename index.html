          <div style={{fontSize:'clamp(44px,10vw,80px)',fontWeight:900,color:'#ff1100',
            textShadow:'0 0 40px #ff2200, 0 0 80px #ff4400',letterSpacing:6,lineHeight:1}}>
            ⚠️ WARNING!
          </div>
        </div>
      )}
      {/* 벽 공격 유도 멘트 — fixed + flex 중앙 */}
      {gs===GS.PLAYING&&wallUI&&!wallUI.breaking&&!wallWarning&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',
          paddingTop: _isMobileCache?'8%':'12%',
          zIndex:40,pointerEvents:'none',textAlign:'center'}}>
          <div style={{animation:'warnpulse .5s ease-in-out infinite'}}>
            <div style={{fontSize:'clamp(18px,4vw,30px)',color:'#ffcc00',fontWeight:900,
              textShadow:'0 0 20px #ffcc00',letterSpacing:2,whiteSpace:'nowrap'}}>
              ⚔️ 빠르게 공격하세요!
            </div>
          </div>
          <div style={{marginTop:10,background:'rgba(0,0,0,0.8)',borderRadius:10,
            overflow:'hidden',height:14,border:'2px solid #f97316',width:240}}>
            <div style={{height:'100%',background:'linear-gradient(90deg,#ef4444,#f97316)',
              width:`${(wallUI.hits/WALL_HITS_NEEDED)*100}%`,transition:'width 0.08s'}}/>
          </div>
          <div style={{fontSize:'clamp(11px,2vw,15px)',color:'rgba(249,115,22,0.9)',
            marginTop:5,fontWeight:700}}>{wallUI.hits} / {WALL_HITS_NEEDED}</div>
        </div>
      )}
      {gs===GS.PLAYING&&wallUI?.breaking&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,
          display:'flex',alignItems:'center',justifyContent:'center',
          zIndex:40,pointerEvents:'none',animation:'msgpop 1.2s ease-out forwards'}}>
          <div style={{fontSize:'clamp(32px,7vw,56px)',fontWeight:900,color:'#f97316',
            textShadow:'0 0 40px #f97316, 0 0 80px #ff4400'}}>
            💥 벽 파괴!
          </div>
        </div>
      )}

      {hitMsg&&(
        <div style={{position:'absolute',top:'29%',left:'50%',zIndex:35,pointerEvents:'none',
          fontWeight:900,letterSpacing:1,whiteSpace:'nowrap',
          color:hitMsg.color,textShadow:`0 0 16px ${hitMsg.color}`,
          animation:'msgpop 1.05s ease-out forwards',...fs('3.2vw',13,21)}}>
          {hitMsg.text}
        </div>
      )}

      {gs===GS.PLAYING&&(
        <div style={{position:'absolute',top:0,left:0,right:0,
          padding: _isMobileCache
            ? 'clamp(6px,1.5vw,10px) clamp(8px,2vw,14px)'
            : 'clamp(9px,2vw,16px) clamp(11px,2.3vw,20px)',
          display:'flex',justifyContent:'space-between',alignItems:'flex-start',pointerEvents:'none',zIndex:10}}>
          <div>
            <Hearts count={hearts}/>
            <div style={{color:'#9ca3af',...fs(_isMobileCache?'2.5vw':_isTablet()?'1.8vw':'2vw',9,13),marginTop:2}}>라이프</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontWeight:700,color:'#fff',lineHeight:1,textShadow:'0 0 10px rgba(59,130,246,.7)',
              ...(_isMobileCache?fs('6.5vw',18,36):_isTablet()?fs('4vw',22,44):fs('5vw',20,44))}}>{score.toLocaleString()}</div>
            {combo>0&&(()=>{
              const tier=combo>=50?4:combo>=25?3:combo>=10?2:combo>=5?1:0;
              const colors=['#d1d5db','#60a5fa','#fbbf24','#f97316','#a855f7'];
              const labels=['','🔥','⚡','💥','🌟'];
              const sizes=['3vw','3.2vw','3.6vw','4vw','4.5vw'];
              const minSizes=[12,13,14,16,18];
              const animations=[
                'none',
                'comboPop 0.4s ease-out',
                'comboPulse 0.8s ease-in-out infinite',
                'comboPulse 0.5s ease-in-out infinite, comboShake 0.15s ease-in-out infinite',
                'comboPulse 0.3s ease-in-out infinite, comboShake 0.1s ease-in-out infinite'
              ];
              return(
                <div style={{fontWeight:900,marginTop:4,color:colors[tier],
                  ...fs(sizes[tier],minSizes[tier],tier>=2?32:22),
                  animation:animations[tier],
                  display:'block',width:'100%',
                  textShadow:tier>=2?`0 0 20px ${colors[tier]},0 0 40px ${colors[tier]}`:'none',
                  whiteSpace:'nowrap'}}>
                  {labels[tier]}{combo}x COMBO{labels[tier]}
                </div>
              );
            })()}
            {combo===0&&<div style={{fontWeight:700,marginTop:4,color:'#4b5563',...fs('3vw',12,19)}}>— COMBO —</div>}
            <div style={{marginTop:6,display:'inline-block',textAlign:'center'}}>
              <div style={{color:'rgba(251,191,36,0.55)',fontWeight:600,letterSpacing:3,
                textTransform:'uppercase',...fs('1.6vw',8,10),marginBottom:1}}>배수</div>
              <div style={{lineHeight:1,display:'flex',alignItems:'baseline',justifyContent:'center',gap:'0.15em'}}>
                <span style={{color:'#fbbf24',fontWeight:900,
                  textShadow:'0 0 18px rgba(251,191,36,0.7)',
                  ...(_isMobileCache?fs('9vw',28,44):_isTablet()?fs('6vw',28,48):fs('7vw',30,52))}}>{mult}</span>
                <span style={{color:'rgba(251,191,36,0.7)',fontWeight:700,...(_isMobileCache?fs('3.5vw',12,18):_isTablet()?fs('2.5vw',12,18):fs('3vw',13,20))}}>의 배수</span>
              </div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,marginTop:3}}>
            <div style={{color:'#9ca3af',background:'rgba(0,0,0,.52)',padding:'5px 9px',borderRadius:7,
              border:'1px solid #374151',display:'flex',alignItems:'center',gap:5,...fs('1.8vw',10,12)}}>
              <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
                background:headPositionRef?.current?.detected?'#4ade80':'#f87171'}}/>
              머리 추적
            </div>
          </div>
        </div>
      )}

      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
        zIndex:10,pointerEvents:gs===GS.LOADING?'none':'auto'}}>

        {gs===GS.LOADING&&(
          <div style={{background:'rgba(0,0,0,.86)',padding:'clamp(22px,5vw,36px)',borderRadius:16,
            display:'flex',flexDirection:'column',alignItems:'center',
            border:'1px solid rgba(30,58,138,.4)',gap:13,width:'clamp(270px,80vw,370px)'}}>
            <div style={{width:50,height:50,border:'4px solid transparent',borderTopColor:'#3b82f6',borderBottomColor:'#3b82f6',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
            <h2 style={{color:'#fff',fontWeight:700,...fs('4vw',16,20)}}>MathAttack 로딩 중</h2>
            <p style={{color:'#93c5fd',textAlign:'center',lineHeight:1.7,...fs('2.5vw',11,13)}}>
              {!isCameraReady?'AI 모델 + 카메라 초기화 중…\n첫 로딩은 30초~1분 소요':'에셋 로딩 중…'}
            </p>
            {camErr&&<p style={{color:'#f87171',textAlign:'center',...fs('2.2vw',10,12)}}>{camErr}</p>}
          </div>
        )}

        {gs===GS.IDLE&&panel(<>
          <div style={{fontSize:'clamp(30px,7.5vw,42px)',marginBottom:4}}>🧮</div>
          <h1 style={{color:'#fff',fontStyle:'italic',letterSpacing:-2,marginBottom:2,
            textShadow:'0 0 24px rgba(59,130,246,.6)',lineHeight:1,...fs('8.5vw',26,46)}}>
            MATH <span style={{color:'#3b82f6'}}>ATTACK</span>
          </h1>
          <p style={{color:'#fbbf24',fontWeight:700,letterSpacing:3,marginBottom:13,...fs('2.5vw',11,14)}}>메스어택 — 수학 공격</p>
          <div style={{background:'rgba(255,255,255,.04)',borderRadius:10,padding:'12px 14px',
            border:'1px solid rgba(255,255,255,.09)',textAlign:'left',marginBottom:14,
            color:'#d1d5db',lineHeight:2,...fs('2.5vw',11,13)}}>
            <div><span style={{color:'#ef4444',fontWeight:700}}>■ 빨강</span> = 왼쪽 광선검 &nbsp;|&nbsp; <span style={{color:'#3b82f6',fontWeight:700}}>■ 파랑</span> = 오른쪽 광선검</div>
            <div>🎯 <b style={{color:'#fbbf24'}}>색 일치 + 정답 배수</b> = <b>+300점 (콤보↑)</b></div>
            <div>✓ <b style={{color:'#f59e0b'}}>색 다름 + 정답 배수</b> = <b>+100점 (콤보↑)</b></div>
            <div>△ <b>색만 일치 (오답)</b> = <b>+50점</b> (콤보 안 오름)</div>
            <div style={{color:'#ff4444',fontWeight:700}}>❌ 색도 다르고 오답 = -50점 + 하트 감소</div>
            <div>💖 <b style={{color:'#ec4899'}}>분홍 ♥</b> = 때리면 라이프 +1 (콤보↑)</div>
            <div>⚠️ <b style={{color:'#f97316'}}>주황 장애물</b> = <b>머리로만</b> 회피!</div>
            <div style={{color:'#6b7280',marginTop:3,...fs('2vw',9,11)}}>
              모든 도형을 놓치면 = ❤️ -1 &nbsp;|&nbsp; 하트 0 = 게임 오버
            </div>
          </div>
          {!isCameraReady
            ?<div style={{color:'#f87171',background:'rgba(127,29,29,.3)',padding:10,borderRadius:7,...fs('2.5vw',11,13)}}>📷 카메라 준비 중…</div>
            :<div style={{margin:'0 auto',textAlign:'center'}}>
              <HandButton label="게임 시작" icon="▶" onActivate={startGame}
                handDataRef={handDataRef} color="#2563eb"/>
              <div style={{color:'rgba(255,255,255,0.35)',marginTop:8,...fs('1.8vw',9,11)}}>
                ✋ 손을 버튼 위에 올려도 시작돼요
              </div>
            </div>
          }
        </>)}

        {gs===GS.GAME_OVER&&panel(<>
          <h2 style={{fontWeight:700,marginBottom:10,color:'#f87171',...fs('7.5vw',26,44)}}>
            💀 게임 오버
          </h2>
          <p style={{color:'#aaa',marginBottom:3,...fs('3vw',12,16)}}>최종 점수</p>
          <p style={{fontWeight:900,color:'#60a5fa',marginBottom:8,...fs('7.5vw',28,44)}}>{score.toLocaleString()}</p>
          <p style={{color:'#6b7280',marginBottom:20,...fs('2.5vw',11,14)}}>
            ⏱ 생존 시간: {Math.floor((performance.now()-playStartRef.current)/1000)}초
          </p>
          <div style={{margin:'0 auto',textAlign:'center'}}>
            <HandButton label="다시 플레이" icon="🔄" onActivate={startGame}
              handDataRef={handDataRef} color="#7c3aed"/>
          </div>
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
